<!DOCTYPE html>
<html lang="tr">
<head><link rel="stylesheet" href="style.css"></head>
<body>
<nav><a href="index.html" class="logo">HESAPLA<span>360</span></a><div class="nav-menu">
    <a href="netmaas.html">💰 Maaş</a><a href="tazminat.html">💼 Tazminat</a><a href="issizlik.html">📅 İşsizlik</a>
    <a href="kredi.html">🏦 Kredi</a><a href="yas.html">🎂 Yaş</a><a href="doviz.html">💱 Döviz</a>
    <a href="kdv.html" class="active">🧾 KDV</a><a href="mesai.html">🕒 Mesai</a><a href="cv.html">📄 CV</a>
</div></nav>
<div class="container">
    <h2>🧾 KDV Hesapla</h2>
    <div class="input-group"><label>Tutar</label><input type="number" id="t" placeholder="Tutar giriniz"></div>
    <div class="input-group">
        <label>KDV Oranı</label>
        <select id="o"><option value="0.20">%20 (Genel)</option><option value="0.10">%10 (Gıda vb.)</option><option value="0.01">%1</option></select>
    </div>
    <button onclick="calc()">Vergi Analizi</button>
    <div id="res" class="result-box">
        <div class="row"><span>Net Matrah</span><span id="m"></span></div>
        <div class="row"><span>KDV Tutarı</span><span id="kt"></span></div>
        <div class="row total"><span>Genel Toplam (KDV Dahil)</span><span id="gt"></span></div>
    </div>
</div>
<script>
function calc(){
    let t=parseFloat(document.getElementById("t").value), o=parseFloat(document.getElementById("o").value); if(!t)return;
    document.getElementById("res").style.display="block";
    document.getElementById("m").innerText=t.toLocaleString()+" TL";
    document.getElementById("kt").innerText=(t*o).toLocaleString()+" TL";
    document.getElementById("gt").innerText=(t*(1+o)).toLocaleString()+" TL";
}
</script>
</body></html>
