<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H360 | Gelişmiş Bileşik Faiz Analizi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #0b0f19; margin: 0; font-family: 'Inter', sans-serif; color: #fff; }
        .main-wrapper { 
            display: flex; justify-content: center; align-items: flex-start; 
            min-height: 100vh; padding: 100px 20px 60px; box-sizing: border-box; 
        }
        .calc-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px; padding: 40px; width: 100%; max-width: 650px;
            backdrop-filter: blur(12px); box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .header-area { text-align: center; margin-bottom: 30px; }
        .header-area h1 { font-size: 1.6rem; letter-spacing: 2px; margin: 0; font-weight: 700; }
        .header-area p { color: #007bff; font-size: 0.75rem; font-weight: 700; margin-top: 8px; text-transform: uppercase; }

        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .input-group label { display: block; color: #007bff; font-size: 0.7rem; font-weight: 800; margin-bottom: 8px; }
        .input-group input {
            width: 100%; padding: 14px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            color: #fff; font-size: 1rem; outline: none; transition: 0.3s; box-sizing: border-box;
        }
        .input-group input:focus { border-color: #007bff; background: rgba(255,255,255,0.08); }
        
        .calc-btn {
            width: 100%; padding: 18px; background: #007bff; color: #fff;
            border: none; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 1rem; margin-top: 10px;
        }

        .result-box { margin-top: 30px; display: none; }
        .main-res-card { 
            background: linear-gradient(135deg, rgba(46, 204, 113, 0.1), rgba(0, 123, 255, 0.1));
            padding: 25px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }
        .main-res-card span { font-size: 0.75rem; color: #888; font-weight: 800; }
        .main-res-card b { display: block; font-size: 2.5rem; color: #2ecc71; margin-top: 5px; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-item { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .stat-item small { font-size: 0.65rem; color: #888; display: block; margin-bottom: 5px; }
        .stat-item span { font-weight: 700; font-size: 1.1rem; }

        .table-wrapper { 
            max-height: 250px; overflow-y: auto; border-radius: 12px; 
            background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05); 
        }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; text-align: left; }
        th { background: rgba(255,255,255,0.05); padding: 12px; color: #007bff; position: sticky; top: 0; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.03); }
        tr:last-child td { border: none; }
    </style>
</head>
<body>

<nav class="glass-nav">
    <div class="nav-left">
        <a href="index.html" class="logo"><div class="logo-box">H360</div> HESAPLA<span>360</span></a>
    </div>
    <div class="nav-right">
        <button class="menu-btn" onclick="toggleMenu()">MENÜ <i class="fa-solid fa-bars-staggered"></i></button>
        <div class="dropdown-menu" id="navMenu">
            <a href="netmaas.html">💰 Maaş</a><a href="tazminat.html">💼 Tazminat</a>
            <a href="issizlik.html">📅 İşsizlik</a><a href="faiz.html">📈 Faiz</a>
            <a href="cv.html">📄 CV</a>
        </div>
    </div>
</nav>

<div class="main-wrapper">
    <div class="calc-card">
        <div class="header-area">
            <h1>BİLEŞİK FAİZ ANALİZİ</h1>
            <p>GELECEK SERMAYE PROJEKSİYONU</p>
        </div>

        <div class="input-row">
            <div class="input-group">
                <label>BAŞLANGIÇ (TL)</label>
                <input type="number" id="p" placeholder="100.000">
            </div>
            <div class="input-group">
                <label>AYLIK EKLEME (TL)</label>
                <input type="number" id="pm" placeholder="5.000">
            </div>
        </div>

        <div class="input-row">
            <div class="input-group">
                <label>YILLIK GETİRİ (%)</label>
                <input type="number" id="r" placeholder="45">
            </div>
            <div class="input-group">
                <label>VADE (YIL)</label>
                <input type="number" id="y" placeholder="10">
            </div>
        </div>

        <button class="calc-btn" onclick="calcFaiz()">STRATEJİYİ ANALİZ ET</button>

        <div id="res" class="result-box">
            <div class="main-res-card">
                <span>VADE SONU TAHMİNİ BİRİKİM</span>
                <b id="totalRes">0 ₺</b>
            </div>

            <div class="stats-grid">
                <div class="stat-item">
                    <small>TOPLAM YATIRILAN</small>
                    <span id="investedRes" style="color: #fff;">0 ₺</span>
                </div>
                <div class="stat-item">
                    <small>TOPLAM KÂR GETİRİSİ</small>
                    <span id="profitRes" style="color: #2ecc71;">0 ₺</span>
                </div>
            </div>

            <p style="font-size: 0.7rem; font-weight: 800; color: #007bff; margin-bottom: 10px;">YILLIK GELİŞİM TABLOSU</p>
            <div class="table-wrapper">
                <table id="yearlyTable">
                    <thead>
                        <tr>
                            <th>Yıl</th>
                            <th>Yıl Sonu Bakiye</th>
                            <th>Toplam Getiri</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleMenu() { document.getElementById('navMenu').classList.toggle('active'); }

    function calcFaiz() {
        const p = parseFloat(document.getElementById('p').value) || 0;
        const pm = parseFloat(document.getElementById('pm').value) || 0;
        const rInput = parseFloat(document.getElementById('r').value) || 0;
        const rAylik = (rInput / 100) / 12;
        const y = parseInt(document.getElementById('y').value) || 0;
        
        if (y <= 0) return;

        let tableBody = document.querySelector("#yearlyTable tbody");
        tableBody.innerHTML = "";
        
        let currentBalance = p;
        let totalInvested = p;

        for (let year = 1; year <= y; year++) {
            // Her ay için bileşik faizi işlet
            for (let month = 1; month <= 12; month++) {
                currentBalance = (currentBalance + pm) * (1 + rAylik);
                totalInvested += pm;
            }

            // Tabloya her yılı ekle
            let row = `<tr>
                <td>${year}. Yıl</td>
                <td>${Math.round(currentBalance).toLocaleString('tr-TR')} ₺</td>
                <td style="color:#2ecc71">+ ${Math.round(currentBalance - totalInvested).toLocaleString('tr-TR')} ₺</td>
            </tr>`;
            tableBody.innerHTML += row;
        }

        // Ana sonuçlar
        document.getElementById('totalRes').innerText = Math.round(currentBalance).toLocaleString('tr-TR') + " ₺";
        document.getElementById('investedRes').innerText = Math.round(totalInvested).toLocaleString('tr-TR') + " ₺";
        document.getElementById('profitRes').innerText = Math.round(currentBalance - totalInvested).toLocaleString('tr-TR') + " ₺";
        
        document.getElementById('res').style.display = "block";
    }
</script>
</body>
</html>
