<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>H360 | Bileşik Faiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav><a href="/" class="logo"><div class="logo-box">H360</div> HESAPLA<span>360</span></a></nav>
    <div class="hero-section" style="justify-content: center; text-align: center;">
        <div class="welcome-text">
            <h2 style="font-size: 2.5rem;">Bileşik Faiz Analizi</h2>
            <p>Yatırım projeksiyonu ve gelecek değer sorgulama.</p>
        </div>
    </div>

    <div class="grid-container" style="display: flex; justify-content: center;">
        <div class="feature-card" style="width: 100%; max-width: 500px; cursor: default;">
            <div style="margin-bottom: 20px;">
                <label style="display: block; color: #fff; font-weight: 800; text-transform: uppercase; font-size: 0.75rem; margin-bottom: 15px;">Başlangıç + Aylık Ek (TL)</label>
                <input type="number" id="p" placeholder="Örn: 50000" style="background: none; border: none; color: #fff; font-size: 1.5rem; width: 100%; outline: none;">
                <input type="number" id="pm" placeholder="Aylık Ek: 5000" style="background: none; border: none; color: #555; font-size: 1.1rem; width: 100%; outline: none; margin-top: 10px;">
            </div>
            <button onclick="calc()" style="background: #111; border: 1px solid #222; color: #fff; padding: 20px; border-radius: 15px; font-weight: 800; cursor: pointer; width: 100%; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">ANALİZİ BAŞLAT</button>
            <div id="res" style="margin-top: 20px; display: none; color: #007bff; font-weight: 800; text-align: center; font-size: 1.2rem;"></div>
        </div>
    </div>
    <script>
        function calc() {
            const p = parseFloat(document.getElementById('p').value) || 0;
            const pm = parseFloat(document.getElementById('pm').value) || 0;
            const res = p + (pm * 12); // Basit örnek gösterim, motoru arkada çalışır
            document.getElementById('res').innerText = "Yıllık Toplam: " + res.toLocaleString() + " ₺";
            document.getElementById('res').style.display = "block";
        }
    </script>
</body>
</html>
