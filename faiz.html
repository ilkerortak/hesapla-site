<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H360 | Bileşik Faiz Analizi</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .form-container {
            max-width: 600px;
            margin: 40px auto;
            padding: 30px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 15px;
        }
        .input-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-size: 0.85rem; color: #888; font-weight: 600; }
        input { width: 100%; }
        
        .result-box {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0, 123, 255, 0.05);
            border-left: 4px solid #007bff;
            border-radius: 8px;
            display: none;
        }
        .result-item { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .result-item b { color: #007bff; font-size: 1.1rem; }
        .btn-calc {
            background: #007bff; color: white; border: none; padding: 15px;
            border-radius: 8px; cursor: pointer; font-weight: 700; width: 100%;
            transition: 0.3s; margin-top: 10px;
        }
        .btn-calc:hover { background: #0056b3; transform: translateY(-2px); }
    </style>
</head>
<body>

<nav>
    <a href="/" class="logo"><div class="logo-box">H360</div> HESAPLA<span>360</span></a>
    <div class="nav-menu">
        <a href="/netmaas">💰 Maaş</a>
        <a href="/tazminat">💼 Tazminat</a>
        <a href="/faiz" style="color:#fff">📈 Faiz</a>
        <a href="/cv">📄 CV</a>
    </div>
</nav>

<div class="hero-section">
    <div class="welcome-text">
        <h2>Bileşik Faiz Analizi</h2>
        <p>Yatırım Getiri ve Sermaye Projeksiyonu</p>
    </div>
</div>

<div class="form-container">
    <div class="input-group">
        <label>Başlangıç Sermayesi (₺)</label>
        <input type="number" id="principal" placeholder="Örn: 50000" step="any">
    </div>
    <div class="input-group">
        <label>Aylık Eklenen Tutar (₺)</label>
        <input type="number" id="monthlyAdd" placeholder="Örn: 5000" step="any">
    </div>
    <div class="input-group">
        <label>Yıllık Beklenen Getiri Oranı (%)</label>
        <input type="number" id="rate" placeholder="Örn: 45" step="any">
    </div>
    <div class="input-group">
        <label>Yatırım Süresi (Yıl)</label>
        <input type="number" id="years" placeholder="Örn: 5">
    </div>
    <button class="btn-calc" onclick="calculateCompound()">Analizi Çalıştır</button>

    <div class="result-box" id="resultBox">
        <div class="result-item"><span>Toplam Birikim:</span> <b id="totalValue">0 ₺</b></div>
        <div class="result-item"><span>Toplam Yatırılan:</span> <b id="totalInvested" style="color:#888">0 ₺</b></div>
        <div class="result-item"><span>Net Kâr Getirisi:</span> <b id="totalProfit" style="color:#2ecc71">0 ₺</b></div>
    </div>
</div>

<script>
    function calculateCompound() {
        const p = parseFloat(document.getElementById('principal').value) || 0;
        const pm = parseFloat(document.getElementById('monthlyAdd').value) || 0;
        const r = (parseFloat(document.getElementById('rate').value) / 100) / 12;
        const n = parseInt(document.getElementById('years').value) * 12;

        if (n <= 0) return;

        // Bileşik Faiz Formülü: A = P(1+r)^n + PM * [((1+r)^n - 1) / r]
        let futureValue = p * Math.pow(1 + r, n);
        if (r > 0) {
            futureValue += pm * ((Math.pow(1 + r, n) - 1) / r);
        } else {
            futureValue += pm * n;
        }

        const totalInvested = p + (pm * n);
        const totalProfit = futureValue - totalInvested;

        document.getElementById('totalValue').innerText = futureValue.toLocaleString('tr-TR', {maximumFractionDigits:0}) + " ₺";
        document.getElementById('totalInvested').innerText = totalInvested.toLocaleString('tr-TR', {maximumFractionDigits:0}) + " ₺";
        document.getElementById('totalProfit').innerText = totalProfit.toLocaleString('tr-TR', {maximumFractionDigits:0}) + " ₺";
        
        document.getElementById('resultBox').style.display = "block";
    }
</script>

</body>
</html>
