<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H360 | Bileşik Faiz Analizi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* ANA DEEP NIGHT TEMA */
        body { background-color: #0b0f19; margin: 0; font-family: 'Inter', sans-serif; color: #cbd5e0; overflow-x: hidden; }
        
        /* Navigasyon */
        .glass-nav { background: rgba(11, 15, 25, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); }

        .main-wrapper { display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 120px 20px 60px; }
        
        /* Dashboard Tarzı Kart */
        .calc-card {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px; padding: 40px; width: 100%; max-width: 700px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
        }

        /* Başlık Alanı (Dashboard İkonuyla) */
        .header-area { display: flex; align-items: center; gap: 20px; margin-bottom: 40px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 25px; }
        .icon-box { 
            width: 60px; height: 60px; background: rgba(59, 130, 246, 0.1); 
            border-radius: 16px; display: flex; align-items: center; justify-content: center;
            color: #3b82f6; font-size: 1.5rem; border: 1px solid rgba(59, 130, 246, 0.2);
        }
        .title-text h1 { font-size: 1.3rem; margin: 0; color: #fff; letter-spacing: 1px; }
        .title-text p { color: #3b82f6; font-size: 0.7rem; font-weight: 800; margin: 4px 0 0; text-transform: uppercase; }
        
        /* Inputlar */
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .input-group label { display: block; color: #94a3b8; font-size: 0.65rem; font-weight: 800; margin-bottom: 10px; letter-spacing: 0.5px; }
        .input-group input {
            width: 100%; padding: 16px; background: #080b12;
            border: 1px solid #1e293b; border-radius: 12px;
            color: #fff; font-size: 1rem; transition: 0.3s;
        }
        .input-group input:focus { border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); outline: none; }

        .calc-btn {
            width: 100%; padding: 18px; background: #3b82f6; color: #fff;
            border: none; border-radius: 14px; font-weight: 700; cursor: pointer; font-size: 1rem;
            transition: 0.3s; margin-top: 10px;
        }
        .calc-btn:hover { background: #2563eb; transform: translateY(-2px); }

        /* Sonuç Paneli */
        .result-box { margin-top: 40px; animation: fadeIn 0.5s ease; display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .main-res-card { 
            background: linear-gradient(180deg, rgba(16, 185, 129, 0.1) 0%, rgba(16, 185, 129, 0) 100%);
            padding: 30px; border-radius: 20px; text-align: center; border: 1px solid rgba(16, 185, 129, 0.2);
            margin-bottom: 25px;
        }
        .main-res-card span { font-size: 0.7rem; color: #94a3b8; font-weight: 700; text-transform: uppercase; }
        .main-res-card b { font-size: 2.8rem; color: #10b981; display: block; margin-top: 10px; letter-spacing: -1px; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .stat-item { background: #080b12; padding: 20px; border-radius: 16px; border: 1px solid #1e293b; }
        .stat-item small { font-size: 0.6rem; color: #3b82f6; font-weight: 800; display: block; margin-bottom: 5px; }
        .stat-item span { font-weight: 700; font-size: 1.2rem; color: #fff; }

        /* Tablo Tasarımı */
        .table-wrapper { 
            max-height: 250px; overflow-y: auto; border-radius: 12px; 
            background: #080b12; border: 1px solid #1e293b; 
        }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { background: #111827; padding: 15px; color: #3b82f6; position: sticky; top: 0; text-align: left; border-bottom: 1px solid #1e293b; }
        td { padding: 12px 15px; border-bottom: 1px solid #1e293b; color: #94a3b8; }
        
        /* Custom Scrollbar */
        .table-wrapper::-webkit-scrollbar { width: 5px; }
        .table-wrapper::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="calc-card">
        <div class="header-area">
            <div class="icon-box"><i class="fa-solid fa-chart-line"></i></div>
            <div class="title-text">
                <h1>BİLEŞİK FAİZ ANALİZİ</h1>
                <p>Gelecek Sermaye Projeksiyonu</p>
            </div>
        </div>

        <div class="input-row">
            <div class="input-group">
                <label>BAŞLANGIÇ ANA PARA (TL)</label>
                <input type="number" id="p" placeholder="Örn: 100.000">
            </div>
            <div class="input-group">
                <label>AYLIK EKLEME (TL)</label>
                <input type="number" id="pm" placeholder="Örn: 5.000">
            </div>
        </div>

        <div class="input-row">
            <div class="input-group">
                <label>YILLIK GETİRİ ORANI (%)</label>
                <input type="number" id="r" placeholder="Örn: 45">
            </div>
            <div class="input-group">
                <label>VADE SÜRESİ (YIL)</label>
                <input type="number" id="y" placeholder="Örn: 10">
            </div>
        </div>

        <button class="calc-btn" onclick="calcFaiz()">STRATEJİYİ ANALİZ ET</button>

        <div id="res" class="result-box">
            <div class="main-res-card">
                <span>Vade Sonu Tahmini Birikim</span>
                <b id="totalRes">0 ₺</b>
            </div>

            <div class="stats-grid">
                <div class="stat-item">
                    <small>TOPLAM YATIRILAN</small>
                    <span id="investedRes">0 ₺</span>
                </div>
                <div class="stat-item">
                    <small>NET KÂR GETİRİSİ</small>
                    <span id="profitRes" style="color: #10b981;">0 ₺</span>
                </div>
            </div>

            <div class="table-wrapper">
                <table id="yearlyTable">
                    <thead>
                        <tr>
                            <th>Yıl</th>
                            <th>Bakiye</th>
                            <th>Net Getiri</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleMenu() { document.getElementById('navMenu').classList.toggle('active'); }
    
    window.onclick = function(e) {
        if (!e.target.matches('.menu-btn') && !e.target.closest('.menu-btn')) {
            const menu = document.getElementById('navMenu');
            if (menu && menu.classList.contains('active')) menu.classList.remove('active');
        }
    }

    function calcFaiz() {
        const p = parseFloat(document.getElementById('p').value) || 0;
        const pm = parseFloat(document.getElementById('pm').value) || 0;
        const rInput = parseFloat(document.getElementById('r').value) || 0;
        const rAylik = (rInput / 100) / 12;
        const y = parseInt(document.getElementById('y').value) || 0;
        
        if (y <= 0) return;

        let tableBody = document.querySelector("#yearlyTable tbody");
        tableBody.innerHTML = "";
        
        let currentBalance = p;
        let totalInvested = p;

        for (let year = 1; year <= y; year++) {
            for (let month = 1; month <= 12; month++) {
                currentBalance = (currentBalance + pm) * (1 + rAylik);
                totalInvested += pm;
            }
            let row = `<tr>
                <td>${year}. Yıl</td>
                <td style="color:#fff">${Math.round(currentBalance).toLocaleString('tr-TR')} ₺</td>
                <td style="color:#10b981">+ ${Math.round(currentBalance - totalInvested).toLocaleString('tr-TR')} ₺</td>
            </tr>`;
            tableBody.innerHTML += row;
        }

        document.getElementById('totalRes').innerText = Math.round(currentBalance).toLocaleString('tr-TR') + " ₺";
        document.getElementById('investedRes').innerText = Math.round(totalInvested).toLocaleString('tr-TR') + " ₺";
        document.getElementById('profitRes').innerText = Math.round(currentBalance - totalInvested).toLocaleString('tr-TR') + " ₺";
        document.getElementById('res').style.display = "block";
    }
</script>
</body>
</html>
