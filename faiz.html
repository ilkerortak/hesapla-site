<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8"><title>H360 | Bileşik Faiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<nav>
    <a href="/" class="logo"><div class="logo-box">H360</div> HESAPLA<span>360</span></a>
    <div class="nav-container">
        <button class="menu-btn" onclick="toggleMenu()">MENÜ ▾</button>
        <div class="dropdown-menu" id="navMenu">
            <a href="/netmaas">💰 Maaş</a><a href="/tazminat">💼 Tazminat</a><a href="/issizlik">📅 İşsizlik</a>
            <a href="/faiz">📈 Faiz</a><a href="/yakit">⛽ Yakıt</a><a href="/enflasyon">📉 Enflasyon</a>
            <a href="/kredi">🏦 Kredi</a><a href="/yas">🎂 Yaş</a><a href="/doviz">💱 Döviz</a>
            <a href="/kdv">🧾 KDV</a><a href="/mesai">🕒 Mesai</a><a href="/cv">📄 CV</a>
        </div>
    </div>
</nav>

<div class="hero-section">
    <h2>Bileşik Faiz Analizi</h2>
    <p>GELECEK SERMAYE VE YATIRIM PROJEKSİYONU</p>
</div>

<div class="form-box">
    <label>BAŞLANGIÇ SERMAYESİ (TL)</label>
    <input type="number" id="p" placeholder="Örn: 100.000">
    
    <label>AYLIK EKLEME (TL)</label>
    <input type="number" id="pm" placeholder="Örn: 5.000">

    <label>YILLIK GETİRİ ORANI (%)</label>
    <input type="number" id="r" placeholder="Örn: 45">

    <label>VADE (YIL)</label>
    <input type="number" id="y" placeholder="Örn: 5">

    <button class="btn-calc" onclick="calcFaiz()">YATIRIMI ANALİZ ET</button>

    <div id="res" class="res-area">
        <p style="color:#555; font-size:0.7rem; font-weight:800;">VADE SONU TOPLAM BİRİKİM</p>
        <div class="res-val" id="total">0 ₺</div>
        <div style="margin-top:15px; font-size:0.8rem; color:#888;">
            Net Kâr: <b id="profit" style="color:#2ecc71">0 ₺</b>
        </div>
    </div>
</div>

<script>
    function toggleMenu() { document.getElementById('navMenu').classList.toggle('active'); }
    function calcFaiz() {
        const p = parseFloat(document.getElementById('p').value) || 0;
        const pm = parseFloat(document.getElementById('pm').value) || 0;
        const r = (parseFloat(document.getElementById('r').value) / 100) / 12;
        const n = parseInt(document.getElementById('y').value) * 12;
        
        let fv = p * Math.pow(1 + r, n) + (pm * (Math.pow(1 + r, n) - 1) / r);
        let totalInvested = p + (pm * n);
        
        document.getElementById('total').innerText = Math.round(fv).toLocaleString() + " ₺";
        document.getElementById('profit').innerText = Math.round(fv - totalInvested).toLocaleString() + " ₺";
        document.getElementById('res').style.display = "block";
    }
</script>
</body>
</html>
