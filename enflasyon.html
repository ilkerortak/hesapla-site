<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H360 | Enflasyon Analizi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="glass-nav">
    <div class="nav-left">
        <a href="index.html" class="logo"><div class="logo-box">H360</div> HESAPLA<span>360</span></a>
    </div>
    <div class="nav-right">
        <div class="menu-container">
            <button class="menu-btn" onclick="toggleMenu()">MENÜ <i class="fa-solid fa-bars-staggered"></i></button>
            <div class="dropdown-menu" id="navMenu">
                <a href="netmaas.html">💰 Maaş</a><a href="tazminat.html">💼 Tazminat</a>
                <a href="issizlik.html">📅 İşsizlik</a><a href="faiz.html">📈 Faiz</a>
                <a href="yakit.html">⛽ Yakıt</a><a href="enflasyon.html">📉 Enflasyon</a>
                <a href="kredi.html">🏦 Kredi</a><a href="yas.html">🎂 Yaş</a>
                <a href="doviz.html">💱 Döviz</a><a href="kdv.html">🧾 KDV</a>
                <a href="mesai.html">🕒 Mesai</a><a href="cv.html">📄 CV</a>
            </div>
        </div>
    </div>
</nav>

<div class="calculation-container">
    <header class="premium-header" style="margin-bottom: 30px;">
        <h1 class="premium-title" style="font-size: 1.8rem;">ENFLASYON ANALİZİ</h1>
        <p class="premium-status">SATIN ALMA GÜCÜ VE DEĞER KAYBI</p>
    </header>

    <div class="form-card">
        <div class="input-group">
            <label>BAŞLANGIÇ TUTARI (TL)</label>
            <input type="number" id="amt" placeholder="Örn: 100000">
        </div>
        
        <div class="input-group">
            <label>YILLIK ENFLASYON ORANI (%)</label>
            <input type="number" id="inf" placeholder="Örn: 65">
        </div>

        <button class="btn-calc" onclick="calcInf()">PARANIN DEĞERİNİ ÖLÇ</button>

        <div id="res" class="res-area">
            <p style="font-size:0.7rem; font-weight:800; color: var(--text-dim); text-transform: uppercase;">1 YIL SONRAKİ REEL DEĞER</p>
            <div class="res-val" id="reel" style="color: #fff;">0 ₺</div>
            
            <div style="margin-top:20px; font-size:0.95rem; color:#e74c3c; font-weight:700; border-top: 1px dashed var(--border); padding-top: 15px;">
                Hissedilen Kayıp: - <span id="loss">0</span> ₺
            </div>
            <p style="font-size: 0.7rem; color: var(--text-dim); margin-top: 12px; line-height: 1.4;">
                * Bu hesaplama, paranın mal ve hizmetler karşısındaki alım gücü erimesini gösterir.
            </p>
        </div>
    </div>
</div>

<script>
    function toggleMenu() { document.getElementById('navMenu').classList.toggle('active'); }

    function calcInf() {
        const a = parseFloat(document.getElementById('amt').value) || 0;
        const rInput = parseFloat(document.getElementById('inf').value) || 0;
        const r = rInput / 100;
        
        if(a > 0 && r > 0) {
            // Paranın enflasyon karşısındaki yeni alım gücü (Reel Değer)
            const reelVal = a / (1 + r);
            const loss = a - reelVal;

            document.getElementById('reel').innerText = Math.round(reelVal).toLocaleString('tr-TR') + " ₺";
            document.getElementById('loss').innerText = Math.round(loss).toLocaleString('tr-TR');
            document.getElementById('res').style.display = "block";
        }
    }

    window.onclick = function(e) { 
        if(!e.target.matches('.menu-btn') && !e.target.closest('.menu-btn')) {
            const menu = document.getElementById('navMenu');
            if(menu && menu.classList.contains('active')) menu.classList.remove('active');
        }
    }
</script>
</body>
</html>
