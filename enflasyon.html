<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H360 | Enflasyon Analizi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <a href="/" class="logo"><div class="logo-box">H360</div> HESAPLA<span>360</span></a>
    <div class="nav-container">
        <button class="menu-btn" onclick="toggleMenu()">MENÜ ▾</button>
        <div class="dropdown-menu" id="navMenu">
            <a href="/netmaas">💰 Maaş</a><a href="/tazminat">💼 Tazminat</a>
            <a href="/issizlik">📅 İşsizlik</a><a href="/faiz">📈 Faiz</a>
            <a href="/yakit">⛽ Yakıt</a><a href="/enflasyon">📉 Enflasyon</a>
            <a href="/kredi">🏦 Kredi</a><a href="/yas">🎂 Yaş</a>
            <a href="/doviz">💱 Döviz</a><a href="/kdv">🧾 KDV</a>
            <a href="/mesai">🕒 Mesai</a><a href="/cv">📄 CV</a>
        </div>
    </div>
</nav>

<div class="hero-section">
    <h2>Enflasyon Analizi</h2>
    <p>SATIN ALMA GÜCÜ VE DEĞER KAYBI SORGULAMA</p>
</div>

<div class="form-box">
    <label>BAŞLANGIÇ TUTARI (TL)</label>
    <input type="number" id="amt" placeholder="Örn: 100.000">
    
    <label>YILLIK ENFLASYON ORANI (%)</label>
    <input type="number" id="inf" placeholder="Örn: 65">

    <button class="btn-calc" onclick="calcInf()">PARANIN DEĞERİNİ ÖLÇ</button>

    <div id="res" class="res-area">
        <p style="color:#555; font-size:0.75rem; font-weight:800;">1 YIL SONRAKİ REEL DEĞER</p>
        <div class="res-val" id="reel">0 ₺</div>
        <div style="margin-top:20px; font-size:0.9rem; color:#e74c3c; font-weight:700; border-top: 1px solid #1c212c; padding-top: 15px;">
            Hissedilen Kayıp: - <span id="loss">0</span> ₺
        </div>
    </div>
</div>

<script>
    // Menü kontrolü
    function toggleMenu() { 
        document.getElementById('navMenu').classList.toggle('active'); 
    }

    // Enflasyon hesaplama motoru
    function calcInf() {
        const a = parseFloat(document.getElementById('amt').value) || 0;
        const r = parseFloat(document.getElementById('inf').value) / 100;
        
        if(a > 0 && r > 0) {
            const reelVal = a / (1 + r);
            document.getElementById('reel').innerText = Math.round(reelVal).toLocaleString() + " ₺";
            document.getElementById('loss').innerText = Math.round(a - reelVal).toLocaleString();
            document.getElementById('res').style.display = "block";
        }
    }

    // Menü dışı tıklama kapatma
    window.onclick = function(event) {
        if (!event.target.matches('.menu-btn')) {
            var dropdowns = document.getElementsByClassName("dropdown-menu");
            for (var i = 0; i < dropdowns.length; i++) {
                var openDropdown = dropdowns[i];
                if (openDropdown.classList.contains('active')) {
                    openDropdown.classList.remove('active');
                }
            }
        }
    }
</script>
</body>
</html>
