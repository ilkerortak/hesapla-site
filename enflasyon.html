<div class="hero-section">
    <h2>Enflasyon Analizi</h2>
    <p>SATIN ALMA GÜCÜ VE DEĞER KAYBI SORGULAMA</p>
</div>

<div class="form-box">
    <label>BAŞLANGIÇ TUTARI (TL)</label>
    <input type="number" id="amt" placeholder="Örn: 100.000">
    
    <label>YILLIK ENFLASYON ORANI (%)</label>
    <input type="number" id="inf" placeholder="Örn: 65">

    <button class="btn-calc" onclick="calcInf()">PARANIN DEĞERİNİ ÖLÇ</button>

    <div id="res" class="res-area">
        <p style="color:#555; font-size:0.7rem; font-weight:800;">1 YIL SONRAKİ REEL DEĞER</p>
        <div class="res-val" id="reel">0 ₺</div>
        <div style="margin-top:15px; font-size:0.85rem; color:#e74c3c; font-weight:700;">
            Hissedilen Kayıp: - <span id="loss">0</span> ₺
        </div>
    </div>
</div>

<script>
    function calcInf() {
        const a = parseFloat(document.getElementById('amt').value) || 0;
        const r = parseFloat(document.getElementById('inf').value) / 100;
        const reelVal = a / (1 + r);
        document.getElementById('reel').innerText = Math.round(reelVal).toLocaleString() + " ₺";
        document.getElementById('loss').innerText = Math.round(a - reelVal).toLocaleString();
        document.getElementById('res').style.display = "block";
    }
</script>
