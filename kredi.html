<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8"><title>H360 | Kredi Planlama</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="hero-section">
    <h2>Kredi Planlama</h2>
    <p>BANKA TAKSİT VE TOPLAM MALİYET ANALİZİ</p>
</div>

<div class="form-box">
    <label>KREDİ TUTARI (TL)</label>
    <input type="number" id="kt" placeholder="Örn: 250.000">
    
    <label>AYLIK FAİZ ORANI (%)</label>
    <input type="number" id="kf" placeholder="Örn: 3.99">

    <label>VADE (AY)</label>
    <input type="number" id="kv" placeholder="Örn: 12">

    <button class="btn-calc" onclick="calcKredi()">TAKSİT HESAPLA</button>

    <div id="res" class="res-area">
        <p style="color:#555; font-size:0.7rem; font-weight:800;">AYLIK TAKSİT TUTARI</p>
        <div class="res-val" id="taksit">0 ₺</div>
        <div style="display:flex; justify-content:space-between; margin-top:15px; font-size:0.8rem; color:#888;">
            <span>Toplam Ödeme: <b id="totalPay" style="color:#fff">0 ₺</b></span>
            <span>Faiz Yükü: <b id="totalInterest" style="color:#e74c3c">0 ₺</b></span>
        </div>
    </div>
</div>

<script>
    function calcKredi() {
        const t = parseFloat(document.getElementById('kt').value) || 0;
        const r = (parseFloat(document.getElementById('kf').value) / 100);
        const v = parseInt(document.getElementById('kv').value) || 0;
        
        if(t > 0 && r > 0 && v > 0) {
            const m = (t * r * Math.pow(1+r, v)) / (Math.pow(1+r, v) - 1);
            const total = m * v;
            document.getElementById('taksit').innerText = Math.round(m).toLocaleString() + " ₺";
            document.getElementById('totalPay').innerText = Math.round(total).toLocaleString() + " ₺";
            document.getElementById('totalInterest').innerText = Math.round(total - t).toLocaleString() + " ₺";
            document.getElementById('res').style.display = "block";
        }
    }
</script>
</body>
</html>
