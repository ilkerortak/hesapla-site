<h1>Kredi Hesaplama 2026</h1>
<p>Kredi tutarı, vade ve faiz oranını girin:</p>
<input type="number" id="tutar" placeholder="Kredi Tutarı">
<input type="number" id="vade" placeholder="Vade (ay)">
<input type="number" id="faiz" placeholder="Faiz (%)">
<button onclick="hesapla()">Hesapla</button>
<h2 id="sonuc"></h2>
<script>
function hesapla() {
  let tutar = parseFloat(document.getElementById("tutar").value);
  let vade = parseFloat(document.getElementById("vade").value);
  let faiz = parseFloat(document.getElementById("faiz").value)/100;
  let aylik = tutar * (1 + faiz) / vade;
  document.getElementById("sonuc").innerText = "Aylık Ödeme: " + aylik.toFixed(2) + " TL";
}
</script>
