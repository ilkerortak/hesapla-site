<div class="container"><h2>🏦 Kredi Analizi</h2>
<div class="input-group"><label>Tutar</label><input type="number" id="t"></div>
<div class="input-group"><label>Vade</label><input type="number" id="v"></div>
<div class="input-group"><label>Faiz %</label><input type="number" id="f" step="0.01"></div>
<button onclick="calc()">Hesapla</button>
<div id="res" class="result-box">
    <div class="row"><span>Aylık Taksit</span><span id="at"></span></div>
    <div class="row total"><span>Toplam Geri Ödeme</span><span id="go"></span></div>
</div></div>
<script>function calc(){let t=document.getElementById("t").value, v=document.getElementById("v").value, f=(document.getElementById("f").value/100)*1.3;
if(!t||!v||!f)return; let tak=(t*f*Math.pow(1+f,v))/(Math.pow(1+f,v)-1);
document.getElementById("res").style.display="block"; document.getElementById("at").innerText=tak.toLocaleString()+" TL";
document.getElementById("go").innerText=(tak*v).toLocaleString()+" TL";}</script>
</body></html>
