<!DOCTYPE html>
<html lang="tr">
<head><meta charset="UTF-8"><link rel="stylesheet" href="style.css"><title>Kredi Planı</title></head>
<body>
<nav>

    <div class="nav-menu">
        <a href="netmaas.html">💰 Maaş</a><a href="tazminat.html">💼 Tazminat</a><a href="issizlik.html">📅 İşsizlik</a>

    </div>
</nav>

<div class="container">
    <h2>🏦 Kredi Ödeme Planı</h2>
    <div class="input-group"><label>Kredi Tutarı</label><input type="number" id="t"></div>
    <div class="input-group"><label>Vade (Ay)</label><input type="number" id="v"></div>
    <div class="input-group"><label>Aylık Faiz (%)</label><input type="number" id="f" step="0.01"></div>
    <button onclick="calc()">Taksitleri Gör</button>
    <div id="res" class="result-box">
        <div class="row"><span>Aylık Taksit</span><span id="at"></span></div>
        <div class="row total"><span>Toplam Geri Ödeme</span><span id="go" style="color:var(--accent); font-weight:800;"></span></div>
    </div>
</div>

<script>
function calc(){
    let t=parseFloat(document.getElementById("t").value), v=parseFloat(document.getElementById("v").value), f=(parseFloat(document.getElementById("f").value)/100)*1.3;
    if(!t || !v || !f) return;
    let tak=(t*f*Math.pow(1+f,v))/(Math.pow(1+f,v)-1);
    document.getElementById("res").style.display="block";
    document.getElementById("at").innerText=tak.toLocaleString()+" ₺";
    document.getElementById("go").innerText=(tak*v).toLocaleString()+" ₺";
}
</script>
</body></html>
