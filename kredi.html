<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H360 | Kredi Analiz Merkezi</title>
    <meta name="description" content="2026 güncel banka faiz oranları ile kredi hesaplama. 8 popüler banka seçeneğiyle ödeme planınızı oluşturun.">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1894587939365426" crossorigin="anonymous"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --primary: #3b82f6;
            --bg: #0b0f19;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #cbd5e0;
        }

        body { background-color: var(--bg); margin: 0; font-family: 'Inter', sans-serif; color: var(--text-main); }

        /* Navigasyon */
        .glass-nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(11, 15, 25, 0.8); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border); padding: 12px 0;
        }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 25px; }
        .logo-box-main { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-icon { background: var(--primary); width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; }
        .logo-text { color: #fff; font-size: 1.3rem; font-weight: 700; }
        .logo-text span { color: var(--primary); }

        .main-wrapper { padding: 120px 20px 60px; display: flex; flex-direction: column; align-items: center; }

        /* Kredi Türü Seçici */
        .type-tabs { display: flex; gap: 10px; margin-bottom: 30px; background: var(--card-bg); padding: 6px; border-radius: 16px; border: 1px solid var(--border); }
        .t-btn { padding: 12px 24px; border: none; background: transparent; color: #94a3b8; cursor: pointer; border-radius: 12px; font-weight: 700; font-size: 0.8rem; transition: 0.3s; }
        .t-btn.active { background: var(--primary); color: #fff; }

        /* Ana Kart */
        .calc-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 28px; padding: 30px; width: 100%; max-width: 850px; }

        /* Banka Grid - Emojili ve Kurumsal Renkli */
        .bank-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 30px; }
        .bank-item {
            background: rgba(255,255,255,0.02); border: 1px solid var(--border);
            border-radius: 16px; padding: 12px; text-align: center; cursor: pointer; transition: 0.3s;
            position: relative; overflow: hidden;
        }
        .bank-item:hover { transform: translateY(-3px); border-color: var(--primary); }
        .bank-item.active { border-color: var(--primary); background: rgba(59, 130, 246, 0.1); }
        
        .b-emoji { font-size: 1.5rem; display: block; margin-bottom: 5px; }
        .b-name { display: block; font-size: 0.7rem; font-weight: 700; color: #fff; }
        .b-rate { display: block; font-size: 0.8rem; color: var(--primary); font-weight: 800; margin-top: 2px; }

        /* Form Alanları */
        .input-group { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .field { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.65rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; }
        input { background: #080b12; border: 1px solid var(--border); padding: 15px; border-radius: 12px; color: #fff; font-size: 1rem; outline: none; }
        input:focus { border-color: var(--primary); }

        .run-btn { width: 100%; padding: 18px; background: var(--primary); color: #fff; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        
        /* Sonuçlar */
        .res-panel { margin-top: 35px; display: none; }
        .res-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .res-card { background: #080b12; border: 1px solid var(--border); padding: 20px; border-radius: 18px; text-align: center; }
        .res-card b { display: block; font-size: 1.6rem; color: #fff; margin-top: 5px; }

        .scroll-area { max-height: 350px; overflow-y: auto; border-radius: 15px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; background: #080b12; font-size: 0.8rem; }
        th { background: #1e293b; color: #fff; padding: 12px; text-align: left; position: sticky; top: 0; }
        td { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.03); color: #94a3b8; }

        @media (max-width: 768px) { .bank-grid { grid-template-columns: 1fr 1fr; } .input-group { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<nav class="glass-nav">
    <div class="nav-container">
        <a href="index.html" class="logo-box-main">
            <div class="logo-icon">H</div>
            <div class="logo-text">HESAPLA<span>360</span></div>
        </a>
        <div style="color: #fff; cursor: pointer;"><i class="fa-solid fa-bars-staggered"></i></div>
    </div>
</nav>

<div class="main-wrapper">
    <div class="type-tabs">
        <button class="t-btn active" onclick="changeT('ihtiyac', this)">İHTİYAÇ</button>
        <button class="t-btn" onclick="changeT('tasit', this)">TAŞIT</button>
        <button class="t-btn" onclick="changeT('konut', this)">KONUT</button>
    </div>

    <div class="calc-card">
        <div class="bank-grid">
            <div class="bank-item active" onclick="setR(3.89, this)"><span class="b-emoji">🔴</span><span class="b-name">Ziraat</span><span class="b-rate">%3.75</span></div>
            <div class="bank-item" onclick="setR(4.10, this)"><span class="b-emoji">🔵</span><span class="b-name">İş Bankası</span><span class="b-rate">%4.10</span></div>
            <div class="bank-item" onclick="setR(4.24, this)"><span class="b-emoji">🟢</span><span class="b-name">Garanti</span><span class="b-rate">%4.24</span></div>
            <div class="bank-item" onclick="setR(3.89, this)"><span class="b-emoji">🦁</span><span class="b-name">Akbank</span><span class="b-rate">%3.89</span></div>
            <div class="bank-item" onclick="setR(3.99, this)"><span class="b-emoji">🟡</span><span class="b-name">Vakıfbank</span><span class="b-rate">%3.99</span></div>
            <div class="bank-item" onclick="setR(4.35, this)"><span class="b-emoji">🏢</span><span class="b-name">Yapı Kredi</span><span class="b-rate">%4.35</span></div>
            <div class="bank-item" onclick="setR(4.50, this)"><span class="b-emoji">🍊</span><span class="b-name">ING Bank</span><span class="b-rate">%4.50</span></div>
            <div class="bank-item" onclick="setR(4.15, this)"><span class="b-emoji">🦅</span><span class="b-name">QNB</span><span class="b-rate">%4.15</span></div>
        </div>

        <div class="input-group">
            <div class="field"><label>Kredi Tutarı</label><input type="number" id="amt" value="100000"></div>
            <div class="field"><label>Aylık Faiz (%)</label><input type="number" id="rat" step="0.01" value="3.75"></div>
            <div class="field"><label>Vade (Ay)</label><input type="number" id="trm" value="12"></div>
        </div>

        <button class="run-btn" onclick="calc()">HESAPLA</button>

        <div id="res" class="res-panel">
            <div class="res-grid">
                <div class="res-card"><span>Aylık Taksit</span><b id="mP">0 ₺</b></div>
                <div class="res-card"><span>Toplam Ödeme</span><b id="tP">0 ₺</b></div>
            </div>
            <div class="scroll-area">
                <table id="tbl">
                    <thead><tr><th>Ay</th><th>Taksit</th><th>Ana Para</th><th>Faiz+Vergi</th><th>Kalan</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    let mode = 'ihtiyac';
    function changeT(t, b) {
        document.querySelectorAll('.t-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        mode = t;
    }
    function setR(v, e) {
        document.querySelectorAll('.bank-item').forEach(x => x.classList.remove('active'));
        e.classList.add('active');
        document.getElementById('rat').value = v;
    }
    function calc() {
        const a = parseFloat(document.getElementById('amt').value);
        const r = parseFloat(document.getElementById('rat').value) / 100;
        const v = parseInt(document.getElementById('trm').value);
        const tax = (mode === 'konut') ? 1 : 1.20; 
        const nR = r * tax;
        const m = (a * nR * Math.pow(1 + nR, v)) / (Math.pow(1 + nR, v) - 1);
        
        document.getElementById('mP').innerText = Math.round(m).toLocaleString('tr-TR') + " ₺";
        document.getElementById('tP').innerText = Math.round(m * v).toLocaleString('tr-TR') + " ₺";

        const tb = document.querySelector('#tbl tbody');
        tb.innerHTML = "";
        let rem = a;
        for(let i=1; i<=v; i++) {
            let fz = rem * nR;
            let ap = m - fz;
            rem -= ap;
            tb.innerHTML += `<tr><td>${i}</td><td>${Math.round(m).toLocaleString('tr-TR')} ₺</td><td>${Math.round(ap).toLocaleString('tr-TR')} ₺</td><td>${Math.round(fz).toLocaleString('tr-TR')} ₺</td><td>${Math.max(0, Math.round(rem)).toLocaleString('tr-TR')} ₺</td></tr>`;
        }
        document.getElementById('res').style.display = 'block';
    }
</script>
</body>
</html>
