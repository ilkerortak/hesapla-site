<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H360 | Kredi Planlama</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="glass-nav">
    <div class="nav-left">
        <a href="index.html" class="logo"><div class="logo-box">H360</div> HESAPLA<span>360</span></a>
    </div>
    <div class="nav-right">
        <div class="menu-container">
            <button class="menu-btn" onclick="toggleMenu()">MENÜ <i class="fa-solid fa-bars-staggered"></i></button>
            <div class="dropdown-menu" id="navMenu">
                <a href="netmaas.html">💰 Maaş</a><a href="tazminat.html">💼 Tazminat</a>
                <a href="issizlik.html">📅 İşsizlik</a><a href="faiz.html">📈 Faiz</a>
                <a href="yakit.html">⛽ Yakıt</a><a href="enflasyon.html">📉 Enflasyon</a>
                <a href="kredi.html">🏦 Kredi</a><a href="yas.html">🎂 Yaş</a>
                <a href="doviz.html">💱 Döviz</a><a href="kdv.html">🧾 KDV</a>
                <a href="mesai.html">🕒 Mesai</a><a href="cv.html">📄 CV</a>
            </div>
        </div>
    </div>
</nav>

<div class="calculation-container">
    <header class="premium-header" style="margin-bottom: 30px;">
        <h1 class="premium-title" style="font-size: 1.8rem;">KREDİ PLANLAMA</h1>
        <p class="premium-status">BANKA TAKSİT VE MALİYET ANALİZİ</p>
    </header>

    <div class="form-card">
        <div class="input-group">
            <label>KREDİ TUTARI (TL)</label>
            <input type="number" id="kt" placeholder="Örn: 250000">
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="input-group">
                <label>AYLIK FAİZ (%)</label>
                <input type="number" id="kf" placeholder="Örn: 3.99">
            </div>
            <div class="input-group">
                <label>VADE (AY)</label>
                <input type="number" id="kv" placeholder="Örn: 12">
            </div>
        </div>

        <button class="btn-calc" onclick="calcKredi()">TAKSİT HESAPLA</button>

        <div id="res" class="res-area">
            <p style="font-size:0.7rem; font-weight:800; color: var(--text-dim); text-transform: uppercase;">AYLIK TAKSİT TUTARI</p>
            <div class="res-val" id="taksit" style="color: #fff;">0 ₺</div>
            
            <div style="display:flex; justify-content:space-between; margin-top:20px; font-size:0.85rem; color:var(--text-dim); border-top: 1px dashed var(--border); padding-top: 15px;">
                <span>Toplam Ödeme: <b id="totalPay" style="color:#fff">0 ₺</b></span>
                <span>Faiz Yükü: <b id="totalInterest" style="color:#e74c3c">0 ₺</b></span>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleMenu() { document.getElementById('navMenu').classList.toggle('active'); }

    function calcKredi() {
        const t = parseFloat(document.getElementById('kt').value) || 0;
        const r = (parseFloat(document.getElementById('kf').value) / 100);
        const v = parseInt(document.getElementById('kv').value) || 0;
        
        if(t > 0 && r > 0 && v > 0) {
            // Standart banka kredi taksit formülü
            const m = (t * r * Math.pow(1+r, v)) / (Math.pow(1+r, v) - 1);
            const total = m * v;
            
            document.getElementById('taksit').innerText = Math.round(m).toLocaleString('tr-TR') + " ₺";
            document.getElementById('totalPay').innerText = Math.round(total).toLocaleString('tr-TR') + " ₺";
            document.getElementById('totalInterest').innerText = Math.round(total - t).toLocaleString('tr-TR') + " ₺";
            document.getElementById('res').style.display = "block";
        }
    }

    window.onclick = function(e) { 
        if(!e.target.matches('.menu-btn') && !e.target.closest('.menu-btn')) {
            const menu = document.getElementById('navMenu');
            if(menu && menu.classList.contains('active')) menu.classList.remove('active');
        }
    }
</script>
</body>
</html>
