<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H360 | Kredi Planlama</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* CSS dosyasındaki olası kaymaları engelleyen mermi gibi stiller */
        body { background-color: #0b0f19; margin: 0; font-family: 'Inter', sans-serif; color: #fff; }
        .main-wrapper { 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; padding: 100px 20px 60px; box-sizing: border-box; 
        }
        .calc-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 480px;
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .header-area { text-align: center; margin-bottom: 35px; }
        .header-area h1 { font-size: 1.6rem; letter-spacing: 2px; margin: 0; font-weight: 700; }
        .header-area p { color: #007bff; font-size: 0.75rem; font-weight: 700; margin-top: 8px; text-transform: uppercase; }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; color: #007bff; font-size: 0.7rem; font-weight: 800; margin-bottom: 10px; }
        .input-group input {
            width: 100%; padding: 16px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            color: #fff; font-size: 1rem; outline: none; transition: 0.3s; box-sizing: border-box;
        }
        .input-group input:focus { border-color: #007bff; background: rgba(255,255,255,0.08); }
        
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .calc-btn {
            width: 100%; padding: 18px; background: #007bff; color: #fff;
            border: none; border-radius: 12px; font-weight: 700; cursor: pointer;
            font-size: 1rem; transition: 0.3s; margin-top: 10px;
        }
        .calc-btn:hover { background: #0056b3; transform: translateY(-2px); }
        
        .result-box {
            margin-top: 30px; padding-top: 25px; border-top: 1px dashed rgba(255,255,255,0.15);
            display: none;
        }
        .result-label { font-size: 0.7rem; color: #888; font-weight: 800; text-align: center; margin-bottom: 5px; }
        .result-main { font-size: 2.2rem; font-weight: 700; color: #fff; text-align: center; margin-bottom: 20px; }
        .result-footer { display: flex; justify-content: space-between; font-size: 0.85rem; color: #aaa; }
        .result-footer b { color: #fff; }
    </style>
</head>
<body>

<nav class="glass-nav">
    <div class="nav-left">
        <a href="index.html" class="logo"><div class="logo-box">H360</div> HESAPLA<span>360</span></a>
    </div>
    <div class="nav-right">
        <div class="menu-container">
            <button class="menu-btn" onclick="toggleMenu()">MENÜ <i class="fa-solid fa-bars-staggered"></i></button>
            <div class="dropdown-menu" id="navMenu">
                <a href="netmaas.html">💰 Maaş</a><a href="tazminat.html">💼 Tazminat</a>
                <a href="issizlik.html">📅 İşsizlik</a><a href="faiz.html">📈 Faiz</a>
                <a href="yakit.html">⛽ Yakıt</a><a href="enflasyon.html">📉 Enflasyon</a>
                <a href="kredi.html">🏦 Kredi</a><a href="yas.html">🎂 Yaş</a>
                <a href="doviz.html">💱 Döviz</a><a href="kdv.html">🧾 KDV</a>
                <a href="mesai.html">🕒 Mesai</a><a href="cv.html">📄 CV</a>
            </div>
        </div>
    </div>
</nav>

<div class="main-wrapper">
    <div class="calc-card">
        <div class="header-area">
            <h1>KREDİ PLANLAMA</h1>
            <p>BANKA TAKSİT VE MALİYET ANALİZİ</p>
        </div>

        <div class="input-group">
            <label>KREDİ TUTARI (TL)</label>
            <input type="number" id="kt" placeholder="Örn: 250000">
        </div>

        <div class="grid-inputs">
            <div class="input-group">
                <label>AYLIK FAİZ (%)</label>
                <input type="number" id="kf" placeholder="Örn: 3.99">
            </div>
            <div class="input-group">
                <label>VADE (AY)</label>
                <input type="number" id="kv" placeholder="Örn: 12">
            </div>
        </div>

        <button class="calc-btn" onclick="calcKredi()">TAKSİT HESAPLA</button>

        <div id="res" class="result-box">
            <div class="result-label">AYLIK TAKSİT TUTARI</div>
            <div class="result-main" id="taksit">0 ₺</div>
            <div class="result-footer">
                <span>Toplam Ödeme: <b id="totalPay">0 ₺</b></span>
                <span>Faiz Yükü: <b id="totalInterest" style="color: #e74c3c;">0 ₺</b></span>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleMenu() { document.getElementById('navMenu').classList.toggle('active'); }

    function calcKredi() {
        const t = parseFloat(document.getElementById('kt').value) || 0;
        const r = (parseFloat(document.getElementById('kf').value) / 100);
        const v = parseInt(document.getElementById('kv').value) || 0;
        
        if(t > 0 && r > 0 && v > 0) {
            const m = (t * r * Math.pow(1+r, v)) / (Math.pow(1+r, v) - 1);
            const total = m * v;
            
            document.getElementById('taksit').innerText = Math.round(m).toLocaleString('tr-TR') + " ₺";
            document.getElementById('totalPay').innerText = Math.round(total).toLocaleString('tr-TR') + " ₺";
            document.getElementById('totalInterest').innerText = Math.round(total - t).toLocaleString('tr-TR') + " ₺";
            document.getElementById('res').style.display = "block";
        }
    }

    window.onclick = function(e) { 
        if(!e.target.matches('.menu-btn') && !e.target.closest('.menu-btn')) {
            const menu = document.getElementById('navMenu');
            if(menu && menu.classList.contains('active')) menu.classList.remove('active');
        }
    }
</script>
</body>
</html>
