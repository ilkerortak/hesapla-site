<!DOCTYPE html>
<html lang="tr">
<head><link rel="stylesheet" href="style.css"></head>
<body>
<nav><a href="index.html" class="logo">HESAPLA<span>360</span></a><div class="nav-menu">
    <a href="netmaas.html">💰 Maaş</a><a href="tazminat.html">💼 Tazminat</a><a href="issizlik.html">📅 İşsizlik</a>
    <a href="kredi.html" class="active">🏦 Kredi</a><a href="yas.html">🎂 Yaş</a><a href="doviz.html">💱 Döviz</a>
    <a href="kdv.html">🧾 KDV</a><a href="mesai.html">🕒 Mesai</a><a href="cv.html">📄 CV</a>
</div></nav>
<div class="container">
    <h2>🏦 Kredi Ödeme Planı</h2>
    <div class="input-group"><label>Kredi Tutarı</label><input type="number" id="t" placeholder="Örn: 100000"></div>
    <div class="input-group"><label>Vade (Ay)</label><input type="number" id="v" placeholder="Örn: 12"></div>
    <div class="input-group"><label>Aylık Faiz (%)</label><input type="number" id="f" step="0.01" placeholder="Örn: 3.50"></div>
    <button onclick="calc()">Hesapla</button>
    <div id="res" class="result-box">
        <div class="row"><span>Aylık Taksit</span><span id="at"></span></div>
        <div class="row"><span>Toplam Faiz</span><span id="tf"></span></div>
        <div class="row total"><span>Toplam Geri Ödeme</span><span id="go"></span></div>
    </div>
</div>
<script>
function calc(){
    let t=parseFloat(document.getElementById("t").value);
    let v=parseFloat(document.getElementById("v").value);
    let f=(parseFloat(document.getElementById("f").value)/100) * 1.3; // Vergi (KKDF+BSMV) dahil
    if(!t || !v || !f) return;
    let tak=(t*f*Math.pow(1+f,v))/(Math.pow(1+f,v)-1);
    document.getElementById("res").style.display="block";
    document.getElementById("at").innerText = tak.toLocaleString() + " TL";
    document.getElementById("tf").innerText = ((tak*v) - t).toLocaleString() + " TL";
    document.getElementById("go").innerText = (tak*v).toLocaleString() + " TL";
}
</script>
</body></html>
