<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H360 | Döviz Çevirici</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #0b0f19; margin: 0; font-family: 'Inter', sans-serif; color: #fff; }
        .main-wrapper { display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 100px 20px 60px; box-sizing: border-box; }
        
        .calc-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px; padding: 35px; width: 100%; max-width: 500px;
            backdrop-filter: blur(12px); box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .header-area { text-align: center; margin-bottom: 30px; }
        .header-area h1 { font-size: 1.5rem; letter-spacing: 2px; margin: 0; font-weight: 700; }
        .header-area p { color: #007bff; font-size: 0.7rem; font-weight: 800; margin-top: 8px; text-transform: uppercase; }
        
        /* Çevrim Modu Switcher */
        .mode-switcher {
            display: flex; background: rgba(255,255,255,0.05); border-radius: 12px;
            padding: 5px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.08);
        }
        .mode-btn {
            flex: 1; padding: 10px; border: none; background: transparent;
            color: #888; font-size: 0.75rem; font-weight: 700; cursor: pointer;
            border-radius: 8px; transition: 0.3s;
        }
        .mode-btn.active { background: #007bff; color: #fff; }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; color: #007bff; font-size: 0.65rem; font-weight: 800; margin-bottom: 8px; }
        
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper i { position: absolute; left: 15px; color: #555; font-size: 0.9rem; }
        
        .input-group input, .input-group select {
            width: 100%; padding: 16px 16px 16px 45px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            color: #fff; font-size: 1rem; outline: none; transition: 0.3s; box-sizing: border-box;
        }
        .input-group select { padding-left: 15px; cursor: pointer; appearance: none; background-image: url("data:image/svg+xml,..."); }
        .input-group input:focus { border-color: #007bff; background: rgba(255,255,255,0.08); }

        .swap-icon { text-align: center; margin: -10px 0 10px; color: #007bff; font-size: 1.2rem; opacity: 0.5; }

        .calc-btn {
            width: 100%; padding: 18px; background: #007bff; color: #fff;
            border: none; border-radius: 12px; font-weight: 700; cursor: pointer;
            font-size: 1rem; transition: 0.3s;
        }
        .calc-btn:hover { background: #0056b3; transform: translateY(-2px); }
        
        .result-box {
            margin-top: 30px; padding: 25px; background: rgba(46, 204, 113, 0.05);
            border-radius: 20px; border: 1px solid rgba(46, 204, 113, 0.1);
            display: none; text-align: center; animation: fadeIn 0.4s ease;
        }
        .result-label { font-size: 0.7rem; color: #2ecc71; font-weight: 800; margin-bottom: 10px; text-transform: uppercase; }
        .result-main { font-size: 2.2rem; font-weight: 700; color: #fff; margin-bottom: 5px; }
        .result-sub { font-size: 0.8rem; color: #888; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<nav class="glass-nav">
    <div class="nav-left">
        <a href="index.html" class="logo"><div class="logo-box">H360</div> HESAPLA<span>360</span></a>
    </div>
    <div class="nav-right">
        <button class="menu-btn" onclick="toggleMenu()">MENÜ <i class="fa-solid fa-bars-staggered"></i></button>
    </div>
</nav>

<div class="main-wrapper">
    <div class="calc-card">
        <div class="header-area">
            <h1>DÖVİZ ÇEVİRİCİ</h1>
            <p>ANLIK KUR VE VARLIK HESAPLAMA</p>
        </div>

        <div class="mode-switcher">
            <button class="mode-btn active" onclick="setMode('toTL', this)">DÖVİZ → TL</button>
            <button class="mode-btn" onclick="setMode('fromTL', this)">TL → DÖVİZ</button>
        </div>

        <div class="input-group">
            <label id="inputLabel">DÖVİZ TUTARI</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-money-bill-1-wave" id="inputIcon"></i>
                <input type="number" id="amount" placeholder="0.00">
            </div>
        </div>

        <div class="swap-icon"><i class="fa-solid fa-repeat"></i></div>

        <div class="input-group">
            <label>HEDEF PARA BİRİMİ</label>
            <select id="currency">
                <option value="32.85" data-code="USD">🇺🇸 USD - Amerikan Doları</option>
                <option value="35.60" data-code="EUR">🇪🇺 EUR - Euro</option>
                <option value="41.40" data-code="GBP">🇬🇧 GBP - İngiliz Sterlini</option>
                <option value="36.20" data-code="CHF">🇨🇭 CHF - İsviçre Frangı</option>
                <option value="21.50" data-code="CAD">🇨🇦 CAD - Kanada Doları</option>
                <option value="8.95" data-code="SAR">🇸🇦 SAR - Suudi Arabistan Riyali</option>
                <option value="0.21" data-code="JPY">🇯🇵 JPY - Japon Yeni (100)</option>
                <option value="4.55" data-code="CNY">🇨🇳 CNY - Çin Yuanı</option>
                <option value="8.35" data-code="PLN">🇵🇱 PLN - Polonya Zlotisi</option>
            </select>
        </div>

        <button class="calc-btn" onclick="convert()">HESAPLA</button>

        <div id="res" class="result-box">
            <div class="result-label" id="resLabel">HESAPLANAN TUTAR</div>
            <div class="result-main" id="resVal">0.00</div>
            <div class="result-sub" id="resInfo">1 USD = 32.85 TL</div>
        </div>
    </div>
</div>

<script>
    let currentMode = 'toTL';

    function setMode(mode, btn) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const label = document.getElementById('inputLabel');
        const icon = document.getElementById('inputIcon');
        
        if(mode === 'toTL') {
            label.innerText = "DÖVİZ TUTARI";
            icon.className = "fa-solid fa-money-bill-1-wave";
        } else {
            label.innerText = "TL TUTARI";
            icon.className = "fa-solid fa-turkish-lira-sign";
        }
    }

    function convert() {
        const amt = parseFloat(document.getElementById('amount').value) || 0;
        const select = document.getElementById('currency');
        const rate = parseFloat(select.value);
        const code = select.options[select.selectedIndex].getAttribute('data-code');
        
        if(amt <= 0) return;

        let result;
        let infoText;
        
        if(currentMode === 'toTL') {
            result = amt * rate;
            document.getElementById('resVal').innerText = result.toLocaleString('tr-TR', {minimumFractionDigits: 2}) + " ₺";
            infoText = `1 ${code} = ${rate} TL`;
        } else {
            result = amt / rate;
            document.getElementById('resVal').innerText = result.toLocaleString('en-US', {minimumFractionDigits: 2}) + " " + code;
            infoText = `${amt} TL / ${rate} (Kur)`;
        }

        document.getElementById('resInfo').innerText = infoText;
        document.getElementById('res').style.display = "block";
    }

    function toggleMenu() { /* Ana navigasyon tetikleyicisi */ }
</script>
</body>
</html>
