<div class="hero-section">
    <h2>Döviz Çevirici</h2>
    <p>GÜNCEL KUR ÜZERİNDEN VARLIK ANALİZİ</p>
</div>

<div class="form-box">
    <label>TUTAR</label>
    <input type="number" id="amount" placeholder="Örn: 1000">
    
    <label>DÖVİZ CİNSİ</label>
    <select id="currency">
        <option value="32.50">USD ($)</option>
        <option value="35.20">EUR (€)</option>
        <option value="41.10">GBP (£)</option>
    </select>

    <button class="btn-calc" onclick="calcDoviz()">TL KARŞILIĞINI GÖR</button>

    <div id="res" class="res-area">
        <p style="color:#555; font-size:0.7rem; font-weight:800;">TAHMİNİ TL KARŞILIĞI</p>
        <div class="res-val" id="tlResult">0 ₺</div>
        <p style="font-size:0.7rem; color:#444; margin-top:10px;">* Serbest piyasa kurları baz alınmıştır.</p>
    </div>
</div>

<script>
    function calcDoviz() {
        const amt = parseFloat(document.getElementById('amount').value) || 0;
        const rate = parseFloat(document.getElementById('currency').value);
        const result = amt * rate;
        
        document.getElementById('tlResult').innerText = result.toLocaleString() + " ₺";
        document.getElementById('res').style.display = "block";
    }
</script>
