<!DOCTYPE html>
<html lang="tr">
<head><link rel="stylesheet" href="style.css"></head>
<body>
<nav><a href="index.html" class="logo">HESAPLA<span>360</span></a></nav>
<div class="container">
    <h2>💱 Canlı Döviz Çevirici</h2>
    <div id="liveKur" style="color:var(--accent); font-weight:700; margin-bottom:15px; text-align:center;">Kur yükleniyor...</div>
    <input type="number" id="amount" value="1" placeholder="Miktar">
    <select id="type">
        <option value="toTry">USD -> TRY</option>
        <option value="toUsd">TRY -> USD</option>
    </select>
    <button onclick="convert()">Çevir</button>
    <div id="res" class="result-box">
        <div class="row"><span id="resultText"></span></div>
    </div>
</div>

<script>
    let currentRate = 0;
    async function fetchRate() {
        const res = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
        const data = await res.json();
        currentRate = data.rates.TRY;
        document.getElementById('liveKur').innerText = `Güncel Dolar Kuru: ${currentRate} TL`;
    }

    function convert() {
        let amt = document.getElementById('amount').value;
        let type = document.getElementById('type').value;
        let resBox = document.getElementById('res');
        resBox.style.display = "block";
        
        if(type === "toTry") {
            document.getElementById('resultText').innerText = (amt * currentRate).toFixed(2) + " TL";
        } else {
            document.getElementById('resultText').innerText = (amt / currentRate).toFixed(2) + " USD";
        }
    }
    fetchRate();
</script>
</body>
</html>
