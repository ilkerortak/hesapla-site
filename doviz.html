<!DOCTYPE html>
<html lang="tr">
<head><link rel="stylesheet" href="style.css"></head>
<body>
<nav><a href="index.html" class="logo">HESAPLA<span>360</span></a>
<div class="nav-menu">
    <a href="doviz.html" style="color:#fff;">💱 Döviz</a><a href="index.html">Geri Dön</a>
</div></nav>
<div class="container">
    <h2>💱 Döviz Çevirici</h2>
    <div id="status" style="font-size:0.8rem; text-align:center; color:var(--accent); margin:10px 0;">Kur güncelleniyor...</div>
    <input type="number" id="amt" value="1">
    <select id="mode">
        <option value="toTry">USD -> TRY</option>
        <option value="toUsd">TRY -> USD</option>
    </select>
    <button onclick="convert()">Hesapla</button>
    <div id="res" class="result-box">
        <div class="row"><span>Sonuç</span><span id="output" style="font-weight:bold;"></span></div>
    </div>
</div>
<script>
    let rate = 0;
    async function sync() {
        const r = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
        const d = await r.json();
        rate = d.rates.TRY;
        document.getElementById('status').innerText = `1 USD = ${rate.toFixed(4)} ₺`;
    }
    function convert() {
        let a = document.getElementById('amt').value;
        let m = document.getElementById('mode').value;
        let o = document.getElementById('output');
        document.getElementById('res').style.display = 'block';
        o.innerText = m === "toTry" ? (a * rate).toFixed(2) + " ₺" : (a / rate).toFixed(2) + " $";
    }
    sync();
</script>
</body></html>
