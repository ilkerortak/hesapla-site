<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Global Döviz | HESAPLA360</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .loading { font-size: 0.8rem; color: var(--accent); margin: 10px 0; }
        select { cursor: pointer; }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="logo">HESAPLA<span>360</span></a>
    <div class="nav-menu">
        <a href="netmaas.html">Maaş</a>
        <a href="tazminat.html">Tazminat</a>
        <a href="issizlik.html">İşsizlik</a>
        <a href="kredi.html">Kredi</a>
        <a href="yas.html">Yaş</a>
        <a href="doviz.html" class="active">Döviz</a>
        <a href="kdv.html">KDV</a>
        <a href="mesai.html">Mesai</a>
        <a href="cv.html">CV</a>
    </div>
</nav>

<div class="container">
    <h2>💱 Global Döviz Çevirici</h2>
    <div id="status" class="loading">Sistem verileri senkronize ediliyor...</div>
    
    <div class="input-group">
        <label>Miktar</label>
        <input type="number" id="amount" value="1" oninput="convert()">
    </div>

    <div class="input-group">
        <label>Kaynak Para Birimi</label>
        <select id="fromCurrency" onchange="convert()"></select>
    </div>

    <div class="input-group">
        <label>Hedef Para Birimi</label>
        <select id="toCurrency" onchange="convert()"></select>
    </div>

    <button onclick="convert()">Hesapla</button>

    <div id="res" class="result-box" style="display:block;">
        <div class="row">
            <span id="fromDisplay">1 USD</span>
            <span>=</span>
            <span id="toDisplay" style="font-weight:bold; color:var(--accent);">...</span>
        </div>
    </div>
</div>

<script>
    const fromSelect = document.getElementById('fromCurrency');
    const toSelect = document.getElementById('toCurrency');
    const status = document.getElementById('status');
    let exchangeRates = {};

    // Tüm dünyadaki para birimlerini API'den çek ve listeye ekle
    async function loadCurrencies() {
        try {
            const response = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
            const data = await response.json();
            exchangeRates = data.rates;
            const currencies = Object.keys(exchangeRates);

            currencies.forEach(currency => {
                const opt1 = document.createElement('option');
                const opt2 = document.createElement('option');
                opt1.value = opt2.value = currency;
                opt1.text = opt2.text = currency;
                
                // Varsayılan seçimler
                if(currency === 'USD') opt1.selected = true;
                if(currency === 'TRY') opt2.selected = true;

                fromSelect.add(opt1);
                toSelect.add(opt2);
            });

            status.innerText = "Piyasalar Aktif • Tüm Birimler Yüklendi";
            convert();
        } catch (error) {
            status.innerText = "Bağlantı Hatası! Lütfen sayfayı yenileyin.";
            status.style.color = "red";
        }
    }

    function convert() {
        const amt = document.getElementById('amount').value;
        const from = fromSelect.value;
        const to = toSelect.value;

        if (amt && exchangeRates[from] && exchangeRates[to]) {
            // Çapraz kur hesaplama (Base USD üzerinden)
            const result = (amt / exchangeRates[from]) * exchangeRates[to];
            
            document.getElementById('fromDisplay').innerText = `${parseFloat(amt).toLocaleString()} ${from}`;
            document.getElementById('toDisplay').innerText = `${result.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 4})} ${to}`;
        }
    }

    loadCurrencies();
</script>

</body>
</html>
