<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H360 | Yaşam Analizi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* ANA DEEP NIGHT TEMA */
        body { background-color: #0b0f19; margin: 0; font-family: 'Inter', sans-serif; color: #cbd5e0; overflow-x: hidden; }
        
        .main-wrapper { display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 120px 20px 60px; }
        
        .calc-card {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px; padding: 40px; width: 100%; max-width: 500px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5); backdrop-filter: blur(10px);
        }

        /* Başlık Alanı */
        .header-area { display: flex; align-items: center; gap: 20px; margin-bottom: 35px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 25px; }
        .icon-box { 
            width: 60px; height: 60px; background: rgba(16, 185, 129, 0.1); 
            border-radius: 16px; display: flex; align-items: center; justify-content: center;
            color: #10b981; font-size: 1.5rem; border: 1px solid rgba(16, 185, 129, 0.2);
        }
        .title-text h1 { font-size: 1.3rem; margin: 0; color: #fff; letter-spacing: 1px; }
        .title-text p { color: #3b82f6; font-size: 0.7rem; font-weight: 800; margin: 4px 0 0; text-transform: uppercase; }

        /* Inputlar */
        .input-group { margin-bottom: 25px; }
        .input-group label { display: block; color: #94a3b8; font-size: 0.65rem; font-weight: 800; margin-bottom: 10px; letter-spacing: 0.5px; }
        .input-group input {
            width: 100%; padding: 18px; background: #080b12;
            border: 1px solid #1e293b; border-radius: 14px;
            color: #fff; font-size: 1.1rem; transition: 0.3s; box-sizing: border-box; outline: none;
            color-scheme: dark;
        }
        .input-group input:focus { border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }

        .calc-btn {
            width: 100%; padding: 20px; background: #3b82f6; color: #fff;
            border: none; border-radius: 16px; font-weight: 700; cursor: pointer; font-size: 1rem;
            transition: 0.3s; letter-spacing: 1px; margin-top: 10px;
        }
        .calc-btn:hover { background: #2563eb; transform: translateY(-2px); }

        /* Sonuç Alanı */
        .result-box { margin-top: 40px; animation: slideIn 0.5s ease; display: none; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .big-age-display {
            text-align: center; background: #080b12;
            padding: 30px; border-radius: 20px; border: 1px solid #1e293b;
            margin-bottom: 25px; position: relative; overflow: hidden;
        }
        .big-age-display span { font-size: 0.75rem; color: #94a3b8; font-weight: 700; text-transform: uppercase; }
        .big-age-display b { font-size: 4rem; color: #fff; display: block; line-height: 1; margin: 10px 0; letter-spacing: -2px; }
        .big-age-display i { font-size: 1rem; color: #3b82f6; font-style: normal; font-weight: 600; }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .info-item {
            background: rgba(255, 255, 255, 0.01); padding: 20px; border-radius: 16px;
            text-align: center; border: 1px solid #1e293b; transition: 0.3s;
        }
        .info-item:hover { background: rgba(255,255,255,0.03); border-color: #3b82f6; }
        .info-item label { display: block; font-size: 0.65rem; color: #3b82f6; font-weight: 800; margin-bottom: 8px; text-transform: uppercase; }
        .info-item b { font-size: 1.1rem; color: #fff; letter-spacing: 0.5px; }

        .next-birthday {
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.1) 0%, rgba(59, 130, 246, 0) 100%);
            padding: 20px 25px; border-radius: 16px; border-left: 4px solid #3b82f6;
            display: flex; justify-content: space-between; align-items: center;
        }
        .next-birthday span { font-size: 0.8rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; }
        .next-birthday b { color: #3b82f6; font-size: 1.4rem; letter-spacing: -0.5px; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="calc-card">
        <div class="header-area">
            <div class="icon-box"><i class="fa-solid fa-hourglass-half"></i></div>
            <div class="title-text">
                <h1>YAŞ ANALİZİ</h1>
                <p>Kişisel Zaman Çizelgesi</p>
            </div>
        </div>

        <div class="input-group">
            <label>DOĞUM TARİHİNİZ</label>
            <input type="date" id="birthDate">
        </div>

        <button class="calc-btn" onclick="analyzeAge()">HAYATIMI ANALİZ ET</button>

        <div id="res" class="result-box">
            <div class="big-age-display">
                <span>Şu An Tam Olarak</span>
                <b id="yVal">0</b>
                <i>Yaşındasınız</i>
            </div>

            <div class="info-grid">
                <div class="info-item">
                    <label>Doğum Günü</label>
                    <b id="birthDayName">-</b>
                </div>
                <div class="info-item">
                    <label>Toplam Hafta</label>
                    <b id="wVal">0</b>
                </div>
                <div class="info-item">
                    <label>Toplam Gün</label>
                    <b id="dVal">0</b>
                </div>
                <div class="info-item">
                    <label>Toplam Saat</label>
                    <b id="hVal">0</b>
                </div>
            </div>

            <div class="next-birthday">
                <span>Yeni Yaşa Kalan Süre</span>
                <b><span id="nextDays">0</span> Gün</b>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleMenu() { document.getElementById('navMenu').classList.toggle('active'); }

    window.onclick = function(e) {
        if (!e.target.matches('.menu-btn') && !e.target.closest('.menu-btn')) {
            const menu = document.getElementById('navMenu');
            if (menu && menu.classList.contains('active')) menu.classList.remove('active');
        }
    }

    function analyzeAge() {
        const birthInput = document.getElementById('birthDate').value;
        if(!birthInput) return;
        
        const birth = new Date(birthInput);
        const now = new Date();
        const diff = now - birth;
        
        if (diff < 0) { alert("Henüz doğmamış olamazsınız!"); return; }

        const years = Math.floor(diff / (1000 * 60 * 60 * 24 * 365.25));
        const totalDays = Math.floor(diff / (1000 * 60 * 60 * 24));
        const totalWeeks = Math.floor(totalDays / 7);
        const totalHours = totalDays * 24;

        const daysTR = ["Pazar", "Pazartesi", "Salı", "Çarşamba", "Perşembe", "Cuma", "Cumartesi"];
        const dayName = daysTR[birth.getDay()];

        let nextBirth = new Date(now.getFullYear(), birth.getMonth(), birth.getDate());
        if (nextBirth < now) {
            nextBirth.setFullYear(now.getFullYear() + 1);
        }
        const timeToNext = nextBirth - now;
        const daysToNext = Math.ceil(timeToNext / (1000 * 60 * 60 * 24));

        document.getElementById('yVal').innerText = years;
        document.getElementById('birthDayName').innerText = dayName;
        document.getElementById('wVal').innerText = totalWeeks.toLocaleString('tr-TR');
        document.getElementById('dVal').innerText = totalDays.toLocaleString('tr-TR');
        document.getElementById('hVal').innerText = totalHours.toLocaleString('tr-TR');
        document.getElementById('nextDays').innerText = daysToNext;

        document.getElementById('res').style.display = "block";
    }
</script>
    <script src="h360-core.js"></script>
</body>
</html>
