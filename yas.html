<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H360 | Yaş Analizi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <a href="/" class="logo">
        <div class="logo-box">H360</div> 
        HESAPLA<span>360</span>
    </a>
    
    <div class="nav-container">
        <button class="menu-btn" onclick="toggleMenu()">MENÜ ▾</button>
        <div class="dropdown-menu" id="navMenu">
            <a href="/netmaas">💰 Maaş</a><a href="/tazminat">💼 Tazminat</a>
            <a href="/issizlik">📅 İşsizlik</a><a href="/faiz">📈 Faiz</a>
            <a href="/yakit">⛽ Yakıt</a><a href="/enflasyon">📉 Enflasyon</a>
            <a href="/kredi">🏦 Kredi</a><a href="/yas">🎂 Yaş</a>
            <a href="/doviz">💱 Döviz</a><a href="/kdv">🧾 KDV</a>
            <a href="/mesai">🕒 Mesai</a><a href="/cv">📄 CV</a>
        </div>
    </div>
</nav>

<div class="hero-section">
    <h2>Yaş Analizi</h2>
    <p>KİŞİSEL KRONOLOJİK VERİ SORGULAMA</p>
</div>

<div class="form-box">
    <label>DOĞUM TARİHİ</label>
    <input type="date" id="birthDate" style="color-scheme: dark;">

    <button class="btn-calc" onclick="calcAge()">ANALİZ ET</button>

    <div id="res" class="res-area">
        <p style="color:#555; font-size:0.75rem; font-weight:800;">MEVCUT YAŞINIZ</p>
        <div class="res-val" id="ageVal">0</div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:20px; font-size:0.85rem; color:#888; border-top: 1px solid #1c212c; padding-top: 15px;">
            <span>Toplam Gün: <b id="days" style="color:#fff">0</b></span>
            <span>Hafta: <b id="weeks" style="color:#fff">0</b></span>
        </div>
    </div>
</div>

<script>
    // Menü Kontrolü
    function toggleMenu() { 
        document.getElementById('navMenu').classList.toggle('active'); 
    }

    // Yaş Hesaplama Motoru
    function calcAge() {
        const birthInput = document.getElementById('birthDate').value;
        if(!birthInput) return;
        
        const birth = new Date(birthInput);
        const now = new Date();
        const diff = now - birth;
        
        // Artık yılları da hesaba katan yaklaşık yaş hesabı
        const years = Math.floor(diff / (1000 * 60 * 60 * 24 * 365.25));
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const weeks = Math.floor(days / 7);

        document.getElementById('ageVal').innerText = years;
        document.getElementById('days').innerText = days.toLocaleString();
        document.getElementById('weeks').innerText = weeks.toLocaleString();
        document.getElementById('res').style.display = "block";
    }

    // Menü dışına tıklandığında otomatik kapatma
    window.onclick = function(event) {
        if (!event.target.matches('.menu-btn')) {
            var dropdowns = document.getElementsByClassName("dropdown-menu");
            for (var i = 0; i < dropdowns.length; i++) {
                var openDropdown = dropdowns[i];
                if (openDropdown.classList.contains('active')) {
                    openDropdown.classList.remove('active');
                }
            }
        }
    }
</script>
</body>
</html>
