<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H360 | Yaş Analizi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Sayfayı mermi gibi ortalayan ve karanlık temayı koruyan özel CSS */
        body { background-color: #0b0f19; margin: 0; font-family: 'Inter', sans-serif; color: #fff; }
        .main-wrapper { 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; padding: 100px 20px 60px; box-sizing: border-box; 
        }
        .calc-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .header-area { text-align: center; margin-bottom: 35px; }
        .header-area h1 { font-size: 1.6rem; letter-spacing: 2px; margin: 0; font-weight: 700; }
        .header-area p { color: #007bff; font-size: 0.75rem; font-weight: 700; margin-top: 8px; text-transform: uppercase; }
        
        .input-group { margin-bottom: 25px; }
        .input-group label { display: block; color: #007bff; font-size: 0.7rem; font-weight: 800; margin-bottom: 10px; }
        .input-group input {
            width: 100%; padding: 16px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            color: #fff; font-size: 1rem; outline: none; transition: 0.3s; box-sizing: border-box;
            color-scheme: dark; /* Takvimi karanlık mod yapar */
        }
        .input-group input:focus { border-color: #007bff; background: rgba(255,255,255,0.08); }
        
        .calc-btn {
            width: 100%; padding: 18px; background: #007bff; color: #fff;
            border: none; border-radius: 12px; font-weight: 700; cursor: pointer;
            font-size: 1rem; transition: 0.3s; margin-top: 5px;
        }
        .calc-btn:hover { background: #0056b3; transform: translateY(-2px); }
        
        .result-box {
            margin-top: 30px; padding-top: 25px; border-top: 1px dashed rgba(255,255,255,0.15);
            display: none; text-align: center;
        }
        .result-label { font-size: 0.7rem; color: #888; font-weight: 800; margin-bottom: 5px; }
        .result-main { font-size: 3rem; font-weight: 700; color: #fff; margin-bottom: 20px; }
        .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; font-size: 0.85rem; color: #aaa; }
        .result-grid b { color: #fff; }
    </style>
</head>
<body>

<nav class="glass-nav">
    <div class="nav-left">
        <a href="index.html" class="logo"><div class="logo-box">H360</div> HESAPLA<span>360</span></a>
    </div>
    <div class="nav-right">
        <div class="menu-container">
            <button class="menu-btn" onclick="toggleMenu()">MENÜ <i class="fa-solid fa-bars-staggered"></i></button>
            <div class="dropdown-menu" id="navMenu">
                <a href="netmaas.html">💰 Maaş</a><a href="tazminat.html">💼 Tazminat</a>
                <a href="issizlik.html">📅 İşsizlik</a><a href="faiz.html">📈 Faiz</a>
                <a href="yakit.html">⛽ Yakıt</a><a href="enflasyon.html">📉 Enflasyon</a>
                <a href="kredi.html">🏦 Kredi</a><a href="yas.html">🎂 Yaş</a>
                <a href="doviz.html">💱 Döviz</a><a href="kdv.html">🧾 KDV</a>
                <a href="mesai.html">🕒 Mesai</a><a href="cv.html">📄 CV</a>
            </div>
        </div>
    </div>
</nav>

<div class="main-wrapper">
    <div class="calc-card">
        <div class="header-area">
            <h1>YAŞ ANALİZİ</h1>
            <p>KİŞİSEL KRONOLOJİK VERİLER</p>
        </div>

        <div class="input-group">
            <label>DOĞUM TARİHİ</label>
            <input type="date" id="birthDate">
        </div>

        <button class="calc-btn" onclick="calcAge()">ANALİZ ET</button>

        <div id="res" class="result-box">
            <div class="result-label">MEVCUT YAŞINIZ</div>
            <div class="result-main" id="ageVal">0</div>
            <div class="result-grid">
                <span>Toplam Gün: <b id="days">0</b></span>
                <span>Hafta: <b id="weeks">0</b></span>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleMenu() { document.getElementById('navMenu').classList.toggle('active'); }

    function calcAge() {
        const birthInput = document.getElementById('birthDate').value;
        if(!birthInput) return;
        
        const birth = new Date(birthInput);
        const now = new Date();
        const diff = now - birth;
        
        if (diff < 0) return; // Gelecek tarih kontrolü

        const years = Math.floor(diff / (1000 * 60 * 60 * 24 * 365.25));
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const weeks = Math.floor(days / 7);

        document.getElementById('ageVal').innerText = years;
        document.getElementById('days').innerText = days.toLocaleString('tr-TR');
        document.getElementById('weeks').innerText = weeks.toLocaleString('tr-TR');
        document.getElementById('res').style.display = "block";
    }

    window.onclick = function(e) { 
        if(!e.target.matches('.menu-btn') && !e.target.closest('.menu-btn')) {
            const menu = document.getElementById('navMenu');
            if(menu && menu.classList.contains('active')) menu.classList.remove('active');
        }
    }
</script>
</body>
</html>
