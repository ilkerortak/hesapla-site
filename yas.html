<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yaş Analizi - Hesapla360</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<nav>
    <a href="index.html" class="logo">HESAPLA<span>360</span></a>
    <ul class="nav-menu"><li><a href="yas.html" class="active">Yaş</a></li><li><a href="cv.html">CV</a></li></ul>
    <div class="theme-switch-wrapper"><label class="theme-switch"><input type="checkbox" id="theme-checkbox"><span class="slider"></span></label></div>
</nav>

<div class="container">
    <h2>Yaş Analizi</h2>
    <div class="input-group"><label>Doğum Tarihi</label><input type="date" id="dogum"></div>
    <button onclick="yasAnaliz()">Analiz Et</button>
    <div id="sonuc-box" style="display:none;" class="result-item">
        <p>Yaşınız</p>
        <strong id="y-sonuc"></strong>
    </div>
</div>

<script>
    const checkbox = document.getElementById('theme-checkbox');
    if (localStorage.getItem('theme') === 'dark') { document.body.classList.add('dark'); checkbox.checked = true; }
    checkbox.addEventListener('change', () => { document.body.classList.toggle('dark'); localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light'); });

    function yasAnaliz() {
        let d = new Date(document.getElementById("dogum").value);
        let b = new Date();
        if(isNaN(d)) return;
        let yas = b.getFullYear() - d.getFullYear();
        document.getElementById("sonuc-box").style.display = "block";
        document.getElementById("y-sonuc").innerText = yas + " Yaşındasınız";
    }
</script>
</body>
</html>
