<!DOCTYPE html>
<html lang="tr"><head><link rel="stylesheet" href="style.css"></head>
<body>
<nav><a href="index.html" class="logo">HESAPLA<span>360</span></a></nav>
<div class="container">
    <h2>🎂 Yaş Analizi</h2>
    <div class="input-group"><label>Doğum Tarihi</label><input type="date" id="dogum"></div>
    <button onclick="hesapla()">Analiz Et</button>
    <div id="sonuc-box" style="display:none;" class="result-item">
        <div class="detail-row"><span>Toplam Yaş</span> <span id="y"></span></div>
        <div class="detail-row"><span>Toplam Ay</span> <span id="a"></span></div>
        <div class="detail-row"><span>Toplam Gün</span> <span id="g"></span></div>
    </div>
</div>
<script>
    function hesapla() {
        let d = new Date(document.getElementById("dogum").value);
        let bugun = new Date();
        if(isNaN(d)) return;
        let diff = bugun - d;
        let yil = Math.floor(diff / (1000 * 60 * 60 * 24 * 365.25));
        let ay = Math.floor(diff / (1000 * 60 * 60 * 24 * 30.44));
        let gun = Math.floor(diff / (1000 * 60 * 60 * 24));
        document.getElementById("sonuc-box").style.display = "block";
        document.getElementById("y").innerText = yil + " Yıl";
        document.getElementById("a").innerText = ay + " Ay";
        document.getElementById("g").innerText = gun + " Gün";
    }
</script>
</body>
</html>
