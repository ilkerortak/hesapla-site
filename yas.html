<html lang="tr">

<body>

</div></nav>
<div class="container">
    <h2>🎂 Yaş Analizi</h2>
    <div class="input-group"><label>Doğum Tarihi</label><input type="date" id="d"></div>
    <button onclick="calc()">Zamanı Hesapla</button>
    <div id="res" class="result-box">
        <div class="row"><span>Geçen Yıl</span><span id="y"></span></div>
        <div class="row"><span>Toplam Ay</span><span id="a"></span></div>
        <div class="row"><span>Toplam Hafta</span><span id="h"></span></div>
        <div class="row total"><span>Toplam Gün</span><span id="g"></span></div>
    </div>
</div>
<script>
function calc(){
    let d=new Date(document.getElementById("d").value), b=new Date(); if(isNaN(d))return;
    let diff=b-d;
    document.getElementById("res").style.display="block";
    document.getElementById("y").innerText=Math.floor(diff/31557600000)+" Yıl";
    document.getElementById("a").innerText=Math.floor(diff/2629800000).toLocaleString();
    document.getElementById("h").innerText=Math.floor(diff/604800000).toLocaleString();
    document.getElementById("g").innerText=Math.floor(diff/86400000).toLocaleString();
}
</script>
</body></html>
