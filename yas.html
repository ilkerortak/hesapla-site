<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yaş Analizi - Hesapla360</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<nav>
    <a href="index.html" class="logo">HESAPLA<span>360</span></a>
    <div class="nav-menu">
        <a href="netmaas.html">💰 Maaş</a>
        <a href="tazminat.html">💼 Tazminat</a>
        <a href="issizlik.html">📅 İşsizlik</a>
        <a href="kredi.html">🏦 Kredi</a>
        <a href="yas.html" class="active">🎂 Yaş</a>
        <a href="cv.html">📄 CV</a>
    </div>
</nav>

<div class="container">
    <h2>🎂 Yaş Analizi</h2>
    <div class="input-group">
        <label>Doğum Tarihiniz</label>
        <input type="date" id="dogum">
    </div>
    <button onclick="hesaplaYas()">Analiz Et</button>

    <div id="sonuc-box" style="display:none;" class="result-item">
        <div class="detail-row"><span>Yaşınız</span> <span id="y"></span></div>
        <div class="detail-row"><span>Toplam Ay</span> <span id="a"></span></div>
        <div class="detail-row"><span>Toplam Gün</span> <span id="g"></span></div>
        <div class="detail-row total"><span>Bir Sonraki Doğum Günü</span> <span id="kalan" style="color:#a855f7;"></span></div>
    </div>
</div>

<script>
    function hesaplaYas() {
        let d = new Date(document.getElementById("dogum").value);
        let bugun = new Date();
        if(isNaN(d)) return;
        
        let diff = bugun - d;
        let yil = Math.floor(diff / (1000 * 60 * 60 * 24 * 365.25));
        let ay = Math.floor(diff / (1000 * 60 * 60 * 24 * 30.44));
        let gun = Math.floor(diff / (1000 * 60 * 60 * 24));
        
        // Kalan Gün Hesabı
        let next = new Date(bugun.getFullYear(), d.getMonth(), d.getDate());
        if (bugun > next) next.setFullYear(bugun.getFullYear() + 1);
        let kalan = Math.ceil((next - bugun) / (1000 * 60 * 60 * 24));

        document.getElementById("sonuc-box").style.display = "block";
        document.getElementById("y").innerText = yil + " Yıl";
        document.getElementById("a").innerText = ay + " Ay";
        document.getElementById("g").innerText = gun + " Gün";
        document.getElementById("kalan").innerText = kalan + " Gün Kaldı! 🥳";
    }
</script>
</body>
</html>
