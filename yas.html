<div class="hero-section">
    <h2>Yaş Analizi</h2>
    <p>KİŞİSEL KRONOLOJİK VERİ SORGULAMA</p>
</div>

<div class="form-box">
    <label>DOĞUM TARİHİ</label>
    <input type="date" id="birthDate" style="color-scheme: dark;">

    <button class="btn-calc" onclick="calcAge()">ANALİZ ET</button>

    <div id="res" class="res-area">
        <p style="color:#555; font-size:0.7rem; font-weight:800;">MEVCUT YAŞINIZ</p>
        <div class="res-val" id="ageVal">0</div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px; font-size:0.8rem; color:#888;">
            <span>Toplam Gün: <b id="days" style="color:#fff">0</b></span>
            <span>Hafta: <b id="weeks" style="color:#fff">0</b></span>
        </div>
    </div>
</div>

<script>
    function calcAge() {
        const birth = new Date(document.getElementById('birthDate').value);
        const now = new Date();
        const diff = now - birth;
        
        const years = Math.floor(diff / (1000 * 60 * 60 * 24 * 365.25));
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const weeks = Math.floor(days / 7);

        document.getElementById('ageVal').innerText = years;
        document.getElementById('days').innerText = days.toLocaleString();
        document.getElementById('weeks').innerText = weeks.toLocaleString();
        document.getElementById('res').style.display = "block";
    }
</script>
