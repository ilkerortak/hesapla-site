<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H360 | Yaşam Analizi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #0b0f19; margin: 0; font-family: 'Inter', sans-serif; color: #fff; }
        .main-wrapper { display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 100px 20px 60px; box-sizing: border-box; }
        
        .calc-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px; padding: 40px; width: 100%; max-width: 500px;
            backdrop-filter: blur(12px); box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .header-area { text-align: center; margin-bottom: 35px; }
        .header-area h1 { font-size: 1.6rem; letter-spacing: 2px; margin: 0; font-weight: 700; }
        .header-area p { color: #007bff; font-size: 0.75rem; font-weight: 700; margin-top: 8px; text-transform: uppercase; }
        
        .input-group { margin-bottom: 25px; }
        .input-group label { display: block; color: #007bff; font-size: 0.7rem; font-weight: 800; margin-bottom: 10px; }
        .input-group input {
            width: 100%; padding: 16px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            color: #fff; font-size: 1rem; outline: none; transition: 0.3s; box-sizing: border-box;
            color-scheme: dark;
        }
        .input-group input:focus { border-color: #007bff; background: rgba(255,255,255,0.08); }
        
        .calc-btn {
            width: 100%; padding: 18px; background: #007bff; color: #fff;
            border: none; border-radius: 12px; font-weight: 700; cursor: pointer;
            font-size: 1rem; transition: 0.3s;
        }
        .calc-btn:hover { background: #0056b3; transform: translateY(-2px); }
        
        /* Sonuç Alanı Tasarımı */
        .result-box { margin-top: 30px; display: none; animation: slideIn 0.5s ease; }
        
        .big-age-display {
            text-align: center; background: rgba(255,255,255,0.02);
            padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 20px;
        }
        .big-age-display span { font-size: 0.7rem; color: #888; font-weight: 800; display: block; margin-bottom: 10px; }
        .big-age-display b { font-size: 3.5rem; color: #fff; line-height: 1; }
        .big-age-display i { font-size: 1rem; color: #007bff; font-style: normal; margin-left: 5px; }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .info-item {
            background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px;
            text-align: center; border: 1px solid rgba(255,255,255,0.05);
        }
        .info-item label { display: block; font-size: 0.6rem; color: #007bff; font-weight: 800; margin-bottom: 5px; }
        .info-item b { font-size: 1rem; color: #fff; }

        .next-birthday {
            background: linear-gradient(90deg, rgba(0,123,255,0.1) 0%, rgba(0,123,255,0) 100%);
            padding: 15px 20px; border-radius: 12px; border-left: 4px solid #007bff;
            display: flex; justify-content: space-between; align-items: center;
        }
        .next-birthday span { font-size: 0.8rem; font-weight: 600; color: #ccc; }
        .next-birthday b { color: #007bff; font-size: 1.2rem; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<nav class="glass-nav">
    <div class="nav-left">
        <a href="index.html" class="logo"><div class="logo-box">H360</div> HESAPLA<span>360</span></a>
    </div>
    <div class="nav-right">
        <div class="menu-container">
            <button class="menu-btn" onclick="toggleMenu()">MENÜ <i class="fa-solid fa-bars-staggered"></i></button>
            <div class="dropdown-menu" id="navMenu">
                <div class="menu-grid">
                    <a href="netmaas.html"><i class="fa-solid fa-money-bill-wave"></i> Maaş</a>
                    <a href="tazminat.html"><i class="fa-solid fa-briefcase"></i> Tazminat</a>
                    <a href="issizlik.html"><i class="fa-solid fa-calendar-day"></i> İşsizlik</a>
                    <a href="faiz.html"><i class="fa-solid fa-chart-line"></i> Faiz</a>
                    <a href="yakit.html"><i class="fa-solid fa-gas-pump"></i> Yakıt</a>
                    <a href="enflasyon.html"><i class="fa-solid fa-chart-area"></i> Enflasyon</a>
                    <a href="kredi.html"><i class="fa-solid fa-building-columns"></i> Kredi</a>
                    <a href="yas.html"><i class="fa-solid fa-cake-candles"></i> Yaş</a>
                    <a href="doviz.html"><i class="fa-solid fa-money-bill-transfer"></i> Döviz</a>
                    <a href="kdv.html"><i class="fa-solid fa-file-invoice-dollar"></i> KDV</a>
                    <a href="mesai.html"><i class="fa-solid fa-clock"></i> Mesai</a>
                    <a href="cv.html"><i class="fa-solid fa-file-pdf"></i> CV</a>
                </div>
            </div>
        </div>
    </div>
</nav>

<div class="main-wrapper">
    <div class="calc-card">
        <div class="header-area">
            <h1>YAŞ ANALİZİ</h1>
            <p>DETAYLI KİŞİSEL ZAMAN ÇİZELGESİ</p>
        </div>

        <div class="input-group">
            <label>DOĞUM TARİHİNİZ</label>
            <input type="date" id="birthDate">
        </div>

        <button class="calc-btn" onclick="analyzeAge()">HAYATIMI ANALİZ ET</button>

        <div id="res" class="result-box">
            <div class="big-age-display">
                <span>ŞU AN TAM OLARAK</span>
                <b id="yVal">0</b><i>Yaşındasınız</i>
            </div>

            <div class="info-grid">
                <div class="info-item">
                    <label>DOĞUM GÜNÜ</label>
                    <b id="birthDayName">-</b>
                </div>
                <div class="info-item">
                    <label>TOPLAM HAFTA</label>
                    <b id="wVal">0</b>
                </div>
                <div class="info-item">
                    <label>TOPLAM GÜN</label>
                    <b id="dVal">0</b>
                </div>
                <div class="info-item">
                    <label>TOPLAM SAAT</label>
                    <b id="hVal">0</b>
                </div>
            </div>

            <div class="next-birthday">
                <span>Sonraki Doğum Gününe</span>
                <b><span id="nextDays">0</span> Gün</b>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleMenu() { document.getElementById('navMenu').classList.toggle('active'); }

    function analyzeAge() {
        const birthInput = document.getElementById('birthDate').value;
        if(!birthInput) return;
        
        const birth = new Date(birthInput);
        const now = new Date();
        const diff = now - birth;
        
        if (diff < 0) { alert("Gelecek bir tarih seçemezsiniz!"); return; }

        // Temel Hesaplamalar
        const years = Math.floor(diff / (1000 * 60 * 60 * 24 * 365.25));
        const totalDays = Math.floor(diff / (1000 * 60 * 60 * 24));
        const totalWeeks = Math.floor(totalDays / 7);
        const totalHours = totalDays * 24;

        // Doğum Günü İsmi
        const daysTR = ["Pazar", "Pazartesi", "Salı", "Çarşamba", "Perşembe", "Cuma", "Cumartesi"];
        const dayName = daysTR[birth.getDay()];

        // Sonraki Doğum Gününe Kalan Gün
        let nextBirth = new Date(now.getFullYear(), birth.getMonth(), birth.getDate());
        if (nextBirth < now) {
            nextBirth.setFullYear(now.getFullYear() + 1);
        }
        const timeToNext = nextBirth - now;
        const daysToNext = Math.ceil(timeToNext / (1000 * 60 * 60 * 24));

        // DOM Güncelleme
        document.getElementById('yVal').innerText = years;
        document.getElementById('birthDayName').innerText = dayName;
        document.getElementById('wVal').innerText = totalWeeks.toLocaleString('tr-TR');
        document.getElementById('dVal').innerText = totalDays.toLocaleString('tr-TR');
        document.getElementById('hVal').innerText = totalHours.toLocaleString('tr-TR');
        document.getElementById('nextDays').innerText = daysToNext;

        document.getElementById('res').style.display = "block";
    }

    window.onclick = function(e) { 
        if(!e.target.matches('.menu-btn') && !e.target.closest('.menu-btn')) {
            const menu = document.getElementById('navMenu');
            if(menu && menu.classList.contains('active')) menu.classList.remove('active');
        }
    }
</script>
</body>
