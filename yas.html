<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Yaş Hesaplama 2026</title>
<link rel="stylesheet" href="style.css">
<meta name="description" content="Doğum tarihinizden tam yaşınızı (yıl, ay, gün) hesaplayın.">
</head>
<body>
<nav>
  <ul>
    <li><a href="index.html">Ana Sayfa</a></li>
    <li><a href="netmaas.html">Net Maaş</a></li>
    <li><a href="issizlik.html">İşsizlik Maaşı</a></li>
    <li><a href="kredi.html">Kredi Hesaplama</a></li>
    <li><a href="yas.html">Yaş Hesaplama</a></li>
    <li><a href="cv.html">CV Oluşturucu</a></li>
  </ul>
  <button id="theme-toggle">☀️</button>
</nav>

<div class="container">
<h1>Detaylı Yaş Hesaplama 2026</h1>
<p>Doğum tarihinizi seçin:</p>
<input type="date" id="dogum">
<button onclick="hesapla()">Hesapla</button>
<h2 id="sonuc"></h2>
</div>

<script>
function hesapla(){
  const dogumInput = document.getElementById("dogum").value;
  if(!dogumInput){
    alert("Lütfen doğum tarihinizi girin!");
    return;
  }

  const dogumTarihi = new Date(dogumInput);
  const bugun = new Date("2026-03-24"); // Sabit 2026 tarihi, güncel tarih için: new Date()
  
  let yil = bugun.getFullYear() - dogumTarihi.getFullYear();
  let ay = bugun.getMonth() - dogumTarihi.getMonth();
  let gun = bugun.getDate() - dogumTarihi.getDate();

  if(gun < 0){
    ay -= 1;
    gun += new Date(bugun.getFullYear(), bugun.getMonth(), 0).getDate(); // önceki ayın gün sayısı
  }
  if(ay < 0){
    yil -= 1;
    ay += 12;
  }

  document.getElementById("sonuc").innerText = `Yaşınız: ${yil} yıl, ${ay} ay, ${gun} gün`;
}

// Tema persist
const themeToggle = document.getElementById("theme-toggle");
if(localStorage.getItem('theme')==='dark'){
    document.body.classList.add('dark');
    themeToggle.textContent='🌙';
}else{ themeToggle.textContent='☀️'; }
themeToggle.addEventListener('click',()=>{
    document.body.classList.toggle('dark');
    if(document.body.classList.contains('dark')){
        themeToggle.textContent='🌙';
        localStorage.setItem('theme','dark');
    }else{
        themeToggle.textContent='☀️';
        localStorage.setItem('theme','light');
    }
});
</script>
</body>
</html>
