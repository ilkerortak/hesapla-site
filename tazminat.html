<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Tazminat Analizi - Hesapla360</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<nav><a href="index.html" class="logo">HESAPLA<span>360</span></a></nav>
<div class="container">
    <h2>💼 Tazminat Dökümü</h2>
    <div class="input-group"><label>Brüt Maaş</label><input type="number" id="brut"></div>
    <div class="input-group"><label>Çalışma Yılı</label><input type="number" id="yil"></div>
    <button onclick="hesapla()">Hesapla</button>
    <div id="sonuc-box" style="display:none;" class="result-item">
        <div class="detail-row"><span>Kıdem Tazminatı (Brüt)</span> <span id="kBrut"></span></div>
        <div class="detail-row"><span>Damga Vergisi Kesintisi</span> <span id="dv"></span></div>
        <div class="detail-row total"><span>Net Tazminat</span> <span id="net" style="color:#a855f7; font-size:1.4rem;"></span></div>
    </div>
</div>
<script>
    function hesapla() {
        let b = parseFloat(document.getElementById("brut").value);
        let y = parseFloat(document.getElementById("yil").value);
        const tavan = 72500;
        let esas = b > tavan ? tavan : b;
        let kb = esas * y;
        let dv = kb * 0.00759;
        document.getElementById("sonuc-box").style.display = "block";
        document.getElementById("kBrut").innerText = kb.toLocaleString() + " TL";
        document.getElementById("dv").innerText = "-" + dv.toLocaleString() + " TL";
        document.getElementById("net").innerText = (kb - dv).toLocaleString() + " TL";
    }
</script>
</body>
</html>
