<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H360 | Tazminat Hesabı</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <a href="/" class="logo"><div class="logo-box">H360</div> HESAPLA<span>360</span></a>
    <div class="nav-container">
        <button class="menu-btn" onclick="toggleMenu()">MENÜ ▾</button>
        <div class="dropdown-menu" id="navMenu">
            <a href="/netmaas">💰 Maaş</a><a href="/tazminat">💼 Tazminat</a>
            <a href="/issizlik">📅 İşsizlik</a><a href="/faiz">📈 Faiz</a>
            <a href="/yakit">⛽ Yakıt</a><a href="/enflasyon">📉 Enflasyon</a>
            <a href="/kredi">🏦 Kredi</a><a href="/yas">🎂 Yaş</a>
            <a href="/doviz">💱 Döviz</a><a href="/kdv">🧾 KDV</a>
            <a href="/mesai">🕒 Mesai</a><a href="/cv">📄 CV</a>
        </div>
    </div>
</nav>

<div class="hero-section">
    <h2>Tazminat Hesabı</h2>
    <p>KIDEM VE İHBAR TAZMİNATI ANALİZİ</p>
</div>

<div class="form-box">
    <label>SON BRÜT MAAŞ (TL)</label>
    <input type="number" id="sonBrut" placeholder="Örn: 45.000">
    
    <label>ÇALIŞILAN YIL</label>
    <input type="number" id="yil" placeholder="Örn: 3">

    <button class="btn-calc" onclick="hesaplaTazminat()">HESAPLAMAYI YAP</button>

    <div id="res" class="res-area">
        <p style="color:#555; font-size:0.75rem; font-weight:800;">TOPLAM NET TAZMİNAT</p>
        <div class="res-val" id="toplamTazminat">0 ₺</div>
        <p id="detay" style="font-size:0.75rem; color:#666; margin-top:15px; border-top: 1px solid #1c212c; padding-top: 10px;"></p>
    </div>
</div>

<script>
    // Menü Fonksiyonu
    function toggleMenu() { 
        document.getElementById('navMenu').classList.toggle('active'); 
    }

    // Tazminat Hesaplama Fonksiyonu
    function hesaplaTazminat() {
        const maas = parseFloat(document.getElementById('sonBrut').value) || 0;
        const yil = parseFloat(document.getElementById('yil').value) || 0;
        
        // 2026 Kıdem Tazminatı Tavanı (Örn: 35.058 TL varsayıldı)
        const kidemTavan = 35058;
        const hesaplananMaas = (maas > kidemTavan ? kidemTavan : maas);
        
        const kidem = hesaplananMaas * yil;
        const netKidem = kidem - (kidem * 0.00759); // Damga vergisi kesintisi
        
        document.getElementById('toplamTazminat').innerText = Math.round(netKidem).toLocaleString() + " ₺";
        document.getElementById('detay').innerText = yil + " yıl için net kıdem tazminatı hesaplandı.";
        document.getElementById('res').style.display = "block";
    }

    // Dışarı tıklandığında menüyü kapatma
    window.onclick = function(event) {
        if (!event.target.matches('.menu-btn')) {
            var dropdowns = document.getElementsByClassName("dropdown-menu");
            for (var i = 0; i < dropdowns.length; i++) {
                var openDropdown = dropdowns[i];
                if (openDropdown.classList.contains('active')) {
                    openDropdown.classList.remove('active');
                }
            }
        }
    }
</script>
</body>
</html>
