<!DOCTYPE html>
<html lang="tr">
<head><link rel="stylesheet" href="style.css"></head>
<body>

    <a href="netmaas.html">💰 Maaş</a><a href="tazminat.html" class="active">💼 Tazminat</a><a href="issizlik.html">📅 İşsizlik</a>

</div></nav>
<div class="container">
    <h2>💼 Tazminat</h2>
    <div class="input-group"><label>Brüt Maaş</label><input type="number" id="b"></div>
    <div class="input-group"><label>Çalışma Yılı</label><input type="number" id="y"></div>
    <button onclick="calc()">RGB Hesapla</button>
    <div id="res" class="result-item">
        <div class="detail-row"><span>Brüt Kıdem</span><span id="k"></span></div>
        <div class="detail-row total"><span>Net Ödeme</span><span id="n"></span></div>
    </div>
</div>
<script>
    function calc(){
        let b=document.getElementById("b").value, y=document.getElementById("y").value; if(!b)return;
        let k=Math.min(b,72500)*y;
        document.getElementById("res").style.display="block";
        document.getElementById("k").innerText=k.toLocaleString()+" TL";
        document.getElementById("n").innerText=(k*0.992).toLocaleString()+" TL";
    }
</script>
</body>
</html>
