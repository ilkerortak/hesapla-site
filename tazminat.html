<!DOCTYPE html>
<html lang="tr">
<head><meta charset="UTF-8"><link rel="stylesheet" href="style.css"><title>Tazminat Hesabı</title></head>
<body>
<nav>
    <a href="index.html" class="logo">HESAPLA<span>360</span></a>
    <div class="nav-menu">
        <a href="netmaas.html">💰 Maaş</a><a href="tazminat.html" class="active">💼 Tazminat</a><a href="issizlik.html">📅 İşsizlik</a>

    </div>
</nav>

<div class="container">
    <h2>💼 Kıdem Tazminatı</h2>
    <div class="input-group"><label>Son Brüt Maaş</label><input type="number" id="b"></div>
    <div class="input-group"><label>Çalışılan Yıl</label><input type="number" id="y"></div>
    <button onclick="calc()">Tazminatı Hesapla</button>
    <div id="res" class="result-box">
        <div class="row"><span>Brüt Kıdem</span><span id="bk"></span></div>
        <div class="row"><span>Damga Vergisi</span><span id="dv"></span></div>
        <div class="row total"><span>Net Tazminat</span><span id="nk" style="color:var(--accent); font-weight:800;"></span></div>
    </div>
</div>

<script>
function calc(){
    let b=parseFloat(document.getElementById("b").value), y=parseFloat(document.getElementById("y").value);
    if(!b || !y) return;
    let brutKidem = Math.min(b, 72500) * y; // Tavan 2026 tahmini
    let dv = brutKidem * 0.00759;
    document.getElementById("res").style.display="block";
    document.getElementById("bk").innerText=brutKidem.toLocaleString()+" ₺";
    document.getElementById("dv").innerText="-"+dv.toLocaleString()+" ₺";
    document.getElementById("nk").innerText=(brutKidem-dv).toLocaleString()+" ₺";
}
</script>
</body></html>
