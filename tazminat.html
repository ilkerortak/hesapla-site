<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Tazminat Hesaplama - Hesapla360</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<nav>
    <a href="index.html" class="logo">HESAPLA<span>360</span></a>
    <ul class="nav-menu">
        <li><a href="netmaas.html">Maaş</a></li>
        <li><a href="tazminat.html" class="active">Tazminat</a></li>
        <li><a href="issizlik.html">İşsizlik</a></li>
        <li><a href="kredi.html">Kredi</a></li>
        <li><a href="cv.html">CV</a></li>
    </ul>
    <div class="theme-switch-wrapper"><label class="theme-switch"><input type="checkbox" id="theme-checkbox"><span class="slider"></span></label></div>
</nav>

<div class="container">
    <h2>Tazminat Analizi</h2>
    <div class="input-group"><label>Son Brüt Maaş</label><input type="number" id="brut" placeholder="TL"></div>
    <div class="input-group"><label>Çalışma Yılı</label><input type="number" id="yil" placeholder="Yıl"></div>
    <button onclick="tazminat()">Tazminatı Gör</button>
    <div id="sonuc-box" style="display:none;" class="result-item">
        <p>Toplam Net Tazminat</p>
        <strong id="t-sonuc">0 TL</strong>
    </div>
</div>

<script>
    const checkbox = document.getElementById('theme-checkbox');
    if (localStorage.getItem('theme') === 'dark') { document.body.classList.add('dark'); checkbox.checked = true; }
    checkbox.addEventListener('change', () => { document.body.classList.toggle('dark'); localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light'); });

    function tazminat() {
        let b = parseFloat(document.getElementById("brut").value);
        let y = parseFloat(document.getElementById("yil").value);
        const tavan = 72500; // 2026 Tahmini tavan
        let esas = b > tavan ? tavan : b;
        let net = (esas * y) * 0.99241; // Damga vergisi düşülmüş
        document.getElementById("sonuc-box").style.display = "block";
        document.getElementById("t-sonuc").innerText = net.toLocaleString('tr-TR', {maximumFractionDigits:2}) + " TL";
    }
</script>
</body>
</html>
