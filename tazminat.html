<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H360 | Tazminat Analizi</title>

<link rel="stylesheet" href="style.css">

<style>
.calculation-container { max-width:600px; margin:120px auto; }

.form-card {
    background:var(--card-bg);
    padding:30px;
    border-radius:20px;
}

input {
    width:100%;
    padding:15px;
    margin:10px 0;
    background:rgba(255,255,255,0.05);
    border:1px solid var(--border);
    color:#fff;
}

.btn-calc {
    width:100%;
    padding:15px;
    background:var(--accent);
    color:#fff;
    border:none;
    position:relative;
}

/* LOADING */
.btn-calc.loading span { visibility:hidden; }
.btn-calc.loading::after {
content:"";
width:18px;height:18px;
border:2px solid #fff;
border-top:2px solid transparent;
border-radius:50%;
position:absolute;
left:50%;top:50%;
transform:translate(-50%,-50%);
animation:spin .6s linear infinite;
}
@keyframes spin { to { transform:translate(-50%,-50%) rotate(360deg);} }

.res-area { display:none; margin-top:20px; }
</style>
</head>

<body>

<div class="calculation-container">

<div class="form-card">

<input type="number" id="maas" placeholder="Son maaş">
<input type="number" id="yil" placeholder="Yıl">

<button class="btn-calc" onclick="hesapla()">
<span>HESAPLAMAYI BAŞLAT</span>
</button>

<div id="res" class="res-area">
<h2 id="sonuc">0 ₺</h2>
</div>

</div>
</div>

<script>
function hesapla(){
const btn=document.querySelector(".btn-calc");
btn.classList.add("loading");

setTimeout(()=>{

const m=parseFloat(document.getElementById('maas').value)||0;
const y=parseFloat(document.getElementById('yil').value)||0;

const tavan=35058;
const esas=Math.min(m,tavan);

const brut=esas*y;
const damga=brut*0.00759;
const net=brut-damga;

document.getElementById("sonuc").innerText=Math.round(net).toLocaleString('tr-TR')+" ₺";

document.getElementById("res").style.display="block";

btn.classList.remove("loading");

},1000);
}
</script>

</body>
</html>
