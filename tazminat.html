<div class="container">
    <h2>💼 Tazminat Detayları</h2>
    <div class="input-group"><label>Brüt Maaş</label><input type="number" id="brut"></div>
    <div class="input-group"><label>Çalışma Yılı</label><input type="number" id="yil"></div>
    <button onclick="tazminatHesapla()">Hesap dökümünü çıkar</button>

    <div id="sonuc-box" style="display:none;" class="result-item">
        <p>Kıdem Tazminatı (Brüt)</p>
        <strong id="kidem-brut" style="font-size: 1.5rem;">0 TL</strong>
        <p style="font-size: 0.8rem;">Damga Vergisi Kesintisi: <span id="dv-kesinti">0 TL</span></p>
        <div style="border-top: 1px solid var(--border); margin: 15px 0;"></div>
        <p>Alacağınız Net Tutar</p>
        <strong id="t-net">0 TL</strong>
    </div>
</div>

<script>
    function tazminatHesapla() {
        let b = parseFloat(document.getElementById("brut").value);
        let y = parseFloat(document.getElementById("yil").value);
        const tavan = 72500; // 2026 güncel tavan
        let esas = b > tavan ? tavan : b;
        
        let kidemBrut = esas * y;
        let dv = kidemBrut * 0.00759;
        let net = kidemBrut - dv;

        document.getElementById("sonuc-box").style.display = "block";
        document.getElementById("kidem-brut").innerText = kidemBrut.toLocaleString('tr-TR') + " TL";
        document.getElementById("dv-kesinti").innerText = "-" + dv.toLocaleString('tr-TR') + " TL";
        document.getElementById("t-net").innerText = net.toLocaleString('tr-TR') + " TL";
    }
</script>
