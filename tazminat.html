<!DOCTYPE html>
<html lang="tr">
<head><link rel="stylesheet" href="style.css"></head>
<body>
<nav><a href="index.html" class="logo">HESAPLA<span>360</span></a><div class="nav-menu">
    <a href="netmaas.html">💰 Maaş</a><a href="tazminat.html" class="active">💼 Tazminat</a><a href="issizlik.html">📅 İşsizlik</a>
    <a href="kredi.html">🏦 Kredi</a><a href="yas.html">🎂 Yaş</a><a href="doviz.html">💱 Döviz</a>
    <a href="kdv.html">🧾 KDV</a><a href="mesai.html">🕒 Mesai</a><a href="cv.html">📄 CV</a>
</div></nav>
<div class="container">
    <h2>💼 Detaylı Tazminat</h2>
    <div class="input-group"><label>Son Brüt Maaş</label><input type="number" id="b" placeholder="0.00 TL"></div>
    <div class="input-group"><label>Hizmet Yılı</label><input type="number" id="y" placeholder="Yıl"></div>
    <button onclick="calc()">Detaylı Hesapla</button>
    <div id="res" class="result-box">
        <div class="row"><span>Brüt Kıdem</span><span id="bk"></span></div>
        <div class="row"><span>Damga Vergisi (%0.759)</span><span id="dv"></span></div>
        <div class="row total"><span>Net Kıdem Tazminatı</span><span id="nk"></span></div>
    </div>
</div>
<script>
function calc(){
    let b=parseFloat(document.getElementById("b").value), y=parseFloat(document.getElementById("y").value);
    if(!b || !y) return;
    let tavan = 72500; // 2026 Tahmini Tavan
    let esasBrut = Math.min(b, tavan);
    let brutKidem = esasBrut * y;
    let damga = brutKidem * 0.00759;
    document.getElementById("res").style.display="block";
    document.getElementById("bk").innerText = brutKidem.toLocaleString() + " TL";
    document.getElementById("dv").innerText = "-" + damga.toLocaleString() + " TL";
    document.getElementById("nk").innerText = (brutKidem - damga).toLocaleString() + " TL";
}
</script>
</body></html>
