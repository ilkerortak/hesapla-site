<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H360 | Gelişmiş Yakıt Analizi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* ANA DEEP NIGHT TEMA */
        body { background-color: #0b0f19; margin: 0; font-family: 'Inter', sans-serif; color: #cbd5e0; overflow-x: hidden; }
        
        .main-wrapper { display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 120px 20px 60px; }
        
        .yakit-card {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px; padding: 40px; width: 100%; max-width: 600px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
        }

        /* Başlık Alanı */
        .header-area { display: flex; align-items: center; gap: 20px; margin-bottom: 35px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 25px; }
        .icon-box { 
            width: 60px; height: 60px; background: rgba(245, 158, 11, 0.1); 
            border-radius: 16px; display: flex; align-items: center; justify-content: center;
            color: #f59e0b; font-size: 1.5rem; border: 1px solid rgba(245, 158, 11, 0.2);
        }
        .title-text h1 { font-size: 1.3rem; margin: 0; color: #fff; letter-spacing: 1px; }
        .title-text p { color: #f59e0b; font-size: 0.7rem; font-weight: 800; margin: 4px 0 0; text-transform: uppercase; }

        /* Inputlar */
        .input-group { margin-bottom: 25px; }
        .input-group label { display: block; color: #94a3b8; font-size: 0.65rem; font-weight: 800; margin-bottom: 10px; letter-spacing: 0.5px; }
        .input-group input {
            width: 100%; padding: 18px; background: #080b12;
            border: 1px solid #1e293b; border-radius: 14px;
            color: #fff; font-size: 1.1rem; transition: 0.3s; box-sizing: border-box; outline: none;
        }
        .input-group input:focus { border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }

        /* Hızlı Seçim Etiketleri */
        .quick-tags { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        .q-tag { 
            background: #111827; padding: 6px 14px; border-radius: 10px; 
            font-size: 0.7rem; cursor: pointer; border: 1px solid #1e293b; color: #64748b; transition: 0.2s; font-weight: 600;
        }
        .q-tag:hover { background: #1e293b; border-color: #3b82f6; color: #fff; transform: translateY(-2px); }

        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .calc-btn {
            width: 100%; padding: 20px; background: #3b82f6; color: #fff;
            border: none; border-radius: 16px; font-weight: 700; cursor: pointer; font-size: 1rem;
            transition: 0.3s; letter-spacing: 1px; margin-top: 10px;
        }
        .calc-btn:hover { background: #2563eb; transform: translateY(-2px); }

        /* Sonuç Paneli */
        .result-box { margin-top: 35px; animation: fadeIn 0.5s ease; display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .main-res { 
            background: linear-gradient(180deg, rgba(16, 185, 129, 0.1) 0%, rgba(16, 185, 129, 0) 100%);
            padding: 30px; border-radius: 20px; text-align: center; border: 1px solid rgba(16, 185, 129, 0.2);
            margin-bottom: 20px;
        }
        .main-res small { font-size: 0.75rem; color: #94a3b8; font-weight: 700; text-transform: uppercase; }
        .main-res b { font-size: 2.8rem; color: #10b981; display: block; margin-top: 8px; letter-spacing: -1px; }

        .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
        .stat-card { background: #080b12; padding: 18px 10px; border-radius: 18px; text-align: center; border: 1px solid #1e293b; }
        .stat-card small { font-size: 0.6rem; color: #64748b; display: block; margin-bottom: 6px; font-weight: 800; text-transform: uppercase; }
        .stat-card span { font-size: 1.1rem; font-weight: 700; color: #fff; }
    </style>
</head>
<body>

<nav class="glass-nav">
    <div class="nav-left">
        <a href="index.html" class="logo"><div class="logo-box">H360</div> HESAPLA<span>360</span></a>
    </div>
    <div class="nav-right">
        <div class="menu-container" style="position: relative;">
            <button class="menu-btn" onclick="toggleMenu()">MENÜ <i class="fa-solid fa-bars-staggered" style="margin-left: 8px;"></i></button>
            <div class="dropdown-menu" id="navMenu">
                <a href="yakit.html"><i class="fa-solid fa-gas-pump"></i> Yakıt</a>
                <a href="issizlik.html"><i class="fa-solid fa-calendar-check"></i> İşsizlik</a>
                <a href="faiz.html"><i class="fa-solid fa-chart-line"></i> Faiz</a>
                <a href="tazminat.html"><i class="fa-solid fa-briefcase"></i> Tazminat</a>
                <a href="cv.html"><i class="fa-solid fa-file-invoice"></i> CV</a>
            </div>
        </div>
    </div>
</nav>

<div class="main-wrapper">
    <div class="yakit-card">
        <div class="header-area">
            <div class="icon-box"><i class="fa-solid fa-gas-pump"></i></div>
            <div class="title-text">
                <h1>YAKIT ANALİZİ</h1>
                <p>Detaylı Yolculuk Maliyeti</p>
            </div>
        </div>

        <div class="input-group">
            <label>TOPLAM MESAFE (KM)</label>
            <input type="number" id="dist" placeholder="Mesafe girin">
            <div class="quick-tags">
                <span class="q-tag" onclick="setVal('dist', 150)">Sakarya-İst</span>
                <span class="q-tag" onclick="setVal('dist', 450)">Ankara</span>
                <span class="q-tag" onclick="setVal('dist', 800)">Antalya</span>
            </div>
        </div>

        <div class="grid-inputs">
            <div class="input-group">
                <label>ORT. TÜKETİM (L/100KM)</label>
                <input type="number" id="cons" step="0.1" placeholder="6.5">
                <div class="quick-tags">
                    <span class="q-tag" onclick="setVal('cons', 5.5)">Eco</span>
                    <span class="q-tag" onclick="setVal('cons', 8.5)">Sport</span>
                </div>
            </div>
            <div class="input-group">
                <label>LİTRE FİYATI (₺)</label>
                <input type="number" id="price" step="0.01" placeholder="42.50">
                <div class="quick-tags">
                    <span class="q-tag" onclick="setVal('price', 63.50)">Benzin</span>
                    <span class="q-tag" onclick="setVal('price', 76.20)">Dizel</span>
                </div>
            </div>
        </div>

        <div class="input-group">
            <label>YOLCU SAYISI (MASRAF BÖLÜŞÜMÜ)</label>
            <input type="number" id="ppl" value="1" min="1">
        </div>

        <button class="calc-btn" onclick="calculate()">HESAPLAMAYI BAŞLAT</button>

        <div id="res" class="result-box">
            <div class="main-res">
                <small>TOPLAM YAKIT MALİYETİ</small>
                <b id="resTotal">0 ₺</b>
            </div>

            <div class="stats-row">
                <div class="stat-card">
                    <small>KM BAŞI</small>
                    <span id="resKm" style="color:#10b981">0 ₺</span>
                </div>
                <div class="stat-card">
                    <small>TOPLAM LİTRE</small>
                    <span id="resLitre">0 L</span>
                </div>
                <div class="stat-card">
                    <small>KİŞİ BAŞI</small>
                    <span id="resPpl" style="color:#3b82f6">0 ₺</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleMenu() { document.getElementById('navMenu').classList.toggle('active'); }
    function setVal(id, val) { document.getElementById(id).value = val; }

    window.onclick = function(e) {
        if (!e.target.matches('.menu-btn') && !e.target.closest('.menu-btn')) {
            const menu = document.getElementById('navMenu');
            if (menu && menu.classList.contains('active')) menu.classList.remove('active');
        }
    }

    function calculate() {
        const d = parseFloat(document.getElementById('dist').value) || 0;
        const c = parseFloat(document.getElementById('cons').value) || 0;
        const p = parseFloat(document.getElementById('price').value) || 0;
        const ppl = parseInt(document.getElementById('ppl').value) || 1;

        if(d <= 0 || c <= 0 || p <= 0) return;

        const totalLitre = (d * c) / 100;
        const totalTl = totalLitre * p;
        const kmTl = totalTl / d;
        const perPerson = totalTl / ppl;

        document.getElementById('resTotal').innerText = Math.round(totalTl).toLocaleString('tr-TR') + " ₺";
        document.getElementById('resKm').innerText = kmTl.toFixed(2) + " ₺";
        document.getElementById('resLitre').innerText = totalLitre.toFixed(1) + " L";
        document.getElementById('resPpl').innerText = Math.round(perPerson).toLocaleString('tr-TR') + " ₺";

        document.getElementById('res').style.display = "block";
    }
</script>
</body>
</html>
