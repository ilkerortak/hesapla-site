<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H360 | Yakıt Maliyeti Analizi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="glass-nav">
    <div class="nav-left">
        <a href="index.html" class="logo"><div class="logo-box">H360</div> HESAPLA<span>360</span></a>
    </div>
    <div class="nav-right">
        <div class="menu-container">
            <button class="menu-btn" onclick="toggleMenu()">MENÜ <i class="fa-solid fa-bars-staggered"></i></button>
            <div class="dropdown-menu" id="navMenu">
                <a href="netmaas.html">💰 Maaş</a><a href="tazminat.html">💼 Tazminat</a>
                <a href="issizlik.html">📅 İşsizlik</a><a href="faiz.html">📈 Faiz</a>
                <a href="yakit.html">⛽ Yakıt</a><a href="enflasyon.html">📉 Enflasyon</a>
                <a href="kredi.html">🏦 Kredi</a><a href="yas.html">🎂 Yaş</a>
                <a href="doviz.html">💱 Döviz</a><a href="kdv.html">🧾 KDV</a>
                <a href="mesai.html">🕒 Mesai</a><a href="cv.html">📄 CV</a>
            </div>
        </div>
    </div>
</nav>

<div class="calculation-container">
    <header class="premium-header" style="margin-bottom: 30px;">
        <h1 class="premium-title" style="font-size: 1.8rem;">YAKIT ANALİZİ</h1>
        <p class="premium-status">YOL MALİYETİ VE TÜKETİM HESABI</p>
    </header>

    <div class="form-card">
        <div class="input-group">
            <label>GİDİLECEK MESAFE (KM)</label>
            <input type="number" id="dist" placeholder="Örn: 450">
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="input-group">
                <label>ORT. TÜKETİM (L/100KM)</label>
                <input type="number" id="cons" placeholder="Örn: 6.5">
            </div>
            <div class="input-group">
                <label>YAKIT FİYATI (₺/L)</label>
                <input type="number" id="price" placeholder="Örn: 78.36">
            </div>
        </div>

        <button class="btn-calc" onclick="calcYakit()">YOL MALİYETİNİ HESAPLA</button>

        <div id="res" class="res-area">
            <p style="font-size:0.7rem; font-weight:800; color: var(--text-dim); text-transform: uppercase;">TOPLAM YAKIT GİDERİ</p>
            <div class="res-val" id="totalCost" style="color: #fff;">0 ₺</div>
            
            <div style="margin-top:20px; font-size:0.85rem; color:var(--text-dim); border-top: 1px dashed var(--border); padding-top: 15px; display: flex; justify-content: space-between;">
                <span>Toplam Yakıt: <b id="totalLitre" style="color:#fff">0 L</b></span>
                <span>KM Başına: <b id="perKm" style="color:#2ecc71">0 ₺</b></span>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleMenu() { document.getElementById('navMenu').classList.toggle('active'); }

    function calcYakit() {
        const d = parseFloat(document.getElementById('dist').value) || 0;
        const c = parseFloat(document.getElementById('cons').value) || 0;
        const p = parseFloat(document.getElementById('price').value) || 0;
        
        if(d > 0 && c > 0 && p > 0) {
            const totalLitre = (d * c) / 100;
            const totalCost = totalLitre * p;
            const perKm = totalCost / d;
            
            document.getElementById('totalCost').innerText = Math.round(totalCost).toLocaleString('tr-TR') + " ₺";
            document.getElementById('totalLitre').innerText = totalLitre.toFixed(2) + " L";
            document.getElementById('perKm').innerText = perKm.toFixed(2) + " ₺";
            document.getElementById('res').style.display = "block";
        }
    }

    window.onclick = function(e) { 
        if(!e.target.matches('.menu-btn') && !e.target.closest('.menu-btn')) {
            const menu = document.getElementById('navMenu');
            if(menu && menu.classList.contains('active')) menu.classList.remove('active');
        }
    }
</script>
</body>
</html>
