<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H360 | Yakıt Tüketim Analizi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <a href="/" class="logo"><div class="logo-box">H360</div> HESAPLA<span>360</span></a>
    <div class="nav-container">
        <button class="menu-btn" onclick="toggleMenu()">MENÜ ▾</button>
        <div class="dropdown-menu" id="navMenu">
            <a href="/netmaas">💰 Maaş</a><a href="/tazminat">💼 Tazminat</a>
            <a href="/issizlik">📅 İşsizlik</a><a href="/faiz">📈 Faiz</a>
            <a href="/yakit">⛽ Yakıt</a><a href="/enflasyon">📉 Enflasyon</a>
            <a href="/kredi">🏦 Kredi</a><a href="/yas">🎂 Yaş</a>
            <a href="/doviz">💱 Döviz</a><a href="/kdv">🧾 KDV</a>
            <a href="/mesai">🕒 Mesai</a><a href="/cv">📄 CV</a>
        </div>
    </div>
</nav>

<div class="hero-section">
    <h2>Yakıt Tüketim Analizi</h2>
    <p>YOL MALİYET VE LOJİSTİK PLANLAMA</p>
</div>

<div class="form-box">
    <label>GİDİLECEK MESAFE (KM)</label>
    <input type="number" id="dist" placeholder="Örn: 450">
    
    <label>ORTALAMA TÜKETİM (L/100KM)</label>
    <input type="number" id="cons" placeholder="Örn: 6.5">

    <label>YAKIT LİTRE FİYATI (TL)</label>
    <input type="number" id="price" placeholder="Örn: 62.50">

    <button class="btn-calc" onclick="calcFuel()">MALİYET ANALİZİ YAP</button>

    <div id="res" class="res-area">
        <p style="color:#555; font-size:0.75rem; font-weight:800;">TOPLAM YAKIT GİDERİ</p>
        <div class="res-val" id="fTotal">0 ₺</div>
        <div style="display:flex; justify-content:space-between; margin-top:20px; font-size:0.85rem; color:#888; border-top: 1px solid #1c212c; padding-top: 15px;">
            <span>Toplam Yakıt: <b id="liters" style="color:#fff">0 L</b></span>
            <span>KM Başı: <b id="perKm" style="color:#fff">0 ₺</b></span>
        </div>
    </div>
</div>

<script>
    // Menü açma/kapama
    function toggleMenu() { 
        document.getElementById('navMenu').classList.toggle('active'); 
    }

    // Yakıt hesaplama motoru
    function calcFuel() {
        const d = parseFloat(document.getElementById('dist').value) || 0;
        const c = parseFloat(document.getElementById('cons').value) || 0;
        const p = parseFloat(document.getElementById('price').value) || 0;
        
        if(d > 0 && c > 0 && p > 0) {
            const total = (d * c / 100) * p;
            document.getElementById('fTotal').innerText = Math.round(total).toLocaleString() + " ₺";
            document.getElementById('liters').innerText = (d * c / 100).toFixed(1);
            document.getElementById('perKm').innerText = (total / d).toFixed(2);
            document.getElementById('res').style.display = "block";
        }
    }

    // Menü dışına tıklandığında kapat
    window.onclick = function(event) {
        if (!event.target.matches('.menu-btn')) {
            var dropdowns = document.getElementsByClassName("dropdown-menu");
            for (var i = 0; i < dropdowns.length; i++) {
                var openDropdown = dropdowns[i];
                if (openDropdown.classList.contains('active')) {
                    openDropdown.classList.remove('active');
                }
            }
        }
    }
</script>
</body>
</html>
