<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>CV Oluşturucu - Hesapla360</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
<nav>
    <a href="index.html" class="logo-link"><div class="logo" style="font-weight:800; color:white; font-size:1.4rem;">HESAPLA<span style="color:#fbbf24;">360</span></div></a>
    <ul><li><a href="cv.html" class="active">CV Oluşturucu</a></li></ul>
    <button id="theme-toggle">☀️</button>
</nav>

<div class="container">
    <h1>Ücretsiz CV Oluşturucu</h1>
    <input type="text" id="ad" placeholder="Ad Soyad" style="margin-bottom:10px;">
    <input type="text" id="meslek" placeholder="Meslek" style="margin-bottom:10px;">
    <input type="text" id="iletisim" placeholder="Telefon | E-posta" style="margin-bottom:10px;">
    <textarea id="deneyim" placeholder="Deneyimlerinizden bahsedin..." style="width:100%; border-radius:10px; padding:10px; height:100px; border:2px solid var(--input-border);"></textarea>
    <button onclick="pdfIndir()" style="margin-top:20px;">CV'yi PDF İndir</button>

    <div id="cv-template" style="position:absolute; left:-9999px; width:190mm; padding:20mm; background:white; color:black;">
        <h1 id="p-ad" style="color:#4f46e5;"></h1>
        <h3 id="p-meslek"></h3>
        <p id="p-iletisim"></p>
        <hr>
        <h4>İŞ DENEYİMİ</h4>
        <p id="p-deneyim"></p>
    </div>
</div>
<script src="script.js"></script>
<script>
function pdfIndir() {
    document.getElementById("p-ad").innerText = document.getElementById("ad").value;
    document.getElementById("p-meslek").innerText = document.getElementById("meslek").value;
    document.getElementById("p-iletisim").innerText = document.getElementById("iletisim").value;
    document.getElementById("p-deneyim").innerText = document.getElementById("deneyim").value;
    
    const element = document.getElementById('cv-template');
    html2pdf().from(element).save(document.getElementById("ad").value + "_CV.pdf");
}
</script>
</body>
</html>
