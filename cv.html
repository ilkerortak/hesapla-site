</head>
<body>
<nav><a href="index.html" class="logo">HESAPLA<span>360</span></a><div class="nav-menu">

<div class="container">
    <h2>📄 CV Oluşturucu</h2>
    <div class="input-group"><label>Ad Soyad</label><input type="text" id="a"></div>
    <div class="input-group"><label>Deneyimler & Eğitim</label><textarea id="b" style="height:150px;"></textarea></div>
    <button onclick="pdf()">PDF Olarak Kaydet</button>
</div>
<script>
function pdf(){
    let a=document.getElementById("a").value, b=document.getElementById("b").value; if(!a)return;
    let doc = {
        content: [
            {text: a.toUpperCase(), fontSize: 22, bold: true, color: '#a855f7'},
            {text: '\n' + b, fontSize: 12}
        ]
    };
    pdfMake.createPdf(doc).download(a + "_CV.pdf");
}
</script>
</body></html>
