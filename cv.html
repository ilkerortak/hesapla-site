<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>CV Oluşturucu - Hesapla360</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
<nav>
    <a href="index.html" class="logo">HESAPLA<span>360</span></a>
    <ul class="nav-menu"><li><a href="cv.html" class="active">CV</a></li></ul>
</nav>

<div class="container">
    <h2>Ücretsiz CV Hazırla</h2>
    <input type="text" id="ad" placeholder="Ad Soyad" style="margin-bottom:12px;">
    <textarea id="bilgi" placeholder="Deneyimleriniz ve yetkinlikleriniz..." style="width:100%; height:120px;"></textarea>
    <button onclick="indir()">PDF İndir</button>
</div>

<div id="cv-p" style="position: absolute; left: -9999px; width: 190mm; padding: 40px; background: white; color: black;">
    <h1 id="p-ad" style="color: #6366f1;"></h1><hr>
    <p id="p-bilgi" style="white-space: pre-wrap; margin-top: 20px; line-height: 1.6;"></p>
</div>

<script>
    function indir() {
        const ad = document.getElementById("ad").value;
        if(!ad) { alert("Adınızı yazın."); return; }
        document.getElementById("p-ad").innerText = ad;
        document.getElementById("p-bilgi").innerText = document.getElementById("bilgi").value;
        html2pdf().from(document.getElementById('cv-p')).save(ad + "_CV.pdf");
    }
</script>
</body>
</html>
