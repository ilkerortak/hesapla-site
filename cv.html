<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>CV Oluşturucu - Hesapla360</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
<nav>
    <a href="index.html" class="logo">HESAPLA<span>360</span></a>
    <ul class="nav-menu"><li><a href="cv.html" class="active">CV</a></li></ul>
    <div class="theme-switch-wrapper"><label class="theme-switch"><input type="checkbox" id="theme-checkbox"><span class="slider"></span></label></div>
</nav>

<div class="container">
    <h2>Ücretsiz CV</h2>
    <input type="text" id="ad" placeholder="Ad Soyad" style="margin-bottom:10px;">
    <textarea id="bilgi" placeholder="Deneyimler..." style="width:100%; height:100px; padding:10px; border-radius:10px; border:1px solid var(--input-border); background:var(--card-bg); color:var(--text-color);"></textarea>
    <button onclick="indir()">PDF İndir</button>
</div>

<div id="cv-p" style="position:absolute; left:-9999px; width:190mm; padding:20px; background:white; color:black;">
    <h1 id="p-ad"></h1><hr><p id="p-bilgi"></p>
</div>

<script>
    const checkbox = document.getElementById('theme-checkbox');
    if (localStorage.getItem('theme') === 'dark') { document.body.classList.add('dark'); checkbox.checked = true; }
    checkbox.addEventListener('change', () => { document.body.classList.toggle('dark'); localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light'); });

    function indir() {
        document.getElementById("p-ad").innerText = document.getElementById("ad").value;
        document.getElementById("p-bilgi").innerText = document.getElementById("bilgi").value;
        html2pdf().from(document.getElementById('cv-p')).save("CV.pdf");
    }
</script>
</body>
</html>
