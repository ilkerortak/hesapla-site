<!DOCTYPE html>
<html lang="tr">
<head>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.min.js"></script>
</head>
<body>
<nav><a href="index.html" class="logo">HESAPLA<span>360</span></a></nav>
<div class="container">
    <h2>📄 Profesyonel CV</h2>
    <input type="text" id="ad" placeholder="Ad Soyad" style="margin-bottom:10px;">
    <input type="text" id="unvan" placeholder="Ünvan (Örn: Yazılım Geliştirici)" style="margin-bottom:10px;">
    <textarea id="bilgi" placeholder="Deneyimleriniz ve yetenekleriniz..." style="height:120px;"></textarea>
    <button onclick="indir()">PDF İNDİR</button>
</div>
<script>
    function indir() {
        const ad = document.getElementById("ad").value;
        const unvan = document.getElementById("unvan").value;
        const bilgi = document.getElementById("bilgi").value;
        if(!ad) return alert("Lütfen adınızı yazın.");
        const docDef = {
            content: [
                { text: ad.toUpperCase(), fontSize: 24, bold: true, color: '#6366f1' },
                { text: unvan, fontSize: 14, color: '#666', margin: [0, 5, 0, 15] },
                { canvas: [{ type: 'line', x1: 0, y1: 5, x2: 515, y2: 5, lineWidth: 1.5, lineColor: '#6366f1' }] },
                { text: '\nPROFESYONEL ÖZET', bold: true, margin: [0, 10] },
                { text: bilgi, lineHeight: 1.5 }
            ]
        };
        pdfMake.createPdf(docDef).download(ad + "_CV.pdf");
    }
</script>
</body>
</html>
