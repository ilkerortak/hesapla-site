<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>CV Oluşturucu 2026</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<meta name="description" content="Basit CV oluşturucu ile kendi CV’nizi hemen hazırlayın.">
</head>
<body>
<nav>
  <ul>
    <li><a href="index.html">Ana Sayfa</a></li>
    <li><a href="netmaas.html">Net Maaş</a></li>
    <li><a href="issizlik.html">İşsizlik Maaşı</a></li>
    <li><a href="kredi.html">Kredi Hesaplama</a></li>
    <li><a href="yas.html">Yaş Hesaplama</a></li>
    <li><a href="cv.html">CV Oluşturucu</a></li>
  </ul>
  <button id="theme-toggle">☀️</button>
</nav>

<div class="container">
<h1>CV Oluşturucu 2026</h1>

<input type="text" id="ad" placeholder="Ad">
<input type="text" id="soyad" placeholder="Soyad">
<input type="text" id="meslek" placeholder="Meslek">
<input type="text" id="telefon" placeholder="Telefon">
<input type="text" id="email" placeholder="E-mail">

<h2>Deneyim Ekle</h2>
<div id="deneyimler-container">
  <div class="deneyim">
    <input type="text" class="firma" placeholder="Firma Adı">
    <input type="text" class="pozisyon" placeholder="Pozisyon / Görev">
    <input type="text" class="sure" placeholder="Başlangıç-Bitiş Yılı (örn: 2020-2023)">
  </div>
</div>
<button onclick="yeniDeneyim()">Yeni Deneyim Ekle</button>

<button onclick="olustur()">CV Oluştur & PDF İndir</button>
</div>

<script>
// Yeni deneyim satırı ekleme
function yeniDeneyim(){
  const container = document.getElementById("deneyimler-container");
  const div = document.createElement("div");
  div.classList.add("deneyim");
  div.innerHTML = `
    <input type="text" class="firma" placeholder="Firma Adı">
    <input type="text" class="pozisyon" placeholder="Pozisyon / Görev">
    <input type="text" class="sure" placeholder="Başlangıç-Bitiş Yılı (örn: 2020-2023)">
  `;
  container.appendChild(div);
}

// PDF Oluştur
async function olustur(){
  const { jsPDF } = window.jspdf;
  let doc = new jsPDF();

  let ad=document.getElementById("ad").value;
  let soyad=document.getElementById("soyad").value;
  let meslek=document.getElementById("meslek").value;
  let telefon=document.getElementById("telefon").value;
  let email=document.getElementById("email").value;

  doc.setFontSize(22);
  doc.setTextColor(79,70,229);
  doc.text(`${ad} ${soyad}`,20,30);

  doc.setFontSize(16);
  doc.setTextColor(0,0,0);
  doc.text(`Meslek: ${meslek}`,20,50);
  doc.text(`Telefon: ${telefon}`,20,60);
  doc.text(`Email: ${email}`,20,70);

  // Deneyimler
  doc.setFontSize(18);
  doc.setTextColor(79,70,229);
  doc.text("Deneyim",20,90);
  doc.setFontSize(14);
  doc.setTextColor(0,0,0);

  const deneyimler = document.querySelectorAll("#deneyimler-container .deneyim");
  let y = 100; // başlangıç Y konumu
  deneyimler.forEach(d => {
    const firma = d.querySelector(".firma").value;
    const pozisyon = d.querySelector(".pozisyon").value;
    const sure = d.querySelector(".sure").value;
    if(firma || pozisyon || sure){
      doc.text(`- ${firma} | ${sure} | ${pozisyon}`, 20, y);
      y += 10;
    }
  });

  doc.save(`${ad}_${soyad}_CV.pdf`);
}

// Tema persist
const themeToggle = document.getElementById("theme-toggle");
if(localStorage.getItem('theme')==='dark'){
    document.body.classList.add('dark');
    themeToggle.textContent='🌙';
}else{ themeToggle.textContent='☀️'; }
themeToggle.addEventListener('click',()=>{
    document.body.classList.toggle('dark');
    if(document.body.classList.contains('dark')){
        themeToggle.textContent='🌙';
        localStorage.setItem('theme','dark');
    }else{
        themeToggle.textContent='☀️';
        localStorage.setItem('theme','light');
    }
});
</script>
</body>
</html>
