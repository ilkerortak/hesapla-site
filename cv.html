<div class="hero-section">
    <h2>Hızlı CV Oluşturucu</h2>
    <p>PROFESYONEL ÖZET VE KİMLİK KARTI</p>
</div>

<div class="form-box">
    <label>AD SOYAD</label>
    <input type="text" id="name" placeholder="İlker Ortak">
    
    <label>UNVAN / UZMANLIK</label>
    <input type="text" id="job" placeholder="Software Developer">

    <label>E-POSTA</label>
    <input type="email" id="mail" placeholder="iletisim@h360.io">

    <button class="btn-calc" onclick="genCV()">KARTI OLUŞTUR</button>

    <div id="res" class="res-area" style="text-align: left; background: #0b0e14; padding: 20px; border-radius: 10px;">
        <h3 id="resName" style="color:#007bff; margin:0;">-</h3>
        <p id="resJob" style="color:#fff; font-weight:700; font-size:0.9rem; margin-bottom:10px;">-</p>
        <p id="resMail" style="color:#666; font-size:0.8rem;">-</p>
        <div style="border-top: 1px solid #1c212c; margin-top:10px; padding-top:10px;">
            <button onclick="window.print()" style="background:none; border:1px solid #007bff; color:#007bff; padding:5px 10px; border-radius:5px; font-size:0.7rem; cursor:pointer;">PDF OLARAK KAYDET</button>
        </div>
    </div>
</div>

<script>
    function genCV() {
        document.getElementById('resName').innerText = document.getElementById('name').value.toUpperCase();
        document.getElementById('resJob').innerText = document.getElementById('job').value;
        document.getElementById('resMail').innerText = document.getElementById('mail').value;
        document.getElementById('res').style.display = "block";
    }
</script>
