<body>

<div class="container">
<h1>CV Oluşturucu 2026</h1>
<button onclick="toggleTheme()">Koyu/Açık Tema</button>
<p>Ad, soyad ve mesleğinizi girin:</p>
<input type="text" id="ad" placeholder="Ad">
<input type="text" id="soyad" placeholder="Soyad">
<input type="text" id="meslek" placeholder="Meslek">
<button onclick="olustur()">CV Oluştur</button>
<h2 id="sonuc"></h2>
</div>

<script>
function olustur() {
  let ad = document.getElementById("ad").value;
  let soyad = document.getElementById("soyad").value;
  let meslek = document.getElementById("meslek").value;
  document.getElementById("sonuc").innerText = `Adı Soyadı: ${ad} ${soyad}\nMeslek: ${meslek}`;
}
function toggleTheme() { document.body.classList.toggle("dark"); }
</script>
</body>
</html>
