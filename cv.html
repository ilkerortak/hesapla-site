<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>CV Hazırla - Hesapla360</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.min.js"></script>
</head>
<body>
<nav><a href="index.html" class="logo">HESAPLA<span>360</span></a></nav>
<div class="container">
    <h2>📄 CV Oluştur</h2>
    <input type="text" id="ad" placeholder="Ad Soyad" style="margin-bottom:15px;">
    <textarea id="bilgi" placeholder="Deneyimleriniz..." style="height:150px;"></textarea>
    <button onclick="indir()">PDF Olarak İndir (Kesin Çözüm)</button>
</div>
<script>
    function indir() {
        const ad = document.getElementById("ad").value;
        const bilgi = document.getElementById("bilgi").value;
        if(!ad) return alert("Ad giriniz.");
        
        const docDef = {
            content: [
                { text: ad.toUpperCase(), fontSize: 22, bold: true, color: '#6366f1' },
                { canvas: [{ type: 'line', x1: 0, y1: 5, x2: 515, y2: 5, lineWidth: 1, lineColor: '#eee' }] },
                { text: '\nDENEYİM VE BİLGİLER', bold: true, margin: [0, 15] },
                { text: bilgi, lineHeight: 1.5 }
            ]
        };
        pdfMake.createPdf(docDef).download(ad + "_CV.pdf");
    }
</script>
</body>
</html>
