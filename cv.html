<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H360 | Hızlı CV Oluşturucu</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #05080d; margin: 0; font-family: 'Inter', sans-serif; color: #fff; }
        .main-wrapper { 
            display: flex; justify-content: center; align-items: flex-start; 
            min-height: 100vh; padding: 100px 20px 60px; box-sizing: border-box; 
        }
        .calc-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            backdrop-filter: blur(12px);
        }
        .header-area { text-align: center; margin-bottom: 30px; }
        .header-area h1 { font-size: 1.6rem; letter-spacing: 2px; margin: 0; }
        .header-area p { color: #007bff; font-size: 0.75rem; font-weight: 700; margin-top: 8px; text-transform: uppercase; }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; color: #007bff; font-size: 0.7rem; font-weight: 800; margin-bottom: 8px; }
        .input-group input, .input-group textarea {
            width: 100%; padding: 14px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
            color: #fff; font-size: 0.95rem; outline: none; transition: 0.3s; box-sizing: border-box; font-family: inherit;
        }
        .input-group textarea { height: 80px; resize: none; }
        .input-group input:focus, .input-group textarea:focus { border-color: #007bff; background: rgba(255,255,255,0.08); }
        
        .calc-btn {
            width: 100%; padding: 16px; background: #007bff; color: #fff;
            border: none; border-radius: 10px; font-weight: 700; cursor: pointer;
            font-size: 1rem; transition: 0.3s;
        }
        .calc-btn:hover { background: #0056b3; transform: translateY(-2px); }

        /* CV ÖNİZLEME ALANI */
        .cv-preview {
            margin-top: 40px; padding: 40px; background: #fff; color: #000;
            border-radius: 4px; display: none; text-align: left;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .cv-header { border-bottom: 2px solid #007bff; padding-bottom: 15px; margin-bottom: 20px; }
        .cv-name { font-size: 1.8rem; font-weight: 800; margin: 0; color: #000; }
        .cv-title { font-size: 1.1rem; color: #007bff; font-weight: 600; margin-top: 5px; }
        .cv-section { margin-bottom: 20px; }
        .cv-section h4 { text-transform: uppercase; font-size: 0.85rem; border-bottom: 1px solid #eee; padding-bottom: 5px; margin-bottom: 10px; color: #666; }
        .cv-text { font-size: 0.9rem; line-height: 1.6; white-space: pre-wrap; }

        @media print {
            body { background: #fff; }
            .main-wrapper { padding: 0; align-items: flex-start; }
            nav, .calc-card .header-area, .input-group, .calc-btn, .print-hide { display: none !important; }
            .calc-card { border: none; background: transparent; padding: 0; max-width: 100%; }
            .cv-preview { display: block !important; box-shadow: none; padding: 0; margin: 0; width: 100%; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="calc-card">
        <div class="header-area">
            <h1>HIZLI CV</h1>
            <p>PROFESYONEL ÖZGEÇMİŞ OLUŞTURUCU</p>
        </div>

        <div class="input-group">
            <label>AD SOYAD & İLETİŞİM</label>
            <input type="text" id="name" placeholder="Ad Soyad">
            <input type="text" id="mail" placeholder="E-posta / Telefon / Konum" style="margin-top: 10px;">
        </div>

        <div class="input-group">
            <label>UNVAN</label>
            <input type="text" id="job" placeholder="Örn: Senior Python Developer">
        </div>

        <div class="input-group">
            <label>DENEYİM & EĞİTİM</label>
            <textarea id="exp" placeholder="Çalıştığınız yerler veya okuduğunuz okullar..."></textarea>
        </div>

        <div class="input-group">
            <label>YETENEKLER & ARAÇLAR</label>
            <input type="text" id="skills" placeholder="Örn: Python, Flask, Android Studio, SQL">
        </div>

        <button class="calc-btn" onclick="genCV()">PDF OLUŞTUR</button>

        <div id="res" class="cv-preview">
            <div class="cv-header">
                <h3 class="cv-name" id="resName">-</h3>
                <div class="cv-title" id="resJob">-</div>
                <div style="font-size: 0.8rem; margin-top: 5px; color: #555;" id="resMail">-</div>
            </div>
            
            <div class="cv-section">
                <h4>Özet ve Deneyim</h4>
                <div class="cv-text" id="resExp">-</div>
            </div>

            <div class="cv-section">
                <h4>Yetenekler</h4>
                <div class="cv-text" id="resSkills">-</div>
            </div>

            <button class="print-hide" onclick="window.print()" style="margin-top: 20px; width: 100%; padding: 12px; background: #000; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: 600;">
                <i class="fa-solid fa-print"></i> PDF OLARAK KAYDET
            </button>
        </div>
    </div>
</div>

<script>
    function toggleMenu() { document.getElementById('navMenu').classList.toggle('active'); }

    function genCV() {
        const name = document.getElementById('name').value;
        const job = document.getElementById('job').value;
        const mail = document.getElementById('mail').value;
        const exp = document.getElementById('exp').value;
        const skills = document.getElementById('skills').value;

        if(name && job) {
            document.getElementById('resName').innerText = name.toUpperCase();
            document.getElementById('resJob').innerText = job;
            document.getElementById('resMail').innerText = mail;
            document.getElementById('resExp').innerText = exp;
            document.getElementById('resSkills').innerText = skills;
            document.getElementById('res').style.display = "block";
            
            // Önizlemeye odaklan
            document.getElementById('res').scrollIntoView({ behavior: 'smooth' });
        } else {
            alert("En azından Ad ve Unvan girmelisin!");
        }
    }

    window.onclick = function(e) { 
        if(!e.target.matches('.menu-btn') && !e.target.closest('.menu-btn')) {
            const menu = document.getElementById('navMenu');
            if(menu && menu.classList.contains('active')) menu.classList.remove('active');
        }
    }
</script>
    <script src="h360-core.js"></script>
</body>
</html>
