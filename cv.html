<div id="cv-p" style="position: absolute; left: -9999px; width: 190mm; min-height: 250mm; padding: 40px; background: white !important; color: #000 !important; font-family: Arial, sans-serif;">
    <h1 id="p-ad" style="color: #6366f1; margin-bottom: 5px; font-size: 28px;"></h1>
    <p id="p-meslek" style="font-weight: bold; font-size: 18px; color: #475569; margin-bottom: 20px;"></p>
    <div style="border-bottom: 2px solid #6366f1; margin-bottom: 20px;"></div>
    <h3 style="color: #6366f1; margin-bottom: 10px;">DENEYİM VE BİLGİLER</h3>
    <p id="p-bilgi" style="line-height: 1.6; white-space: pre-wrap; font-size: 14px;"></p>
</div>

<script>
    // Tema Kontrolü
    const checkbox = document.getElementById('theme-checkbox');
    if (localStorage.getItem('theme') === 'dark') { 
        document.body.classList.add('dark'); 
        if(checkbox) checkbox.checked = true; 
    }
    checkbox.addEventListener('change', () => { 
        document.body.classList.toggle('dark'); 
        localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light'); 
    });

    function indir() {
        const ad = document.getElementById("ad").value;
        const bilgi = document.getElementById("bilgi").value;

        if(!ad) { alert("Lütfen adınızı girin."); return; }

        // Değerleri PDF şablonuna aktar
        document.getElementById("p-ad").innerText = ad;
        document.getElementById("p-bilgi").innerText = bilgi;
        
        // PDF Seçenekleri
        const opt = {
            margin:       10,
            filename:     ad + '_CV.pdf',
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, useCORS: true, letterRendering: true },
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        // PDF Oluşturma (Görünürlüğü zorla)
        const element = document.getElementById('cv-p');
        html2pdf().set(opt).from(element).save();
    }
</script>
