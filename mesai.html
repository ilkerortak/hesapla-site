<div class="hero-section">
    <h2>Mesai Hesaplama</h2>
    <p>EK ÇALIŞMA SÜRESİ VE GELİR ANALİZİ</p>
</div>

<div class="form-box">
    <label>AYLIK NET MAAŞ (TL)</label>
    <input type="number" id="maas" placeholder="Örn: 35.000">
    
    <label>TOPLAM MESAI SAATİ</label>
    <input type="number" id="saat" placeholder="Örn: 15">

    <button class="btn-calc" onclick="calcMesai()">EK KAZANCI GÖR</button>

    <div id="res" class="res-area">
        <p style="color:#555; font-size:0.7rem; font-weight:800;">ALINACAK EK ÜCRET</p>
        <div class="res-val" id="ekUcret">0 ₺</div>
        <p style="font-size:0.75rem; color:#888; margin-top:10px;">
            Saatlik Mesai Ücreti: <b id="saatlik" style="color:#fff">0 ₺</b>
        </p>
    </div>
</div>

<script>
    function calcMesai() {
        const maas = parseFloat(document.getElementById('maas').value) || 0;
        const saat = parseFloat(document.getElementById('saat').value) || 0;
        // Yasal çalışma 225 saat üzerinden 1.5 çarpanla
        const saatlikMesai = (maas / 225) * 1.5;
        const sonuc = saatlikMesai * saat;
        
        document.getElementById('ekUcret').innerText = Math.round(sonuc).toLocaleString() + " ₺";
        document.getElementById('saatlik').innerText = saatlikMesai.toFixed(2) + " ₺";
        document.getElementById('res').style.display = "block";
    }
</script>
