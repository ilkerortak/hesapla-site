<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H360 | Mesai Hesaplama</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Sayfayı mermi gibi ortalayan ve patlamayı önleyen özel CSS */
        body { background-color: #0b0f19; margin: 0; font-family: 'Inter', sans-serif; color: #fff; }
        .main-wrapper { 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; padding: 100px 20px 60px; box-sizing: border-box; 
        }
        .calc-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .header-area { text-align: center; margin-bottom: 35px; }
        .header-area h1 { font-size: 1.6rem; letter-spacing: 2px; margin: 0; font-weight: 700; }
        .header-area p { color: #007bff; font-size: 0.75rem; font-weight: 700; margin-top: 8px; text-transform: uppercase; }
        
        .input-group { margin-bottom: 25px; }
        .input-group label { display: block; color: #007bff; font-size: 0.7rem; font-weight: 800; margin-bottom: 10px; }
        .input-group input {
            width: 100%; padding: 16px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            color: #fff; font-size: 1rem; outline: none; transition: 0.3s; box-sizing: border-box;
        }
        .input-group input:focus { border-color: #007bff; background: rgba(255,255,255,0.08); }
        
        .calc-btn {
            width: 100%; padding: 18px; background: #007bff; color: #fff;
            border: none; border-radius: 12px; font-weight: 700; cursor: pointer;
            font-size: 1rem; transition: 0.3s; margin-top: 5px;
        }
        .calc-btn:hover { background: #0056b3; transform: translateY(-2px); }
        
        .result-box {
            margin-top: 30px; padding-top: 25px; border-top: 1px dashed rgba(255,255,255,0.15);
            display: none; text-align: center;
        }
        .result-label { font-size: 0.7rem; color: #888; font-weight: 800; margin-bottom: 5px; }
        .result-main { font-size: 2.5rem; font-weight: 700; color: #2ecc71; margin-bottom: 20px; }
        .result-footer { font-size: 0.85rem; color: #aaa; }
        .result-footer b { color: #fff; }
    </style>
</head>
<body>

<nav class="glass-nav">
    <div class="nav-left">
        <a href="index.html" class="logo"><div class="logo-box">H360</div> HESAPLA<span>360</span></a>
    </div>
    <div class="nav-right">
        <div class="menu-container">
            <button class="menu-btn" onclick="toggleMenu()">MENÜ <i class="fa-solid fa-bars-staggered"></i></button>
            <div class="dropdown-menu" id="navMenu">
                <a href="netmaas.html">💰 Maaş</a><a href="tazminat.html">💼 Tazminat</a>
                <a href="issizlik.html">📅 İşsizlik</a><a href="faiz.html">📈 Faiz</a>
                <a href="yakit.html">⛽ Yakıt</a><a href="enflasyon.html">📉 Enflasyon</a>
                <a href="kredi.html">🏦 Kredi</a><a href="yas.html">🎂 Yaş</a>
                <a href="doviz.html">💱 Döviz</a><a href="kdv.html">🧾 KDV</a>
                <a href="mesai.html">🕒 Mesai</a><a href="cv.html">📄 CV</a>
            </div>
        </div>
    </div>
</nav>

<div class="main-wrapper">
    <div class="calc-card">
        <div class="header-area">
            <h1>MESAİ HESAPLAMA</h1>
            <p>EK ÇALIŞMA VE GELİR ANALİZİ</p>
        </div>

        <div class="input-group">
            <label>AYLIK NET MAAŞ (TL)</label>
            <input type="number" id="maas" placeholder="Örn: 35000">
        </div>

        <div class="input-group">
            <label>TOPLAM MESAİ SAATİ</label>
            <input type="number" id="saat" placeholder="Örn: 15">
        </div>

        <button class="calc-btn" onclick="calcMesai()">EK KAZANCI GÖR</button>

        <div id="res" class="result-box">
            <div class="result-label">ALINACAK EK ÜCRET</div>
            <div class="result-main" id="ekUcret">0 ₺</div>
            <div class="result-footer">
                Saatlik Mesai Ücreti: <b id="saatlik">0 ₺</b>
                <p style="font-size: 0.65rem; color: #555; margin-top: 15px; line-height: 1.4;">
                    * Yasal çalışma 225 saat üzerinden %50 zamlı (1.5 çarpan) hesaplanır.
                </p>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleMenu() { document.getElementById('navMenu').classList.toggle('active'); }

    function calcMesai() {
        const maas = parseFloat(document.getElementById('maas').value) || 0;
        const saat = parseFloat(document.getElementById('saat').value) || 0;
        
        if(maas > 0 && saat > 0) {
            // Yasal çalışma 225 saat üzerinden 1.5 çarpanla
            const saatlikMesai = (maas / 225) * 1.5;
            const sonuc = saatlikMesai * saat;
            
            document.getElementById('ekUcret').innerText = Math.round(sonuc).toLocaleString('tr-TR') + " ₺";
            document.getElementById('saatlik').innerText = saatlikMesai.toFixed(2).toLocaleString('tr-TR') + " ₺";
            document.getElementById('res').style.display = "block";
        }
    }

    window.onclick = function(e) { 
        if(!e.target.matches('.menu-btn') && !e.target.closest('.menu-btn')) {
            const menu = document.getElementById('navMenu');
            if(menu && menu.classList.contains('active')) menu.classList.remove('active');
        }
    }
</script>
</body>
</html>
