<!DOCTYPE html>
<html lang="tr">
<head><link rel="stylesheet" href="style.css"></head>
<body>
<nav><a href="index.html" class="logo">HESAPLA<span>360</span></a><div class="nav-menu">
    <a href="netmaas.html">💰 Maaş</a><a href="tazminat.html">💼 Tazminat</a><a href="issizlik.html">📅 İşsizlik</a>
    <a href="kredi.html">🏦 Kredi</a><a href="yas.html">🎂 Yaş</a><a href="doviz.html">💱 Döviz</a>
    <a href="kdv.html">🧾 KDV</a><a href="mesai.html" class="active">🕒 Mesai</a><a href="cv.html">📄 CV</a>
</div></nav>
<div class="container">
    <h2>🕒 Mesai Hesapla</h2>
    <div class="input-group"><label>Brüt Maaş</label><input type="number" id="m"></div>
    <div class="input-group"><label>Fazla Mesai Saati</label><input type="number" id="s"></div>
    <button onclick="calc()">Kazancı Gör</button>
    <div id="res" class="result-box">
        <div class="row"><span>Saatlik Ücret</span><span id="su"></span></div>
        <div class="row"><span>Mesai Çarpanı</span><span>1.5x (%50 Zam)</span></div>
        <div class="row total"><span>Ek Kazanç (Brüt)</span><span id="ek"></span></div>
    </div>
</div>
<script>
function calc(){
    let m=document.getElementById("m").value, s=document.getElementById("s").value; if(!m)return;
    let su = m/225;
    document.getElementById("res").style.display="block";
    document.getElementById("su").innerText=su.toFixed(2)+" TL";
    document.getElementById("ek").innerText=(s*su*1.5).toLocaleString()+" TL";
}
</script>
</body></html>
