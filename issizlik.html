<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>İşsizlik Maaşı Hesaplama 2026 - Hesapla360</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<nav>
    <a href="index.html" class="logo-link"><div class="logo" style="font-weight:800; color:white; font-size:1.4rem;">HESAPLA<span style="color:#fbbf24;">360</span></div></a>
    <ul>
        <li><a href="netmaas.html">Maaş</a></li>
        <li><a href="issizlik.html" class="active">İşsizlik</a></li>
        <li><a href="kredi.html">Kredi</a></li>
        <li><a href="cv.html">CV</a></li>
    </ul>
    <button id="theme-toggle">☀️</button>
</nav>

<div class="container">
    <h1>İşsizlik Maaşı Hesaplama</h1>
    <div class="input-group">
        <p>Son 4 Aylık Brüt Maaş Ortalamanız:</p>
        <div class="input-wrapper">
            <input type="number" id="brut-ort" placeholder="Örn: 35000">
            <span>TL</span>
        </div>
    </div>
    <div class="input-group">
        <p>Son 3 Yıldaki Toplam Prim Gününüz:</p>
        <select id="prim-gun">
            <option value="180">600 - 899 Gün (6 Ay Ödeme)</option>
            <option value="240">900 - 1079 Gün (8 Ay Ödeme)</option>
            <option value="300">1080+ Gün (10 Ay Ödeme)</option>
        </select>
    </div>
    <button onclick="issizlikHesapla()">Hesapla</button>
    <div id="sonuc-box" style="display:none;" class="result-item">
        <span>Alacağınız Aylık Maaş:</span>
        <strong id="maas-tutar">0 TL</strong>
        <p id="sure-bilgi" style="font-size: 0.9rem; margin-top:10px; opacity:0.8;"></p>
    </div>
</div>
<script src="script.js"></script>
<script>
function issizlikHesapla() {
    let brut = parseFloat(document.getElementById("brut-ort").value);
    let gun = document.getElementById("prim-gun").value;
    if(!brut) return;
    const ASGARI_2026 = 33030;
    const TAVAN = ASGARI_2026 * 0.80;
    let net = (brut * 0.40) * 0.99241; // Damga vergisi düşülmüş
    if(net > TAVAN) net = TAVAN;
    document.getElementById("sonuc-box").style.display = "block";
    document.getElementById("maas-tutar").innerText = net.toLocaleString('tr-TR', {maximumFractionDigits:2}) + " TL";
    document.getElementById("sure-bilgi").innerText = `Bu maaşı ${gun === "180" ? "6" : gun === "240" ? "8" : "10"} ay boyunca alabilirsiniz.`;
}
</script>
</body>
</html>
