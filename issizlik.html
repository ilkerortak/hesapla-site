<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>İşsizlik Maaşı - Hesapla360</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<nav>
    <a href="index.html" class="logo">HESAPLA<span>360</span></a>
    <ul class="nav-menu">
        <li><a href="issizlik.html" class="active">İşsizlik</a></li>
        <li><a href="kredi.html">Kredi</a></li>
        <li><a href="cv.html">CV</a></li>
    </ul>
    <div class="theme-switch-wrapper"><label class="theme-switch"><input type="checkbox" id="theme-checkbox"><span class="slider"></span></label></div>
</nav>

<div class="container">
    <h2>İşsizlik Maaşı</h2>
    <div class="input-group"><label>Brüt Maaş Ortalamanız</label><input type="number" id="b-ort" placeholder="TL"></div>
    <button onclick="issizlik()">Hesapla</button>
    <div id="sonuc-box" style="display:none;" class="result-item">
        <p>Aylık Ödeme</p>
        <strong id="i-sonuc">0 TL</strong>
    </div>
</div>

<script>
    const checkbox = document.getElementById('theme-checkbox');
    if (localStorage.getItem('theme') === 'dark') { document.body.classList.add('dark'); checkbox.checked = true; }
    checkbox.addEventListener('change', () => { document.body.classList.toggle('dark'); localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light'); });

    function issizlik() {
        let b = parseFloat(document.getElementById("b-ort").value);
        let net = (b * 0.40);
        const max = 26424; // 2026 Tahmini tavan
        if(net > max) net = max;
        document.getElementById("sonuc-box").style.display = "block";
        document.getElementById("i-sonuc").innerText = net.toLocaleString('tr-TR') + " TL";
    }
</script>
</body>
</html>
