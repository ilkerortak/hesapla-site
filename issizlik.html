<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>İşsizlik Maaşı Hesaplama 2026</title>
<link rel="stylesheet" href="style.css">
<meta name="description" content="2026 yılı işsizlik maaşı hesaplama aracını kullanarak yaklaşık işsizlik maaşınızı öğrenin.">
</head>
<body>
<nav>
  <ul>
    <li><a href="index.html">Ana Sayfa</a></li>

<div class="container">
<h1>İşsizlik Maaşı Hesaplama 2026</h1>
<button onclick="toggleTheme()">Koyu/Açık Tema</button>
<p>Brüt maaşınızı girin:</p>
<input type="number" id="brut" placeholder="Örn: 20000">
<button onclick="hesapla()">Hesapla</button>
<h2 id="sonuc"></h2>
</div>

<script>
function hesapla() {
  let brut = document.getElementById("brut").value;
  let net = brut * 0.50;
  document.getElementById("sonuc").innerText = "Yaklaşık İşsizlik Maaşı: " + net + " TL";
}
function toggleTheme() { document.body.classList.toggle("dark"); }
</script>
</body>
</html>
