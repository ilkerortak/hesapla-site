<div class="hero-section">
    <h2>İşsizlik Ödeneği</h2>
    <p>SÜRE VE MAAŞ ANALİZ SİSTEMİ</p>
</div>

<div class="form-box">
    <label>SON 4 AY BRÜT ORTALAMASI</label>
    <input type="number" id="ortBrut" placeholder="Örn: 40.000">
    
    <button class="btn-calc" onclick="hesaplaIssizlik()">ÖDENEK SORGULA</button>

    <div id="res" class="res-area">
        <p style="color:#555; font-size:0.7rem; font-weight:800;">AYLIK ALINACAK ÖDENEK</p>
        <div class="res-val" id="odenek">0 ₺</div>
        <p style="font-size:0.7rem; color:#444; margin-top:10px;">* Brüt maaşın %40'ı hesaplanır, asgari ücretin %80'ini geçemez.</p>
    </div>
</div>

<script>
    function toggleMenu() { document.getElementById('navMenu').classList.toggle('active'); }
    function hesaplaIssizlik() {
        const ort = parseFloat(document.getElementById('ortBrut').value) || 0;
        let odenek = ort * 0.4;
        if (odenek > 15998) odenek = 15998; // Örnek tavan fiyat
        
        document.getElementById('odenek').innerText = Math.round(odenek).toLocaleString() + " ₺";
        document.getElementById('res').style.display = "block";
    }
</script>
