<!DOCTYPE html>
<html lang="tr">
<head><link rel="stylesheet" href="style.css"></head>
<body>
<nav><a href="index.html" class="logo">HESAPLA<span>360</span></a></nav>
<div class="container">
    <h2>📅 İşsizlik Maaşı</h2>
    <div class="input-group"><label>Son 4 Aylık Brüt Maaş Ortalaması</label><input type="number" id="b-ort"></div>
    <button onclick="hesapla()">Hesapla</button>
    <div id="sonuc-box" style="display:none;" class="result-item">
        <div class="detail-row"><span>Hesaplanan (%40)</span> <span id="h-oran"></span></div>
        <div class="detail-row"><span>Damga Vergisi Kesintisi</span> <span id="dv"></span></div>
        <div class="detail-row total"><span>Net Aylık Ödeme</span> <span id="net"></span></div>
        <p style="font-size:0.7rem; color:orange; margin-top:10px;">*Maaş, asgari ücretin %80'ini geçemez.</p>
    </div>
</div>
<script>
    function hesapla() {
        let b = parseFloat(document.getElementById("b-ort").value);
        if(!b) return;
        let ham = b * 0.40;
        let tavan = 26424; // 2026 Tahmini
        let son = ham > tavan ? tavan : ham;
        let dv = son * 0.00759;
        document.getElementById("sonuc-box").style.display = "block";
        document.getElementById("h-oran").innerText = ham.toLocaleString() + " TL";
        document.getElementById("dv").innerText = "-" + dv.toLocaleString() + " TL";
        document.getElementById("net").innerText = (son - dv).toLocaleString() + " TL";
    }
</script>
</body>
</html>
