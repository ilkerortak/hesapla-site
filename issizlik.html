<div class="container">
    <h2>📅 İşsizlik Maaşı</h2>
    <div class="input-group"><label>Son 4 Ay Brüt Ortalaması</label><input type="number" id="o"></div>
    <button onclick="calc()">Hesapla</button>
    <div id="res" class="result-item"><div class="detail-row total"><span>Aylık Net</span><span id="n"></span></div></div>
</div>
<script>
    function calc(){
        let o=document.getElementById("o").value; if(!o)return;
        document.getElementById("res").style.display="block";
        document.getElementById("n").innerText=(Math.min(o*0.4, 26424)*0.992).toLocaleString()+" TL";
    }
</script>
