<html lang="tr">

<body>
<nav>

    <div class="nav-menu">
        <a href="netmaas.html" class="active">💰 Maaş</a><a href="tazminat.html">💼 Tazminat</a><a href="issizlik.html">📅 İşsizlik</a>

    </div>
</nav>

<div class="container">
    <h2>💰 Net Maaş Analizi</h2>
    <div class="input-group"><label>Brüt Maaş (TL)</label><input type="number" id="brut" placeholder="Örn: 45000"></div>
    <button onclick="calc()">Bordro Hesapla</button>
    <div id="res" class="result-box">
        <div class="row"><span>SGK İşçi Payı (%14)</span><span id="sgk"></span></div>
        <div class="row"><span>İşsizlik Sigortası (%1)</span><span id="iss"></span></div>
        <div class="row"><span>Gelir Vergisi (%15)</span><span id="gv"></span></div>
        <div class="row total"><span>Net Ele Geçen</span><span id="net" style="color:var(--accent); font-weight:800;"></span></div>
    </div>
</div>

<script>
function calc(){
    let b=parseFloat(document.getElementById("brut").value); if(!b) return;
    let sgk=b*0.14, iss=b*0.01, gv=(b-sgk-iss)*0.15;
    document.getElementById("res").style.display="block";
    document.getElementById("sgk").innerText="-"+sgk.toLocaleString()+" ₺";
    document.getElementById("iss").innerText="-"+iss.toLocaleString()+" ₺";
    document.getElementById("gv").innerText="-"+gv.toLocaleString()+" ₺";
    document.getElementById("net").innerText=(b-sgk-iss-gv).toLocaleString()+" ₺";
}
</script>
</body></html>
