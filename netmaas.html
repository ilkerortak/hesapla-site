<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Net Maaş Hesaplama 2026 - Hesapla360</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<nav>
    <a href="index.html" class="logo">HESAPLA<span>360</span></a>
    <ul class="nav-menu">
        <li><a href="netmaas.html" class="active">Maaş</a></li>
        <li><a href="tazminat.html">Tazminat</a></li>
        <li><a href="issizlik.html">İşsizlik</a></li>
        <li><a href="kredi.html">Kredi</a></li>
        <li><a href="cv.html">CV</a></li>
    </ul>
    <div class="theme-switch-wrapper"><label class="theme-switch"><input type="checkbox" id="theme-checkbox"><span class="slider"></span></label></div>
</nav>

<div class="container">
    <h2>Net Maaş Hesapla</h2>
    <div class="input-group">
        <label>Brüt Maaş Tutarı (TL)</label>
        <input type="number" id="brut" placeholder="Örn: 45000">
    </div>
    <button onclick="maasHesapla()">Hesapla</button>
    <div id="sonuc-box" style="display:none;" class="result-item">
        <p>Tahmini Net Maaş</p>
        <strong id="net-sonuc">0 TL</strong>
        <p style="font-size:0.75rem; opacity:0.6; margin-top:10px;">*SGK ve Gelir Vergisi (ilk dilim) düşülmüştür.</p>
    </div>
</div>

<script>
    const checkbox = document.getElementById('theme-checkbox');
    if (localStorage.getItem('theme') === 'dark') { document.body.classList.add('dark'); checkbox.checked = true; }
    checkbox.addEventListener('change', () => { document.body.classList.toggle('dark'); localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light'); });

    function maasHesapla() {
        let brut = parseFloat(document.getElementById("brut").value);
        if(!brut) return;
        let net = brut * 0.782; // 2026 standart kesinti katsayısı
        document.getElementById("sonuc-box").style.display = "block";
        document.getElementById("net-sonuc").innerText = net.toLocaleString('tr-TR', {maximumFractionDigits:2}) + " TL";
    }
</script>
</body>
</html>
