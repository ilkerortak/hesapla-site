<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H360 | Net Maaş Analizi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #3b82f6;
            --secondary: #10b981;
            --bg: #0b0f19;
            --card-bg: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.07);
            --text-muted: #94a3b8;
        }

        body { background-color: var(--bg); margin: 0; font-family: 'Inter', sans-serif; color: #fff; overflow-x: hidden; }

        /* --- ELITE NAVIGATION (ANIMATED) --- */
        .glass-nav {
            position: fixed; top: 0; left: 0; right: 0; height: 85px;
            background: rgba(11, 15, 25, 0.7); backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; z-index: 2000;
        }
        .logo { color: #fff; text-decoration: none; font-weight: 800; font-size: 1.3rem; display: flex; align-items: center; gap: 12px; }
        .logo-box { background: var(--primary); color: #fff; padding: 5px 10px; border-radius: 10px; font-size: 0.9rem; }
        .logo span { color: var(--primary); }

        .menu-container { position: relative; }
        .menu-btn {
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border);
            color: #fff; padding: 12px 25px; border-radius: 14px; font-weight: 700;
            cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; gap: 12px; font-size: 0.85rem;
        }
        .menu-btn:hover { background: var(--primary); transform: scale(1.05); }
        .menu-btn i { transition: transform 0.4s ease; }
        .menu-btn.active i { transform: rotate(90deg); }

        .dropdown-menu {
            position: absolute; top: 95px; right: 0; width: 380px;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(30px);
            border: 1px solid var(--border); border-radius: 28px; padding: 25px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            opacity: 0; visibility: hidden; transform: translateY(-20px) scale(0.95);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .dropdown-menu.active { opacity: 1; visibility: visible; transform: translateY(0) scale(1); }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .menu-grid a {
            display: flex; align-items: center; gap: 12px; padding: 16px;
            color: var(--text-muted); text-decoration: none; font-size: 0.8rem; font-weight: 700;
            border-radius: 18px; transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.02); opacity: 0; transform: translateX(10px);
        }
        .dropdown-menu.active .menu-grid a { opacity: 1; transform: translateX(0); }
        /* Staggered Delay */
        .menu-grid a:nth-child(n) { transition-delay: calc(0.05s * var(--i)); }
        .menu-grid a:hover { background: rgba(59, 130, 246, 0.1); color: #fff; transform: translateY(-3px); }
        .menu-grid a i { width: 35px; height: 35px; background: rgba(255,255,255,0.03); display: flex; align-items: center; justify-content: center; border-radius: 10px; color: var(--primary); }

        /* --- CALC CARD --- */
        .main-wrapper { padding: 140px 20px 60px; display: flex; justify-content: center; min-height: 100vh; box-sizing: border-box; }
        .calc-card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 32px; padding: 40px; width: 100%; max-width: 550px;
            backdrop-filter: blur(10px); box-shadow: 0 40px 100px rgba(0,0,0,0.5);
        }
        .header-area { display: flex; align-items: center; gap: 20px; margin-bottom: 35px; }
        .icon-box { width: 60px; height: 60px; background: rgba(59, 130, 246, 0.1); border-radius: 18px; display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 1.5rem; }
        .title-text h1 { font-size: 1.4rem; margin: 0; color: #fff; }
        .title-text p { color: var(--primary); font-size: 0.7rem; font-weight: 800; margin: 4px 0 0; text-transform: uppercase; letter-spacing: 1px; }

        .input-group { margin-bottom: 25px; }
        .input-group label { display: block; color: var(--text-muted); font-size: 0.65rem; font-weight: 800; margin-bottom: 10px; letter-spacing: 0.5px; }
        .input-group input, .input-group select {
            width: 100%; padding: 18px; background: #080b12; border: 1px solid #1e293b; border-radius: 16px;
            color: #fff; font-size: 1.1rem; outline: none; transition: 0.3s; box-sizing: border-box;
        }
        .input-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }

        .calc-btn {
            width: 100%; padding: 20px; background: var(--primary); color: #fff; border: none; border-radius: 18px;
            font-weight: 700; cursor: pointer; font-size: 1rem; transition: 0.3s; letter-spacing: 1px;
        }
        .calc-btn:hover { background: #2563eb; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3); }

        /* --- RESULT PANEL --- */
        .result-box { margin-top: 40px; display: none; animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        @keyframes slideUp { from { opacity:0; transform: translateY(30px); } to { opacity:1; transform: translateY(0); } }

        .res-main { background: #080b12; padding: 30px; border-radius: 24px; border: 1px solid #1e293b; text-align: center; margin-bottom: 20px; }
        .res-main span { font-size: 0.75rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; }
        .res-main b { font-size: 2.8rem; display: block; color: var(--secondary); margin: 10px 0; letter-spacing: -1.5px; }

        .res-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .res-item { background: rgba(255,255,255,0.02); padding: 18px; border-radius: 16px; border: 1px solid var(--border); }
        .res-item label { display: block; font-size: 0.6rem; color: var(--primary); font-weight: 800; margin-bottom: 6px; }
        .res-item b { font-size: 1rem; color: #fff; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="calc-card">
        <div class="header-area">
            <div class="icon-box"><i class="fa-solid fa-wallet"></i></div>
            <div class="title-text">
                <h1>MAAŞ ANALİZİ</h1>
                <p>Brütten Nete Detaylı Hesaplama</p>
            </div>
        </div>

        <div class="input-group">
            <label>BRÜT MAAŞ TUTARI (TL)</label>
            <input type="number" id="brut" placeholder="Örn: 45000">
        </div>

        <div class="input-group">
            <label>HESAPLAMA YILI</label>
            <select id="year">
                <option value="2026">2026 Dönemi</option>
                <option value="2025">2025 Dönemi</option>
            </select>
        </div>

        <button class="calc-btn" onclick="calculateSalary()">HESAPLA</button>

        <div id="res" class="result-box">
            <div class="res-main">
                <span>NET ELE GEÇEN</span>
                <b id="netVal">0 ₺</b>
            </div>
            <div class="res-grid">
                <div class="res-item">
                    <label>SGK İŞÇİ (%14)</label>
                    <b id="sgkVal">0 ₺</b>
                </div>
                <div class="res-item">
                    <label>İŞSİZLİK (%1)</label>
                    <b id="issizVal">0 ₺</b>
                </div>
                <div class="res-item">
                    <label>GELİR VERGİSİ</label>
                    <b id="vergiVal">0 ₺</b>
                </div>
                <div class="res-item">
                    <label>DAMGA VERGİSİ</label>
                    <b id="damgaVal">0 ₺</b>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleMenu() {
        document.getElementById('navMenu').classList.toggle('active');
        document.getElementById('mBtn').classList.toggle('active');
    }

    function calculateSalary() {
        const brut = parseFloat(document.getElementById('brut').value);
        if(!brut) return;

        // Basit SGK ve Vergisel Mantık
        const sgk = brut * 0.14;
        const issiz = brut * 0.01;
        const vergiMatrahi = brut - (sgk + issiz);
        const gelirVergisi = vergiMatrahi * 0.15; // 1. dilim varsayılan
        const damgaVergisi = brut * 0.00759;
        
        const net = brut - (sgk + issiz + gelirVergisi + damgaVergisi);

        document.getElementById('netVal').innerText = Math.round(net).toLocaleString('tr-TR') + " ₺";
        document.getElementById('sgkVal').innerText = Math.round(sgk).toLocaleString('tr-TR') + " ₺";
        document.getElementById('issizVal').innerText = Math.round(issiz).toLocaleString('tr-TR') + " ₺";
        document.getElementById('vergiVal').innerText = Math.round(gelirVergisi).toLocaleString('tr-TR') + " ₺";
        document.getElementById('damgaVal').innerText = Math.round(damgaVergisi).toLocaleString('tr-TR') + " ₺";

        document.getElementById('res').style.display = "block";
    }

    window.onclick = function(e) {
        if (!e.target.closest('.menu-container')) {
            document.getElementById('navMenu').classList.remove('active');
            document.getElementById('mBtn').classList.remove('active');
        }
    }
</script>
</body>
</html>
