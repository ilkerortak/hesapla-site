<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H360 | Maaş Analizi</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="style.css">

<style>
.calculation-container { max-width: 600px; margin: 120px auto 60px; padding: 0 20px; }

.form-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    padding: 30px;
    border-radius: 20px;
}

input {
    width: 100%;
    padding: 15px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: #fff;
    margin: 15px 0;
}

.btn-calc {
    width: 100%;
    padding: 15px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-weight: 700;
    cursor: pointer;
    position: relative;
}

/* LOADING */
.btn-calc.loading span { visibility: hidden; }
.btn-calc.loading::after {
    content:"";
    width:18px;
    height:18px;
    border:2px solid #fff;
    border-top:2px solid transparent;
    border-radius:50%;
    position:absolute;
    left:50%; top:50%;
    transform:translate(-50%,-50%);
    animation:spin .6s linear infinite;
}
@keyframes spin { to { transform:translate(-50%,-50%) rotate(360deg);} }

.res-area { display:none; margin-top:20px; }
.res-val { font-size:2rem; color:var(--accent); }
.detail-row { display:flex; justify-content:space-between; font-size:0.9rem; }
</style>
</head>

<body>

<div class="calculation-container">

<div class="form-card">
<input type="number" id="brut" placeholder="Brüt maaş">

<button class="btn-calc" onclick="hesaplaMaas()">
<span>HESAPLA</span>
</button>

<div id="res" class="res-area">
<div class="res-val" id="net">0 ₺</div>

<div class="detail-row"><span>SGK</span><b id="sgk"></b></div>
<div class="detail-row"><span>İşsizlik</span><b id="issiz"></b></div>
<div class="detail-row"><span>Vergi</span><b id="vergi"></b></div>
<div class="detail-row"><span>Damga</span><b id="damga"></b></div>

<div id="extra"></div>
</div>

</div>
</div>

<script>
function gelirVergisiHesapla(y){
if(y<=110000)return y*0.15;
if(y<=230000)return 110000*0.15+(y-110000)*0.20;
if(y<=580000)return 110000*0.15+120000*0.20+(y-230000)*0.27;
return 110000*0.15+120000*0.20+350000*0.27+(y-580000)*0.35;
}

function hesaplaMaas(){
const btn=document.querySelector(".btn-calc");
btn.classList.add("loading");

setTimeout(()=>{
const brut=parseFloat(document.getElementById('brut').value);
if(!brut){btn.classList.remove("loading");return;}

const sgk=brut*0.14;
const issiz=brut*0.01;
const damga=brut*0.00759;

const matrah=(brut-sgk-issiz)*12;
const vergi=gelirVergisiHesapla(matrah)/12;

const net=brut-(sgk+issiz+damga+vergi);

const yaz=(id,val)=>document.getElementById(id).innerText=Math.round(val)+" ₺";

yaz("net",net);
yaz("sgk",sgk);
yaz("issiz",issiz);
yaz("vergi",vergi);
yaz("damga",damga);

document.getElementById("extra").innerHTML=`
<div class="detail-row"><span>Toplam Kesinti</span><b>${Math.round(brut-net)} ₺</b></div>
`;

document.getElementById("res").style.display="block";
btn.classList.remove("loading");
},1000);
}
</script>

</body>
</html>
