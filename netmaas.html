<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H360 | Gelişmiş Maaş Analizi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* PARLAMA ÖNLEYİCİ & ANİMASYONLU ANA TEMA */
        body { background-color: #080b12; margin: 0; font-family: 'Inter', sans-serif; color: #cbd5e0; overflow-x: hidden; }
        
        /* Gelişmiş Dropdown Menü (12 Sayfa + Animasyon) */
        .dropdown-menu { 
            display: none; 
            position: absolute; 
            top: 70px; 
            right: 0; 
            background: #111827; 
            border: 1px solid #1f2937; 
            border-radius: 16px; 
            padding: 12px; 
            z-index: 1000;
            width: 240px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            transform-origin: top right;
        }
        
        /* Menü Açılış Animasyonu */
        .dropdown-menu.active { 
            display: grid; 
            grid-template-columns: 1fr;
            animation: slideDown 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards; 
        }

        @keyframes slideDown {
            from { opacity: 0; transform: scale(0.9) translateY(-20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .dropdown-menu a { 
            display: flex; 
            align-items: center;
            color: #94a3b8; 
            padding: 10px 15px; 
            text-decoration: none; 
            font-size: 0.85rem; 
            font-weight: 600;
            border-radius: 10px; 
            transition: 0.2s;
        }
        .dropdown-menu a i { width: 25px; font-size: 0.9rem; color: #3b82f6; }
        .dropdown-menu a:hover { background: #1e293b; color: #fff; transform: translateX(5px); }

        /* Kart ve Input Tasarımı */
        .main-wrapper { display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 100px 20px 60px; box-sizing: border-box; }
        .calc-card {
            background: #0f172a; border: 1px solid #1e293b;
            border-radius: 28px; padding: 40px; width: 100%; max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header-area { text-align: center; margin-bottom: 30px; }
        .header-area h1 { font-size: 1.4rem; letter-spacing: 2px; margin: 0; font-weight: 700; color: #fff; }
        .header-area p { color: #3b82f6; font-size: 0.7rem; font-weight: 800; margin-top: 8px; text-transform: uppercase; }
        
        .mode-selector {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px;
            background: #111827; padding: 6px; border-radius: 16px;
        }
        .mode-btn {
            padding: 12px; border: none; border-radius: 12px; background: transparent;
            color: #4b5563; cursor: pointer; font-weight: 700; font-size: 0.75rem; transition: 0.3s;
        }
        .mode-btn.active { background: #3b82f6; color: #fff; }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; color: #3b82f6; font-size: 0.65rem; font-weight: 800; margin-bottom: 10px; }
        .input-group input {
            width: 100%; padding: 18px; background: #111827;
            border: 1px solid #1f2937; border-radius: 14px;
            color: #fff; font-size: 1.2rem; outline: none; transition: 0.2s; box-sizing: border-box;
        }
        .input-group input:focus { border-color: #3b82f6; }

        .calc-btn {
            width: 100%; padding: 20px; background: #3b82f6; color: #fff;
            border: none; border-radius: 16px; font-weight: 700; cursor: pointer; font-size: 1rem;
        }

        .result-box {
            margin-top: 30px; padding: 25px; background: #080b12; border-radius: 20px;
            border: 1px solid #1e293b; display: none; border-top: 3px solid #10b981;
        }
        .res-main { text-align: center; margin-bottom: 20px; }
        .res-main b { font-size: 2.5rem; color: #10b981; }

        .detail-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 0.85rem; color: #94a3b8; }
        .detail-row b { color: #fff; }
    </style>
</head>
<body>

<nav class="glass-nav">
    <div class="nav-left">
        <a href="index.html" class="logo"><div class="logo-box">H360</div> HESAPLA<span>360</span></a>
    </div>
    <div class="nav-right">
        <div class="menu-container" style="position: relative;">
            <button class="menu-btn" onclick="toggleMenu()">MENÜ <i class="fa-solid fa-bars-staggered" style="margin-left: 8px;"></i></button>
            <div class="dropdown-menu" id="navMenu">
                <a href="netmaas.html"><i class="fa-solid fa-wallet"></i> Maaş</a>
                <a href="tazminat.html"><i class="fa-solid fa-briefcase"></i> Tazminat</a>
                <a href="issizlik.html"><i class="fa-solid fa-calendar-check"></i> İşsizlik</a>
                <a href="faiz.html"><i class="fa-solid fa-chart-line"></i> Faiz</a>
                <a href="yakit.html"><i class="fa-solid fa-gas-pump"></i> Yakıt</a>
                <a href="enflasyon.html"><i class="fa-solid fa-arrow-down-wide-short"></i> Enflasyon</a>
                <a href="kredi.html"><i class="fa-solid fa-building-columns"></i> Kredi</a>
                <a href="yas.html"><i class="fa-solid fa-cake-candles"></i> Yaş</a>
                <a href="doviz.html"><i class="fa-solid fa-money-bill-transfer"></i> Döviz</a>
                <a href="kdv.html"><i class="fa-solid fa-receipt"></i> KDV</a>
                <a href="mesai.html"><i class="fa-solid fa-clock"></i> Mesai</a>
                <a href="cv.html"><i class="fa-solid fa-file-invoice"></i> CV</a>
            </div>
        </div>
    </div>
</nav>

<div class="main-wrapper">
    <div class="calc-card">
        <div class="header-area">
            <h1>MAAŞ ANALİZİ</h1>
            <p>2026 VERGİ DÜZENLEMELERİ DAHİL</p>
        </div>

        <div class="mode-selector">
            <button class="mode-btn active" onclick="setMode('brut', this)">BRÜTTEN NETE</button>
            <button class="mode-btn" onclick="setMode('net', this)">NETTEN BRÜTE</button>
        </div>

        <div class="input-group">
            <label id="inputLabel">AYLIK BRÜT MAAŞ (TL)</label>
            <input type="number" id="salaryInput" placeholder="0.00">
        </div>

        <button class="calc-btn" onclick="hesapla()">ANALİZİ BAŞLAT</button>

        <div id="res" class="result-box">
            <div class="res-main">
                <span style="font-size: 0.7rem; color: #64748b; font-weight: 800; display: block;">NET ELE GEÇEN</span>
                <b id="mainRes">0 ₺</b>
            </div>
            
            <div class="detail-row"><span>SGK Payı (%14)</span> <b id="sgk">0</b></div>
            <div class="detail-row"><span>İşsizlik Fonu (%1)</span> <b id="issiz">0</b></div>
            <div class="detail-row"><span>Gelir Vergisi</span> <b id="vergi">0</b></div>
            <div class="detail-row" style="color: #10b981;"><span>Vergi İstisnası</span> <b id="istisna">-0</b></div>
            <div class="detail-row"><span>Damga Vergisi</span> <b id="damga">0</b></div>
        </div>
    </div>
</div>

<script>
    let currentMode = 'brut';
    const ASGARI_BRUT = 30000; 

    function toggleMenu() {
        const menu = document.getElementById('navMenu');
        menu.classList.toggle('active');
    }

    // Dışarı tıklama kontrolü
    window.onclick = function(e) {
        if (!e.target.matches('.menu-btn') && !e.target.closest('.menu-btn')) {
            const menu = document.getElementById('navMenu');
            if (menu.classList.contains('active')) menu.classList.remove('active');
        }
    }

    function setMode(mode, btn) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('inputLabel').innerText = mode === 'brut' ? 'AYLIK BRÜT MAAŞ (TL)' : 'AYLIK NET MAAŞ (TL)';
    }

    function hesapla() {
        const val = parseFloat(document.getElementById('salaryInput').value) || 0;
        if(val <= 0) return;
        
        let brut = currentMode === 'brut' ? val : val / 0.71;
        let sgk = brut * 0.14, issizlik = brut * 0.01, matrah = brut - sgk - issizlik;
        let gelirVergisi = matrah * 0.15, damga = brut * 0.00759;
        let istisna = (ASGARI_BRUT * 0.85 * 0.15) + (ASGARI_BRUT * 0.00759);
        let net = brut - sgk - issizlik - ((gelirVergisi + damga) - istisna);

        document.getElementById('mainRes').innerText = Math.round(currentMode === 'brut' ? net : brut).toLocaleString('tr-TR') + " ₺";
        document.getElementById('sgk').innerText = Math.round(sgk).toLocaleString('tr-TR') + " ₺";
        document.getElementById('issiz').innerText = Math.round(issizlik).toLocaleString('tr-TR') + " ₺";
        document.getElementById('vergi').innerText = Math.round(gelirVergisi).toLocaleString('tr-TR') + " ₺";
        document.getElementById('istisna').innerText = "-" + Math.round(istisna).toLocaleString('tr-TR') + " ₺";
        document.getElementById('damga').innerText = Math.round(damga).toLocaleString('tr-TR') + " ₺";
        document.getElementById('res').style.display = "block";
    }
</script>
</body>
</html>
