<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>H360 | Maaş Analizi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<nav>
    <a href="/" class="logo"><div class="logo-box">H360</div> HESAPLA<span>360</span></a>
    <div class="nav-container">
        <button class="menu-btn" onclick="toggleMenu()">MENÜ ▾</button>
        <div class="dropdown-menu" id="navMenu">
            <a href="/netmaas">💰 Maaş</a><a href="/tazminat">💼 Tazminat</a>
            <a href="/issizlik">📅 İşsizlik</a><a href="/faiz">📈 Faiz</a>
            <a href="/yakit">⛽ Yakıt</a><a href="/enflasyon">📉 Enflasyon</a>
            <a href="/kredi">🏦 Kredi</a><a href="/yas">🎂 Yaş</a>
            <a href="/doviz">💱 Döviz</a><a href="/kdv">🧾 KDV</a>
            <a href="/mesai">🕒 Mesai</a><a href="/cv">📄 CV</a>
        </div>
    </div>
</nav>

<div class="hero-section">
    <h2>Maaş Analizi</h2>
    <p>2026 GÜNCEL VERGİ DİLİMLERİNE GÖRE BORDRO DÖKÜMÜ</p>
</div>

<div class="form-box">
    <label>AYLIK BRÜT MAAŞ (TL)</label>
    <input type="number" id="brut" placeholder="Örn: 50.000">
    
    <button class="btn-calc" onclick="hesaplaMaas()">BORDRO HESAPLA</button>

    <div id="res" class="res-area">
        <p style="color:#555; font-size:0.7rem; font-weight:800;">TAHMİNİ NET ELE GEÇEN</p>
        <div class="res-val" id="net">0 ₺</div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px; font-size:0.8rem; color:#888;">
            <span>SGK Payı: <b id="sgk" style="color:#fff">0</b></span>
            <span>Gelir Vergisi: <b id="vergi" style="color:#fff">0</b></span>
        </div>
    </div>
</div>

<script>
    function toggleMenu() { document.getElementById('navMenu').classList.toggle('active'); }
    function hesaplaMaas() {
        const brut = parseFloat(document.getElementById('brut').value) || 0;
        const sgk = brut * 0.14;
        const issizlik = brut * 0.01;
        const vergiMatrah = brut - sgk - issizlik;
        const gelirVergisi = vergiMatrah * 0.15; // Basit başlangıç dilimi
        const net = brut - sgk - issizlik - gelirVergisi;
        
        document.getElementById('net').innerText = Math.round(net).toLocaleString() + " ₺";
        document.getElementById('sgk').innerText = Math.round(sgk).toLocaleString();
        document.getElementById('vergi').innerText = Math.round(gelirVergisi).toLocaleString();
        document.getElementById('res').style.display = "block";
    }
</script>
</body>
</html>
