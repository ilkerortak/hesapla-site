<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Maaş Analizi - Hesapla360</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<nav>
    <a href="index.html" class="logo">HESAPLA<span>360</span></a>
    <div class="nav-menu">
        <a href="netmaas.html" class="active">💰 Maaş</a>
        <a href="tazminat.html">💼 Tazminat</a>
        <a href="issizlik.html">📅 İşsizlik</a>
        <a href="kredi.html">🏦 Kredi</a>
        <a href="cv.html">📄 CV</a>
    </div>
</nav>

<div class="container">
    <h2>💰 Maaş Analizi</h2>
    <div class="input-group">
        <label>Brüt Maaş Tutarı (TL)</label>
        <input type="number" id="brut" placeholder="Örn: 50000">
    </div>
    <button onclick="hesapla()">Analiz Et</button>

    <div id="sonuc-box" style="display:none;" class="result-item">
        <div class="detail-row"><span>SGK İşçi Payı (%14)</span> <span id="sgk"></span></div>
        <div class="detail-row"><span>İşsizlik Fonu (%1)</span> <span id="issizlik"></span></div>
        <div class="detail-row"><span>Gelir Vergisi (%15)</span> <span id="gv"></span></div>
        <div class="detail-row"><span>Damga Vergisi</span> <span id="dv"></span></div>
        <div class="detail-row total"><span>Net Ele Geçen</span> <span id="net" style="color:#a855f7; font-size:1.4rem;"></span></div>
    </div>
</div>

<script>
    function hesapla() {
        let b = parseFloat(document.getElementById("brut").value);
        if(!b) return;
        let sgk = b * 0.14;
        let iss = b * 0.01;
        let gv = (b - sgk - iss) * 0.15;
        let dv = b * 0.00759;
        let net = b - (sgk + iss + gv + dv) + 3500; // + İstisna
        
        document.getElementById("sonuc-box").style.display = "block";
        document.getElementById("sgk").innerText = sgk.toLocaleString() + " TL";
        document.getElementById("issizlik").innerText = iss.toLocaleString() + " TL";
        document.getElementById("gv").innerText = gv.toLocaleString() + " TL";
        document.getElementById("dv").innerText = dv.toLocaleString() + " TL";
        document.getElementById("net").innerText = net.toLocaleString() + " TL";
    }
</script>
</body>
</html>
