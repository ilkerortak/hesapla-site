<script>
function toggleMenu() {
    document.getElementById('navMenu').classList.toggle('active');
}

// 2026 tahmini vergi dilimleri (örnek)
function gelirVergisiHesapla(matrahYillik) {
    let vergi = 0;

    if (matrahYillik <= 110000) {
        vergi = matrahYillik * 0.15;
    } else if (matrahYillik <= 230000) {
        vergi = 110000 * 0.15 +
                (matrahYillik - 110000) * 0.20;
    } else if (matrahYillik <= 580000) {
        vergi = 110000 * 0.15 +
                120000 * 0.20 +
                (matrahYillik - 230000) * 0.27;
    } else {
        vergi = 110000 * 0.15 +
                120000 * 0.20 +
                350000 * 0.27 +
                (matrahYillik - 580000) * 0.35;
    }

    return vergi;
}

function hesaplaMaas() {
    const brut = parseFloat(document.getElementById('brut').value) || 0;

    if (brut <= 0) return;

    const sgk = brut * 0.14;
    const issizlik = brut * 0.01;
    const damga = brut * 0.00759;

    const matrahAylik = brut - sgk - issizlik;
    const matrahYillik = matrahAylik * 12;

    const yillikVergi = gelirVergisiHesapla(matrahYillik);
    const aylikVergi = yillikVergi / 12;

    const net = brut - (sgk + issizlik + damga + aylikVergi);

    const toplamKesinti = brut - net;
    const kesintiOrani = (toplamKesinti / brut) * 100;

    // Yazdır
    document.getElementById('net').innerText =
        Math.round(net).toLocaleString('tr-TR') + " ₺";

    document.getElementById('sgk').innerText =
        Math.round(sgk).toLocaleString('tr-TR') + " ₺";

    document.getElementById('issiz').innerText =
        Math.round(issizlik).toLocaleString('tr-TR') + " ₺";

    document.getElementById('vergi').innerText =
        Math.round(aylikVergi).toLocaleString('tr-TR') + " ₺";

    document.getElementById('damga').innerText =
        Math.round(damga).toLocaleString('tr-TR') + " ₺";

    // EXTRA bilgiler (yeni ama UI bozmaz)
    if (!document.getElementById('extra')) {
        const extraDiv = document.createElement("div");
        extraDiv.id = "extra";
        extraDiv.style.marginTop = "15px";
        extraDiv.innerHTML = `
            <div class="detail-row">
                <span>Toplam Kesinti</span>
                <b style="color:#fff">${Math.round(toplamKesinti).toLocaleString('tr-TR')} ₺</b>
            </div>
            <div class="detail-row">
                <span>Kesinti Oranı</span>
                <b style="color:#fff">%${kesintiOrani.toFixed(1)}</b>
            </div>
            <div class="detail-row">
                <span>Yıllık Net</span>
                <b style="color:#fff">${Math.round(net * 12).toLocaleString('tr-TR')} ₺</b>
            </div>
        `;
        document.getElementById('res').appendChild(extraDiv);
    }

    document.getElementById('res').style.display = "block";
}

// Live hesaplama (premium hissi)
document.getElementById('brut').addEventListener('input', hesaplaMaas);

// Enter desteği
document.getElementById('brut').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') hesaplaMaas();
});
</script>
