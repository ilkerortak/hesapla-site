<div class="container">
    <h2>💰 Maaş Analizi</h2>
    <div class="input-group"><label>Brüt Maaş</label><input type="number" id="b"></div>
    <button onclick="calc()">RGB Hesapla</button>
    <div id="res" class="result-item">
        <div class="detail-row"><span>SGK (%14)</span><span id="s"></span></div>
        <div class="detail-row total"><span>Net Maaş</span><span id="n"></span></div>
    </div>
</div>
<script>
    function calc(){
        let b=document.getElementById("b").value; if(!b)return;
        document.getElementById("res").style.display="block";
        document.getElementById("s").innerText=(b*0.14).toLocaleString()+" TL";
        document.getElementById("n").innerText=(b*0.75+3500).toLocaleString()+" TL";
    }
</script>
</body>
