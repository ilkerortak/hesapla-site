<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Net Maaş Hesaplama 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<nav>
    <a href="index.html" class="logo-link">
        <div style="font-weight:800; color:white; font-size:1.4rem;">HESAPLA<span style="color:#fbbf24;">360</span></div>
    </a>
    <ul>
        <li><a href="netmaas.html" class="active">Maaş</a></li>
        <li><a href="issizlik.html">İşsizlik</a></li>
        <li><a href="kredi.html">Kredi</a></li>
    </ul>
    <button id="theme-toggle">☀️</button>
</nav>

<div class="container">
    <h1>Net Maaş Hesapla 2026</h1>
    <div class="input-group">
        <p>Brüt Maaşınız:</p>
        <div class="input-wrapper">
            <input type="number" id="brut" placeholder="Örn: 40000">
            <span>TL</span>
        </div>
    </div>
    <button onclick="hesaplaMaaş()">Hesapla</button>
    
    <div id="sonuc-box" style="display:none;" class="result-item">
        <span>Net Maaşınız:</span>
        <strong id="net-sonuc">0 TL</strong>
    </div>
</div>

<script src="script.js"></script>
<script>
function hesaplaMaaş() {
    let brut = parseFloat(document.getElementById("brut").value);
    if(!brut) return;
    // 2026 Basit Vergi Mantığı (SGK + İstisna)
    let net = brut * 0.78; // Yaklaşık katsayı, fonksiyonu geliştirebilirsin
    document.getElementById("sonuc-box").style.display = "block";
    document.getElementById("net-sonuc").innerText = net.toLocaleString() + " TL";
}
</script>
</body>
</html>
