<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H360 | Gelişmiş Maaş Analizi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* ANA DEEP NIGHT TEMA */
        body { background-color: #0b0f19; margin: 0; font-family: 'Inter', sans-serif; color: #cbd5e0; overflow-x: hidden; }
        
        /* Navigasyon */
        .glass-nav { background: rgba(11, 15, 25, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); }

        .main-wrapper { display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 120px 20px 60px; }
        
        /* Dashboard Tarzı Kart */
        .calc-card {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px; padding: 40px; width: 100%; max-width: 600px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
        }

        /* Başlık Alanı (Dashboard İkonuyla) */
        .header-area { display: flex; align-items: center; gap: 20px; margin-bottom: 35px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 25px; }
        .icon-box { 
            width: 60px; height: 60px; background: rgba(245, 158, 11, 0.1); 
            border-radius: 16px; display: flex; align-items: center; justify-content: center;
            color: #f59e0b; font-size: 1.5rem; border: 1px solid rgba(245, 158, 11, 0.2);
        }
        .title-text h1 { font-size: 1.3rem; margin: 0; color: #fff; letter-spacing: 1px; }
        .title-text p { color: #f59e0b; font-size: 0.7rem; font-weight: 800; margin: 4px 0 0; text-transform: uppercase; }
        
        /* Mod Seçici */
        .mode-selector {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px;
            background: #080b12; padding: 6px; border-radius: 14px; border: 1px solid #1e293b;
        }
        .mode-btn {
            padding: 12px; border: none; border-radius: 10px; background: transparent;
            color: #64748b; cursor: pointer; font-weight: 700; font-size: 0.75rem; transition: 0.3s;
        }
        .mode-btn.active { background: #3b82f6; color: #fff; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }

        /* Inputlar */
        .input-group { margin-bottom: 25px; }
        .input-group label { display: block; color: #94a3b8; font-size: 0.65rem; font-weight: 800; margin-bottom: 10px; letter-spacing: 0.5px; }
        .input-group input {
            width: 100%; padding: 18px; background: #080b12;
            border: 1px solid #1e293b; border-radius: 14px;
            color: #fff; font-size: 1.3rem; transition: 0.3s; box-sizing: border-box;
        }
        .input-group input:focus { border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); outline: none; }

        .calc-btn {
            width: 100%; padding: 20px; background: #3b82f6; color: #fff;
            border: none; border-radius: 16px; font-weight: 700; cursor: pointer; font-size: 1rem;
            transition: 0.3s; letter-spacing: 1px;
        }
        .calc-btn:hover { background: #2563eb; transform: translateY(-2px); }

        /* Sonuç Paneli */
        .result-box { margin-top: 40px; animation: fadeIn 0.5s ease; display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .res-main { 
            background: linear-gradient(180deg, rgba(16, 185, 129, 0.1) 0%, rgba(16, 185, 129, 0) 100%);
            padding: 30px; border-radius: 20px; text-align: center; border: 1px solid rgba(16, 185, 129, 0.2);
            margin-bottom: 25px;
        }
        .res-main span { font-size: 0.7rem; color: #94a3b8; font-weight: 700; text-transform: uppercase; }
        .res-main b { font-size: 2.8rem; color: #10b981; display: block; margin-top: 10px; letter-spacing: -1px; }

        .detail-row { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 18px; background: #080b12; border-radius: 12px;
            margin-bottom: 10px; border: 1px solid #1e293b; font-size: 0.85rem;
        }
        .detail-row span { color: #94a3b8; font-weight: 500; }
        .detail-row b { color: #fff; font-weight: 700; }
        .detail-row.istisna { border-color: rgba(16, 185, 129, 0.2); }
        .detail-row.istisna b { color: #10b981; }
    </style>
</head>
<body>

<nav class="glass-nav">
    <div class="nav-left">
        <a href="index.html" class="logo"><div class="logo-box">H360</div> HESAPLA<span>360</span></a>
    </div>
    <div class="nav-right">
        <div class="menu-container" style="position: relative;">
            <button class="menu-btn" onclick="toggleMenu()">MENÜ <i class="fa-solid fa-bars-staggered" style="margin-left: 8px;"></i></button>
            <div class="dropdown-menu" id="navMenu">
                <a href="netmaas.html"><i class="fa-solid fa-wallet"></i> Maaş</a>
                <a href="tazminat.html"><i class="fa-solid fa-briefcase"></i> Tazminat</a>
                <a href="issizlik.html"><i class="fa-solid fa-calendar-check"></i> İşsizlik</a>
                <a href="faiz.html"><i class="fa-solid fa-chart-line"></i> Faiz</a>
                <a href="yakit.html"><i class="fa-solid fa-gas-pump"></i> Yakıt</a>
                <a href="enflasyon.html"><i class="fa-solid fa-arrow-down-wide-short"></i> Enflasyon</a>
                <a href="kredi.html"><i class="fa-solid fa-building-columns"></i> Kredi</a>
                <a href="yas.html"><i class="fa-solid fa-cake-candles"></i> Yaş</a>
                <a href="doviz.html"><i class="fa-solid fa-money-bill-transfer"></i> Döviz</a>
                <a href="kdv.html"><i class="fa-solid fa-receipt"></i> KDV</a>
                <a href="mesai.html"><i class="fa-solid fa-clock"></i> Mesai</a>
                <a href="cv.html"><i class="fa-solid fa-file-invoice"></i> CV</a>
            </div>
        </div>
    </div>
</nav>

<div class="main-wrapper">
    <div class="calc-card">
        <div class="header-area">
            <div class="icon-box"><i class="fa-solid fa-wallet"></i></div>
            <div class="title-text">
                <h1>MAAŞ ANALİZİ</h1>
                <p>2026 Vergi Düzenlemeleri Dahil</p>
            </div>
        </div>

        <div class="mode-selector">
            <button class="mode-btn active" onclick="setMode('brut', this)">BRÜTTEN NETE</button>
            <button class="mode-btn" onclick="setMode('net', this)">NETTEN BRÜTE</button>
        </div>

        <div class="input-group">
            <label id="inputLabel">AYLIK BRÜT MAAŞ (TL)</label>
            <input type="number" id="salaryInput" placeholder="0.00">
        </div>

        <button class="calc-btn" onclick="hesapla()">ANALİZİ BAŞLAT</button>

        <div id="res" class="result-box">
            <div class="res-main">
                <span id="resTitle">Net Ele Geçen</span>
                <b id="mainRes">0 ₺</b>
            </div>
            
            <div class="detail-row"><span>SGK İşçi Payı (%14)</span> <b id="sgk">0 ₺</b></div>
            <div class="detail-row"><span>İşsizlik Fonu (%1)</span> <b id="issiz">0 ₺</b></div>
            <div class="detail-row"><span>Hesaplanan Gelir Vergisi</span> <b id="vergi">0 ₺</b></div>
            <div class="detail-row istisna"><span>Vergi İstisnası (GV+DV)</span> <b id="istisna">-0 ₺</b></div>
            <div class="detail-row"><span>Damga Vergisi</span> <b id="damga">0 ₺</b></div>
        </div>
    </div>
</div>

<script>
    let currentMode = 'brut';
    const ASGARI_BRUT = 30000; 

    function toggleMenu() { document.getElementById('navMenu').classList.toggle('active'); }

    window.onclick = function(e) {
        if (!e.target.matches('.menu-btn') && !e.target.closest('.menu-btn')) {
            const menu = document.getElementById('navMenu');
            if (menu && menu.classList.contains('active')) menu.classList.remove('active');
        }
    }

    function setMode(mode, btn) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('inputLabel').innerText = mode === 'brut' ? 'AYLIK BRÜT MAAŞ (TL)' : 'AYLIK NET MAAŞ (TL)';
        document.getElementById('resTitle').innerText = mode === 'brut' ? 'Net Ele Geçen' : 'Toplam Brüt Maaş';
    }

    function hesapla() {
        const val = parseFloat(document.getElementById('salaryInput').value) || 0;
        if(val <= 0) return;
        
        let brut = currentMode === 'brut' ? val : val / 0.71;
        let sgk = brut * 0.14, issizlik = brut * 0.01, matrah = brut - sgk - issizlik;
        let gelirVergisi = matrah * 0.15, damga = brut * 0.00759;
        let istisna = (ASGARI_BRUT * 0.85 * 0.15) + (ASGARI_BRUT * 0.00759);
        let net = brut - sgk - issizlik - ((gelirVergisi + damga) - istisna);

        document.getElementById('mainRes').innerText = Math.round(currentMode === 'brut' ? net : brut).toLocaleString('tr-TR') + " ₺";
        document.getElementById('sgk').innerText = Math.round(sgk).toLocaleString('tr-TR') + " ₺";
        document.getElementById('issiz').innerText = Math.round(issizlik).toLocaleString('tr-TR') + " ₺";
        document.getElementById('vergi').innerText = Math.round(gelirVergisi).toLocaleString('tr-TR') + " ₺";
        document.getElementById('istisna').innerText = "-" + Math.round(istisna).toLocaleString('tr-TR') + " ₺";
        document.getElementById('damga').innerText = Math.round(damga).toLocaleString('tr-TR') + " ₺";
        document.getElementById('res').style.display = "block";
    }
</script>
</body>
</html>
