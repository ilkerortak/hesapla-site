<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H360 | Maaş Analizi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .calculation-container {
            max-width: 600px;
            margin: 120px auto 60px;
            padding: 0 20px;
        }
        .form-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        input[type="number"] {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: #fff;
            font-size: 1.2rem;
            margin: 15px 0;
            outline: none;
        }
        input[type="number"]:focus { border-color: var(--accent); }
        
        .btn-calc {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-calc:hover { opacity: 0.9; transform: scale(0.98); }

        .res-area {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px dashed var(--border);
            display: none;
        }
        .res-val {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent);
            margin: 10px 0;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-dim);
        }
        #extra {
            border-top: 1px dashed var(--border);
            margin-top: 10px;
            padding-top: 10px;
        }
    </style>
</head>
<body>

<nav class="glass-nav">
    <div class="nav-left">
        <a href="index.html" class="logo"><div class="logo-box">H360</div> HESAPLA<span>360</span></a>
    </div>
    <div class="nav-right">
        <div class="menu-container">
            <button class="menu-btn" onclick="toggleMenu()">MENÜ <i class="fa-solid fa-bars-staggered"></i></button>
            <div class="dropdown-menu" id="navMenu">
                <a href="netmaas.html">💰 Maaş</a><a href="tazminat.html">💼 Tazminat</a>
                <a href="issizlik.html">📅 İşsizlik</a><a href="faiz.html">📈 Faiz</a>
                <a href="yakit.html">⛽ Yakıt</a><a href="enflasyon.html">📉 Enflasyon</a>
                <a href="kredi.html">🏦 Kredi</a><a href="yas.html">🎂 Yaş</a>
                <a href="doviz.html">💱 Döviz</a><a href="kdv.html">🧾 KDV</a>
                <a href="mesai.html">🕒 Mesai</a><a href="cv.html">📄 CV</a>
            </div>
        </div>
    </div>
</nav>

<div class="calculation-container">
    <header class="hero premium-header" style="padding: 0 0 40px 0;">
        <h1 class="premium-title" style="font-size: 2rem;">MAAŞ ANALİZİ</h1>
        <p class="premium-status">2026 GÜNCEL VERGİ DİLİMLERİ</p>
    </header>

    <div class="form-card">
        <label style="color: var(--accent); font-weight: 700; font-size: 0.8rem;">AYLIK BRÜT MAAŞ (TL)</label>
        <input type="number" id="brut" placeholder="Örn: 65000">
        
        <button class="btn-calc" onclick="hesaplaMaas()">HESAPLAMAYI BAŞLAT</button>

        <div id="res" class="res-area">
            <p style="font-size:0.7rem; font-weight:800; color: var(--text-dim);">TAHMİNİ NET ELE GEÇEN</p>
            <div class="res-val" id="net">0 ₺</div>
            
            <div class="detail-row"><span>SGK İşçi Payı (%14)</span> <b id="sgk" style="color:#fff">0</b></div>
            <div class="detail-row"><span>İşsizlik Sigortası (%1)</span> <b id="issiz" style="color:#fff">0</b></div>
            <div class="detail-row"><span>Gelir Vergisi</span> <b id="vergi" style="color:#fff">0</b></div>
            <div class="detail-row"><span>Damga Vergisi</span> <b id="damga" style="color:#fff">0</b></div>
        </div>
    </div>
</div>

<script>
function toggleMenu() {
    document.getElementById('navMenu').classList.toggle('active');
}

function gelirVergisiHesapla(yillik) {
    if (yillik <= 110000) return yillik * 0.15;
    if (yillik <= 230000) return 110000 * 0.15 + (yillik - 110000) * 0.20;
    if (yillik <= 580000) return 110000 * 0.15 + 120000 * 0.20 + (yillik - 230000) * 0.27;
    return 110000 * 0.15 + 120000 * 0.20 + 350000 * 0.27 + (yillik - 580000) * 0.35;
}

function hesaplaMaas() {
    const brut = parseFloat(document.getElementById('brut').value);
    if (!brut || brut <= 0) return;

    const sgk = brut * 0.14;
    const issizlik = brut * 0.01;
    const damga = brut * 0.00759;

    const matrahAylik = brut - sgk - issizlik;
    const yillikMatrah = matrahAylik * 12;

    const yillikVergi = gelirVergisiHesapla(yillikMatrah);
    const aylikVergi = yillikVergi / 12;

    const net = brut - (sgk + issizlik + damga + aylikVergi);

    const yaz = (id, val) => {
        document.getElementById(id).innerText = Math.round(val).toLocaleString('tr-TR') + " ₺";
    };

    yaz("net", net);
    yaz("sgk", sgk);
    yaz("issiz", issizlik);
    yaz("vergi", aylikVergi);
    yaz("damga", damga);

    let extra = document.getElementById("extra");
    if (!extra) {
        extra = document.createElement("div");
        extra.id = "extra";
        document.getElementById("res").appendChild(extra);
    }

    const toplamKesinti = brut - net;
    const oran = (toplamKesinti / brut) * 100;

    extra.innerHTML = `
        <div class="detail-row">
            <span>Toplam Kesinti</span>
            <b style="color:#fff">${Math.round(toplamKesinti).toLocaleString('tr-TR')} ₺</b>
        </div>
        <div class="detail-row">
            <span>Kesinti Oranı</span>
            <b style="color:#fff">%${oran.toFixed(1)}</b>
        </div>
        <div class="detail-row">
            <span>Yıllık Net</span>
            <b style="color:#fff">${Math.round(net*12).toLocaleString('tr-TR')} ₺</b>
        </div>
    `;

    document.getElementById('res').style.display = "block";
}

// SAYFA YÜKLENDİKTEN SONRA ÇALIŞ
document.addEventListener("DOMContentLoaded", () => {
    const input = document.getElementById("brut");

    input.addEventListener("input", hesaplaMaas);

    input.addEventListener("keypress", function (e) {
        if (e.key === "Enter") hesaplaMaas();
    });
});
</script>

</body>
</html>
